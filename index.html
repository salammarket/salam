        <div class="bg-grid"></div>
        <div class="bg-noise"></div>
    </div>
    
    <div class="toast-container" id="toastContainer" role="alert" aria-live="polite"></div>
    
    <div class="modal-overlay" id="resetPasswordModal" role="dialog" aria-modal="true" aria-labelledby="resetPasswordTitle">
        <div class="modal-content">
            <h3 id="resetPasswordTitle">Réinitialisation du mot de passe</h3>
            <p>Entrez votre email ou téléphone. Nous vous enverrons un code de réinitialisation.</p>
            <form id="resetForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="resetIdentifier">Email ou Téléphone</label>
                    <input type="text" class="form-input" id="resetIdentifier" placeholder="exemple@email.com" required>
                </div>
                <div class="error-message" id="resetError"></div>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-paper-plane"></i> Envoyer le code
                </button>
                <button type="button" class="btn btn-back" id="closeResetModal">
                    <i class="fa-solid fa-arrow-left"></i> Retour
                </button>
            </form>
        </div>
    </div>
    
    <main id="app" class="auth-container" role="main" aria-label="Authentification Salam Market"></main>
    
    <script>
        (function() {
            'use strict';
            
            // ========== STORAGE PREFIX ==========
            const STORAGE_PREFIX = 'salam_';
            
            // ========== FONCTIONS STORAGE ==========
            function getStorage(key, defaultValue = null) {
                try {
                    const raw = localStorage.getItem(STORAGE_PREFIX + key);
                    return raw ? JSON.parse(raw) : defaultValue;
                } catch (e) {
                    return defaultValue;
                }
            }
            
            function setStorage(key, value) {
                localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
            }
            
            // ========== HASH PASSWORD ==========
            const SALT = 'SalamMarket_2026_Secure_Key';
            
            function hashPassword(pwd) {
                let hash = 5381;
                const str = pwd + SALT;
                for (let i = 0; i < str.length; i++) {
                    hash = ((hash << 5) + hash) + str.charCodeAt(i);
                    hash = hash & hash;
                }
                return Math.abs(hash).toString(16).substring(0, 16);
            }
            
            // ========== INITIALISATION DES DONNÉES PAR DÉFAUT ==========
            function initDefaultData() {
                // Utilisateurs par défaut
                let users = getStorage('users', []);
                if (users.length === 0) {
                    users = [
                        {
                            id: 'ADM-001',
                            name: 'Admin Principal',
                            email: 'admin@salam.cm',
                            phone: '+237600000000',
                            password: hashPassword('Admin2025!'),
                            role: 'admin',
                            avatar: '👑',
                            status: 'active',
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: 'SUP-001',
                            name: 'BOUTIQUE LE TOUMAI',
                            email: 'toumai@salam.cm',
                            phone: '+237699887766',
                            password: hashPassword('Toumai2025!'),
                            role: 'supplier',
                            avatar: '🏪',
                            status: 'active',
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: 'CLI-001',
                            name: 'Client Test',
                            email: 'client@salam.cm',
                            phone: '+237612345678',
                            password: hashPassword('Client2025!'),
                            role: 'client',
                            avatar: '🛒',
                            status: 'active',
                            createdAt: new Date().toISOString()
                        }
                    ];
                    setStorage('users', users);
                    console.log('✅ Utilisateurs par défaut initialisés');
                }
                
                // Produits par défaut
                let products = getStorage('products', []);
                if (products.length === 0) {
                    products = [
                        { id: 1, name: 'Riz Parfumé Mama Gold', category: 'Riz', price: 900, unit: 'kg', emoji: '🍚', supplier: 'BOUTIQUE LE TOUMAI', stock: 50, sales: 245, available: true, createdAt: new Date().toISOString() },
                        { id: 2, name: 'Riz Tanti', category: 'Riz', price: 800, unit: 'kg', emoji: '🍚', supplier: 'BOUTIQUE LE TOUMAI', stock: 30, sales: 189, available: true, createdAt: new Date().toISOString() },
                        { id: 3, name: 'Huile Mayor 1L', category: 'Huiles', price: 1300, unit: 'L', emoji: '🫒', supplier: 'BOUTIQUE LE TOUMAI', stock: 20, sales: 156, available: true, createdAt: new Date().toISOString() },
                        { id: 4, name: 'PHARMAPUR Herbal', category: 'Savons', price: 350, unit: 'unité', emoji: '🧼', supplier: 'BOUTIQUE LE TOUMAI', stock: 100, sales: 312, available: true, createdAt: new Date().toISOString() },
                        { id: 5, name: 'Colgate Blancheur', category: 'Dentifrices', price: 1800, unit: 'tube', emoji: '🦷', supplier: 'BOUTIQUE LE TOUMAI', stock: 25, sales: 98, available: true, createdAt: new Date().toISOString() }
                    ];
                    setStorage('products', products);
                    console.log('✅ Produits par défaut initialisés');
                }
            }
            
            // ========== AUTH SERVICE ==========
            const AuthService = {
                login: function(identifier, password, rememberMe) {
                    const users = getStorage('users', []);
                    const id = identifier.trim().toLowerCase();
                    const hash = hashPassword(password);
                    
                    const user = users.find(u => {
                        const emailMatch = u.email && u.email.toLowerCase() === id;
                        const phoneMatch = u.phone && u.phone === identifier.trim();
                        return (emailMatch || phoneMatch) && u.password === hash;
                    });
                    
                    if (!user) {
                        throw new Error('❌ Identifiants incorrects. Vérifiez votre email/mot de passe.');
                    }
                    
                    if (rememberMe) this.saveAccount(user.email || user.phone, user.name, user.role);
                    
                    const session = {
                        user: {
                            id: user.id,
                            name: user.name,
                            email: user.email || '',
                            role: user.role,
                            avatar: user.avatar
                        },
                        expires: Date.now() + (rememberMe ? 30 : 1) * 24 * 60 * 60 * 1000
                    };
                    setStorage('session', session);
                    return session.user;
                },
                
                register: function(name, identifier, password, role) {
                    if (!name || name.trim().length < 2) {
                        throw new Error('Le nom doit contenir au moins 2 caractères.');
                    }
                    if (password.length < 8) {
                        throw new Error('Le mot de passe doit contenir au moins 8 caractères.');
                    }
                    
                    const users = getStorage('users', []);
                    const id = identifier.trim();
                    const isEmail = id.includes('@');
                    
                    if (isEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(id)) {
                        throw new Error('Format d\'email invalide.');
                    }
                    if (!isEmail && !/^\+?[\d\s-]{8,}$/.test(id)) {
                        throw new Error('Format de téléphone invalide.');
                    }
                    
                    const exists = users.some(u => 
                        (isEmail && u.email && u.email.toLowerCase() === id.toLowerCase()) ||
                        (!isEmail && u.phone && u.phone === id)
                    );
                    
                    if (exists) throw new Error('Ce compte existe déjà. Essayez de vous connecter.');
                    
                    const newUser = {
                        id: 'USR-' + Date.now().toString(36).toUpperCase(),
                        name: name.trim(),
                        email: isEmail ? id : '',
                        phone: !isEmail ? id : '',
                        password: hashPassword(password),
                        role: role,
                        avatar: role === 'supplier' ? '🏪' : '🛒',
                        status: 'active',
                        createdAt: new Date().toISOString()
                    };
                    
                    users.push(newUser);
                    setStorage('users', users);
                    this.saveAccount(newUser.email || newUser.phone, newUser.name, newUser.role);
                    
                    const session = {
                        user: {
                            id: newUser.id,
                            name: newUser.name,
                            email: newUser.email || '',
                            role: newUser.role,
                            avatar: newUser.avatar
                        },
                        expires: Date.now() + 30 * 24 * 60 * 60 * 1000
                    };
                    setStorage('session', session);
                    return session.user;
                },
                
                resetPassword: function(identifier) {
                    const users = getStorage('users', []);
                    const id = identifier.trim().toLowerCase();
                    
                    const user = users.find(u => 
                        (u.email && u.email.toLowerCase() === id) ||
                        (u.phone && u.phone === identifier.trim())
                    );
                    
                    if (!user) {
                        throw new Error('Aucun compte trouvé avec cet identifiant.');
                    }
                    
                    const resetCode = Math.floor(100000 + Math.random() * 900000).toString();
                    setStorage('reset_code', {
                        code: resetCode,
                        userId: user.id,
                        expires: Date.now() + 15 * 60 * 1000
                    });
                    
                    console.log(`📧 Code de réinitialisation pour ${user.email}: ${resetCode}`);
                    
                    return {
                        success: true,
                        message: `Un code a été envoyé à ${this.maskContact(user.email || user.phone)}`,
                        maskedContact: this.maskContact(user.email || user.phone)
                    };
                },
                
                loginAsVisitor: function() {
                    const user = {
                        id: 'VIS-' + Date.now().toString(36).toUpperCase(),
                        name: 'Visiteur',
                        role: 'visitor',
                        avatar: '👁️'
                    };
                    setStorage('session', { user, expires: Date.now() + 24 * 60 * 60 * 1000 });
                    return user;
                },
                
                getSession: function() {
                    const session = getStorage('session');
                    if (!session || session.expires <= Date.now()) {
                        if (session) localStorage.removeItem(STORAGE_PREFIX + 'session');
                        return null;
                    }
                    return session;
                },
                
                getSavedAccounts: function() {
                    return getStorage('saved_accounts', []);
                },
                
                removeSavedAccount: function(email) {
                    let saved = getStorage('saved_accounts', []);
                    saved = saved.filter(a => a.email !== email);
                    setStorage('saved_accounts', saved);
                },
                
                saveAccount: function(email, name, role) {
                    if (!email) return;
                    let saved = getStorage('saved_accounts', []);
                    saved = saved.filter(a => a.email !== email);
                    saved.unshift({ email, name, role });
                    if (saved.length > 5) saved = saved.slice(0, 5);
                    setStorage('saved_accounts', saved);
                },
                
                maskContact: function(contact) {
                    if (contact.includes('@')) {
                        const [name, domain] = contact.split('@');
                        return name.charAt(0) + '***@' + domain;
                    }
                    return contact.slice(0, 3) + '***' + contact.slice(-2);
                },
                
                redirect: function(role) {
                    const routes = {
                        admin: 'pages/admin.html',
                        supplier: 'pages/supplier.html',
                        visitor: 'pages/products.html',
                        client: 'pages/dashboard.html'
                    };
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                    setTimeout(() => {
                        const url = routes[role] || routes.client;
                        console.log(`🚀 Redirection vers: ${url}`);
                        window.location.href = url;
                    }, 400);
                }
            };
            
            // ========== VALIDATOR ==========
            const Validator = {
                validateEmail: function(email) {
                    if (!email || email.trim().length === 0) return { valid: false, message: '' };
                    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
                        return { valid: false, message: 'Format d\'email invalide' };
                    }
                    return { valid: true, message: 'Email valide' };
                },
                
                validatePhone: function(phone) {
                    if (!phone || phone.trim().length === 0) return { valid: false, message: '' };
                    if (!/^\+?[\d\s-]{8,15}$/.test(phone.trim())) {
                        return { valid: false, message: 'Format de téléphone invalide' };
                    }
                    return { valid: true, message: 'Téléphone valide' };
                },
                
                validateIdentifier: function(identifier) {
                    if (!identifier || identifier.trim().length === 0) {
                        return { valid: false, message: '' };
                    }
                    const value = identifier.trim();
                    if (value.includes('@')) return this.validateEmail(value);
                    return this.validatePhone(value);
                },
                
                checkPasswordStrength: function(password) {
                    const criteria = {
                        minLength: password.length >= 8,
                        hasUpperCase: /[A-Z]/.test(password),
                        hasLowerCase: /[a-z]/.test(password),
                        hasNumber: /[0-9]/.test(password),
                        hasSpecial: /[!@#$%^&*(),.?":{}|<>]/.test(password)
                    };
                    const metCount = Object.values(criteria).filter(Boolean).length;
                    let strength = 'weak';
                    if (metCount >= 4) strength = 'strong';
                    else if (metCount >= 3) strength = 'fair';
                    return { criteria, strength, metCount };
                }
            };
            
            // ========== TOAST ==========
            const Toast = {
                container: document.getElementById('toastContainer'),
                icons: { success: 'fa-circle-check', error: 'fa-circle-exclamation', warning: 'fa-triangle-exclamation', info: 'fa-circle-info' },
                
                show: function(title, message, type = 'success', duration = 4000) {
                    if (!this.container) return;
                    const el = document.createElement('div');
                    el.className = `toast ${type}`;
                    el.innerHTML = `
                        <i class="fa-solid ${this.icons[type]} toast-icon" aria-hidden="true"></i>
                        <div class="toast-content">
                            <div class="toast-title">${this.escapeHTML(title)}</div>
                            <div class="toast-message">${this.escapeHTML(message)}</div>
                        </div>
                        <button class="toast-close" aria-label="Fermer"><i class="fa-solid fa-xmark"></i></button>
                    `;
                    this.container.appendChild(el);
                    el.querySelector('.toast-close').addEventListener('click', () => {
                        el.classList.remove('show');
                        setTimeout(() => el.remove(), 600);
                    });
                    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
                    if (duration > 0) setTimeout(() => {
                        el.classList.remove('show');
                        setTimeout(() => el.remove(), 600);
                    }, duration);
                },
                
                escapeHTML: function(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                }
            };
            
            // ========== UI ==========
            const UI = (function() {
                let currentMode = 'login';
                let isSubmitting = false;
                
                function render(mode = 'login') {
                    currentMode = mode;
                    const app = document.getElementById('app');
                    if (!app) return;
                    
                    const isLogin = mode === 'login';
                    
                    app.innerHTML = `
                        <div class="auth-card">
                            <div class="auth-header">
                                <div class="logo-wrapper">
                                    <div class="logo-ring-outer" aria-hidden="true"></div>
                                    <div class="logo-ring" aria-hidden="true"></div>
                                    <div class="logo-circle" aria-hidden="true">
                                        <i class="fa-solid fa-store"></i>
                                    </div>
                                </div>
                                <h1>Salam <span class="gradient-text">Market</span></h1>
                                <p>Marché digital premium — Frais, Local, Livré à domicile</p>
                            </div>
                            
                            <div class="saved-accounts" id="savedAccounts" role="list" aria-label="Comptes sauvegardés"></div>
                            
                            <div class="auth-tabs" role="tablist">
                                <button class="auth-tab ${isLogin ? 'active' : ''}" role="tab" id="tabLogin">Se connecter</button>
                                <button class="auth-tab ${!isLogin ? 'active' : ''}" role="tab" id="tabRegister">Créer un compte</button>
                            </div>
                            
                            <form id="authForm" novalidate>
                                <div class="form-group" id="nameGroup" style="display:${isLogin ? 'none' : 'block'}">
                                    <label class="form-label" for="regName">Nom complet</label>
                                    <div class="input-wrapper">
                                        <input type="text" class="form-input" id="regName" placeholder="Votre nom complet" autocomplete="name">
                                        <div class="validation-feedback" id="nameFeedback"></div>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label" for="identifier">Email ou Téléphone</label>
                                    <div class="input-wrapper">
                                        <input type="text" class="form-input" id="identifier" placeholder="email@exemple.com ou +237..." required autocomplete="email">
                                        <div class="validation-feedback" id="identifierFeedback"></div>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label class="form-label" for="password">
                                        Mot de passe
                                        ${!isLogin ? '<span style="font-weight:400;text-transform:none;font-size:0.65rem;">(min. 8 car.)</span>' : ''}
                                    </label>
                                    <div class="input-wrapper">
                                        <input type="password" class="form-input" id="password" placeholder="Votre mot de passe" required autocomplete="${isLogin ? 'current-password' : 'new-password'}">
                                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Afficher/masquer le mot de passe">
                                            <i class="fa-regular fa-eye" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                    ${!isLogin ? `
                                    <div class="password-strength" id="passwordStrength">
                                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                                        <div class="strength-criteria" id="strengthCriteria">
                                            <span class="criteria-item" data-criteria="minLength"><i class="fa-regular fa-circle"></i> 8+ caractères</span>
                                            <span class="criteria-item" data-criteria="hasUpperCase"><i class="fa-regular fa-circle"></i> 1 majuscule</span>
                                            <span class="criteria-item" data-criteria="hasLowerCase"><i class="fa-regular fa-circle"></i> 1 minuscule</span>
                                            <span class="criteria-item" data-criteria="hasNumber"><i class="fa-regular fa-circle"></i> 1 chiffre</span>
                                            <span class="criteria-item" data-criteria="hasSpecial"><i class="fa-regular fa-circle"></i> 1 caractère spécial</span>
                                        </div>
                                    </div>
                                    ` : ''}
                                </div>
                                
                                ${isLogin ? `
                                <div class="forgot-password">
                                    <a href="#" id="forgotPasswordLink">Mot de passe oublié ?</a>
                                </div>
                                ` : ''}
                                
                                <div class="remember-row" id="rememberRow" style="display:${isLogin ? 'flex' : 'none'}">
                                    <input type="checkbox" id="rememberMe" checked>
                                    <label for="rememberMe">Se souvenir de moi</label>
                                </div>
                                
                                <div class="demo-credentials" style="${isLogin ? 'display:block' : 'display:none'}">
                                    <p><i class="fa-solid fa-key"></i> Comptes de démonstration :</p>
                                    <p>👑 Admin : <code>admin@salam.cm</code> / <code>Admin2025!</code></p>
                                    <p>🏪 Fournisseur : <code>toumai@salam.cm</code> / <code>Toumai2025!</code></p>
                                    <p>🛒 Client : <code>client@salam.cm</code> / <code>Client2025!</code></p>
                                </div>
                                
                                <div class="error-message" id="errorMsg" role="alert"></div>
                                
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <i class="fa-solid ${isLogin ? 'fa-right-to-bracket' : 'fa-user-plus'}" aria-hidden="true"></i>
                                    ${isLogin ? 'Se connecter' : 'Créer mon compte'}
                                </button>
                            </form>
                            
                            <button class="btn btn-ghost" id="visitorBtn">
                                <i class="fa-solid fa-eye" aria-hidden="true"></i>
                                Parcourir sans compte
                            </button>
                        </div>
                        
                        <p class="auth-footer">&copy; ${new Date().getFullYear()} <strong>Salam Market PRO</strong> — Ngaoundéré, Cameroun</p>
                    `;
                    
                    renderSavedAccounts();
                    bindMainEvents();
                    
                    if (isLogin) {
                        const saved = AuthService.getSavedAccounts();
                        if (saved.length > 0) {
                            const input = document.getElementById('identifier');
                            if (input) input.value = saved[0].email;
                        }
                    }
                }
                
                function renderSavedAccounts() {
                    const container = document.getElementById('savedAccounts');
                    if (!container) return;
                    const saved = AuthService.getSavedAccounts();
                    if (!saved || saved.length === 0) {
                        container.classList.remove('show');
                        return;
                    }
                    container.classList.add('show');
                    container.innerHTML = saved.map(a => `
                        <div class="saved-account-item" data-email="${escapeAttr(a.email)}" role="listitem">
                            <div class="saved-account-avatar" aria-hidden="true">${a.role === 'admin' ? '👑' : a.role === 'supplier' ? '🏪' : '🛒'}</div>
                            <div class="saved-account-info">
                                <div class="saved-account-name">${escapeHTML(a.name)}</div>
                                <div class="saved-account-email">${escapeHTML(a.email)}</div>
                            </div>
                            <span class="saved-account-role ${a.role}">${a.role}</span>
                            <button class="saved-account-remove" data-email="${escapeAttr(a.email)}" aria-label="Retirer ${escapeHTML(a.name)}">
                                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                            </button>
                        </div>
                    `).join('');
                }
                
                function bindMainEvents() {
                    document.getElementById('tabLogin')?.addEventListener('click', () => render('login'));
                    document.getElementById('tabRegister')?.addEventListener('click', () => render('register'));
                    document.getElementById('togglePassword')?.addEventListener('click', handleTogglePassword);
                    document.getElementById('savedAccounts')?.addEventListener('click', handleSavedAccountClick);
                    
                    const identifierInput = document.getElementById('identifier');
                    identifierInput?.addEventListener('blur', () => validateIdentifierField());
                    identifierInput?.addEventListener('input', debounce(function() { if (this.value.length > 3) validateIdentifierField(); }, 300));
                    
                    const passwordInput = document.getElementById('password');
                    if (currentMode === 'register') {
                        passwordInput?.addEventListener('input', debounce(function() { updatePasswordStrength(this.value); }, 150));
                    }
                    passwordInput?.addEventListener('blur', () => validatePasswordField());
                    
                    document.getElementById('regName')?.addEventListener('blur', () => validateNameField());
                    document.getElementById('authForm')?.addEventListener('submit', handleSubmit);
                    document.getElementById('forgotPasswordLink')?.addEventListener('click', handleForgotPassword);
                    document.getElementById('visitorBtn')?.addEventListener('click', handleVisitorLogin);
                    document.getElementById('closeResetModal')?.addEventListener('click', closeResetModal);
                    document.getElementById('resetForm')?.addEventListener('submit', handleResetSubmit);
                    document.getElementById('resetPasswordModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeResetModal(); });
                }
                
                function validateIdentifierField() {
                    const input = document.getElementById('identifier');
                    const feedback = document.getElementById('identifierFeedback');
                    if (!input || !feedback) return;
                    const value = input.value.trim();
                    if (value.length === 0) {
                        input.classList.remove('valid', 'invalid');
                        feedback.classList.remove('show', 'valid', 'invalid');
                        return;
                    }
                    const result = Validator.validateIdentifier(value);
                    if (result.valid) {
                        input.classList.add('valid');
                        input.classList.remove('invalid');
                        feedback.classList.add('show', 'valid');
                        feedback.classList.remove('invalid');
                        feedback.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${result.message}`;
                    } else {
                        input.classList.add('invalid');
                        input.classList.remove('valid');
                        feedback.classList.add('show', 'invalid');
                        feedback.classList.remove('valid');
                        feedback.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${result.message}`;
                    }
                }
                
                function validatePasswordField() {
                    if (currentMode !== 'register') return;
                    const input = document.getElementById('password');
                    if (!input) return;
                    const value = input.value;
                    if (value.length === 0) {
                        input.classList.remove('valid', 'invalid');
                        return;
                    }
                    const { strength } = Validator.checkPasswordStrength(value);
                    if (strength === 'strong') {
                        input.classList.add('valid');
                        input.classList.remove('invalid');
                    } else if (value.length > 0 && value.length < 8) {
                        input.classList.add('invalid');
                        input.classList.remove('valid');
                    } else {
                        input.classList.remove('valid', 'invalid');
                    }
                }
                
                function validateNameField() {
                    if (currentMode !== 'register') return;
                    const input = document.getElementById('regName');
                    const feedback = document.getElementById('nameFeedback');
                    if (!input || !feedback) return;
                    const value = input.value.trim();
                    if (value.length === 0) {
                        input.classList.remove('valid', 'invalid');
                        feedback.classList.remove('show', 'valid', 'invalid');
                        return;
                    }
                    if (value.length >= 2) {
                        input.classList.add('valid');
                        input.classList.remove('invalid');
                        feedback.classList.add('show', 'valid');
                        feedback.classList.remove('invalid');
                        feedback.innerHTML = `<i class="fa-solid fa-circle-check"></i> Nom valide`;
                    } else {
                        input.classList.add('invalid');
                        input.classList.remove('valid');
                        feedback.classList.add('show', 'invalid');
                        feedback.classList.remove('valid');
                        feedback.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> Minimum 2 caractères`;
                    }
                }
                
                function updatePasswordStrength(password) {
                    const container = document.getElementById('passwordStrength');
                    const fill = document.getElementById('strengthFill');
                    const criteriaContainer = document.getElementById('strengthCriteria');
                    if (!container || !fill || !criteriaContainer) return;
                    if (password.length === 0) {
                        container.classList.remove('show');
                        return;
                    }
                    container.classList.add('show');
                    const { criteria, strength } = Validator.checkPasswordStrength(password);
                    fill.className = 'strength-fill ' + strength;
                    criteriaContainer.querySelectorAll('.criteria-item').forEach(item => {
                        const key = item.dataset.criteria;
                        const icon = item.querySelector('i');
                        if (criteria[key]) {
                            item.classList.add('met');
                            icon.className = 'fa-solid fa-circle-check';
                        } else {
                            item.classList.remove('met');
                            icon.className = 'fa-regular fa-circle';
                        }
                    });
                }
                
                function handleTogglePassword() {
                    const input = document.getElementById('password');
                    const icon = this.querySelector('i');
                    const isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    icon.className = `fa-regular fa-eye${isPassword ? '-slash' : ''}`;
                }
                
                function handleSavedAccountClick(e) {
                    const removeBtn = e.target.closest('.saved-account-remove');
                    const item = e.target.closest('.saved-account-item');
                    if (removeBtn) {
                        e.stopPropagation();
                        AuthService.removeSavedAccount(removeBtn.dataset.email);
                        renderSavedAccounts();
                        Toast.show('Compte retiré', 'Le compte a été retiré.', 'info', 2500);
                    } else if (item) {
                        document.getElementById('identifier').value = item.dataset.email;
                        document.getElementById('password').focus();
                    }
                }
                
                function handleForgotPassword(e) {
                    e.preventDefault();
                    document.getElementById('resetPasswordModal').classList.add('show');
                }
                
                function closeResetModal() {
                    document.getElementById('resetPasswordModal').classList.remove('show');
                }
                
                async function handleResetSubmit(e) {
                    e.preventDefault();
                    const identifier = document.getElementById('resetIdentifier')?.value.trim();
                    const errorEl = document.getElementById('resetError');
                    if (errorEl) errorEl.classList.remove('show');
                    if (!identifier) {
                        if (errorEl) { errorEl.textContent = 'Veuillez entrer votre email ou téléphone.'; errorEl.classList.add('show'); }
                        return;
                    }
                    try {
                        const result = AuthService.resetPassword(identifier);
                        Toast.show('Code envoyé ! 📧', `Un code a été envoyé à ${result.maskedContact}.`, 'success', 5000);
                        closeResetModal();
                    } catch (error) {
                        if (errorEl) { errorEl.textContent = error.message; errorEl.classList.add('show'); }
                    }
                }
                
                async function handleSubmit(e) {
                    e.preventDefault();
                    if (isSubmitting) return;
                    isSubmitting = true;
                    const submitBtn = document.getElementById('submitBtn');
                    const errorEl = document.getElementById('errorMsg');
                    
                    validateIdentifierField();
                    if (currentMode === 'register') {
                        validateNameField();
                        validatePasswordField();
                    }
                    
                    const invalidInputs = document.querySelectorAll('.form-input.invalid');
                    if (invalidInputs.length > 0) {
                        isSubmitting = false;
                        if (errorEl) { errorEl.textContent = 'Veuillez corriger les champs en rouge.'; errorEl.classList.add('show'); }
                        return;
                    }
                    
                    if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Chargement...'; }
                    errorEl?.classList.remove('show');
                    
                    await new Promise(r => setTimeout(r, 300));
                    
                    try {
                        const identifier = document.getElementById('identifier')?.value.trim();
                        const password = document.getElementById('password')?.value;
                        
                        if (!identifier || !password) throw new Error('Veuillez remplir tous les champs obligatoires.');
                        
                        let user;
                        if (currentMode === 'login') {
                            const rememberMe = document.getElementById('rememberMe')?.checked || false;
                            user = AuthService.login(identifier, password, rememberMe);
                            Toast.show('Connexion réussie ! 👋', `Bienvenue ${user.name}`, 'success', 3500);
                        } else {
                            const name = document.getElementById('regName')?.value.trim();
                            const role = 'client';
                            if (!name) throw new Error('Le nom complet est requis.');
                            if (password.length < 8) throw new Error('Le mot de passe doit contenir au moins 8 caractères.');
                            user = AuthService.register(name, identifier, password, role);
                            Toast.show('Compte créé ! 🎉', `Bienvenue ${user.name} !`, 'success', 4000);
                        }
                        setTimeout(() => AuthService.redirect(user.role), 800);
                    } catch (error) {
                        if (errorEl) { errorEl.textContent = error.message; errorEl.classList.add('show'); setTimeout(() => errorEl.classList.remove('show'), 5000); }
                        if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = `<i class="fa-solid ${currentMode === 'login' ? 'fa-right-to-bracket' : 'fa-user-plus'}"></i> ${currentMode === 'login' ? 'Se connecter' : 'Créer mon compte'}`; }
                        isSubmitting = false;
                    }
                }
                
                function handleVisitorLogin() {
                    const user = AuthService.loginAsVisitor();
                    Toast.show('Mode Visiteur', 'Navigation sans identification.', 'info', 3000);
                    setTimeout(() => AuthService.redirect('visitor'), 500);
                }
                
                function escapeHTML(str) {
                    const div = document.createElement('div');
                    div.textContent = str;
                    return div.innerHTML;
                }
                
                function escapeAttr(str) {
                    return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                }
                
                function debounce(fn, delay) {
                    let timeout;
                    return function(...args) {
                        clearTimeout(timeout);
                        timeout = setTimeout(() => fn.apply(this, args), delay);
                    };
                }
                
                return { render };
            })();
            
            // ========== INITIALISATION ==========
            function init() {
                initDefaultData();
                const session = AuthService.getSession();
                if (session) {
                    AuthService.redirect(session.user.role);
                    return;
                }
                UI.render('login');
                console.log('%c🕌 Salam Market PRO %cv5.0 ULTIMATE %c✓ Design luxe — connexion fonctionnelle', 'font-size:1.2em;font-weight:bold;', 'color:#10B981;font-weight:bold;', 'color:#94A3B8;');
                console.log('%c🔑 Identifiants test: admin@salam.cm / Admin2025!', 'color:#FBBF24;');
            }
            
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
