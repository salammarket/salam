<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A14">
    <meta name="description" content="Messagerie intelligente — Salam Market PRO">
    <title>Salam Market PRO · Messagerie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --emerald-400: #34D399; --emerald-500: #10B981; --emerald-600: #059669;
            --violet-400: #A78BFA; --violet-500: #8B5CF6;
            --amber-400: #FBBF24; --amber-500: #F59E0B;
            --blue-400: #60A5FA; --blue-500: #3B82F6;
            --rose-400: #FB7185; --rose-500: #F43F5E;
            --surface-primary: #0A0A14; --surface-card: rgba(15,15,30,0.85);
            --surface-card-solid: #0F0F1E; --surface-input: rgba(10,10,20,0.7);
            --surface-hover: rgba(255,255,255,0.03);
            --border-subtle: rgba(255,255,255,0.04);
            --border-default: rgba(255,255,255,0.08);
            --border-accent: rgba(16,185,129,0.25);
            --text-primary: #F1F5F9; --text-secondary: #CBD5E1;
            --text-muted: #94A3B8; --text-faint: #64748B;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --radius-sm: 10px; --radius-md: 14px; --radius-lg: 18px;
            --radius-xl: 24px; --radius-full: 9999px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
            --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
            --duration-fast: 200ms; --duration-base: 400ms;
            --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
            --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
        }
        body { font-family: var(--font-body); background: var(--surface-primary); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .bg-decoration { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-gradient-1 { position: absolute; width: 150%; height: 100%; background: radial-gradient(ellipse 80% 60% at 10% -20%, rgba(16,185,129,0.06) 0%, transparent 50%); animation: floatBg 20s ease-in-out infinite; }
        @keyframes floatBg { 0%,100% { transform: translate(0,0) rotate(0deg); } 33% { transform: translate(1%,-1%) rotate(0.5deg); } 66% { transform: translate(-1%,1%) rotate(-0.5deg); } }
        
        .sidebar { width: 280px; background: rgba(10,10,20,0.95); backdrop-filter: blur(40px); border-right: 1px solid var(--border-default); position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; display: flex; flex-direction: column; padding: var(--space-6) var(--space-4); transition: transform var(--duration-base) var(--ease-out-expo); }
        .sidebar-header { display: flex; align-items: center; gap: var(--space-3); padding-bottom: var(--space-6); margin-bottom: var(--space-4); border-bottom: 1px solid var(--border-subtle); }
        .sidebar-logo { width: 44px; height: 44px; background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .sidebar-brand h2 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
        .sidebar-brand p { font-size: 0.65rem; color: var(--emerald-400); }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: var(--space-1); }
        .nav-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); color: var(--text-muted); font-size: 0.85rem; font-weight: 500; text-decoration: none; transition: all var(--duration-fast); cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
        .nav-item:hover { background: var(--surface-hover); color: var(--text-secondary); transform: translateX(4px); }
        .nav-item.active { background: rgba(16,185,129,0.08); color: var(--emerald-400); border-left: 2px solid var(--emerald-500); }
        .nav-item i { width: 22px; }
        .nav-badge { margin-left: auto; background: var(--rose-500); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; font-weight: 700; }
        .sidebar-footer { margin-top: auto; padding-top: var(--space-6); border-top: 1px solid var(--border-subtle); }
        .btn-logout { display: flex; align-items: center; gap: var(--space-3); width: 100%; padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); cursor: pointer; transition: all var(--duration-fast); }
        .btn-logout:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: var(--rose-500); }
        
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(10,10,20,0.95); backdrop-filter: blur(40px); border-bottom: 1px solid var(--border-default); z-index: 99; align-items: center; padding: 0 var(--space-4); gap: var(--space-3); }
        .menu-btn { width: 40px; height: 40px; border-radius: var(--radius-sm); background: transparent; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; }
        .mobile-logo { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
        .mobile-logo span { color: var(--emerald-400); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 98; }
        .overlay.show { display: block; }
        
        .main-content { flex: 1; margin-left: 280px; padding: var(--space-6); position: relative; z-index: 1; }
        .chat-container { max-width: 1400px; margin: 0 auto; }
        
        .chat-layout { display: grid; grid-template-columns: 320px 1fr; background: var(--surface-card); backdrop-filter: blur(20px); border: 1px solid var(--border-default); border-radius: var(--radius-xl); overflow: hidden; height: calc(100vh - 80px); min-height: 500px; }
        
        .chat-sidebar { border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; overflow: hidden; }
        .chat-sidebar-header { padding: var(--space-5); border-bottom: 1px solid var(--border-subtle); }
        .chat-sidebar-header h3 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: var(--space-4); display: flex; align-items: center; gap: var(--space-2); }
        .search-chat { position: relative; }
        .search-chat i { position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; }
        .search-chat input { width: 100%; padding: var(--space-2) var(--space-3) var(--space-2) 36px; background: var(--surface-input); border: 1px solid var(--border-default); border-radius: var(--radius-md); color: var(--text-primary); font-size: 0.85rem; outline: none; }
        .contacts-list { flex: 1; overflow-y: auto; padding: var(--space-2); }
        
        .contact-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); cursor: pointer; transition: all var(--duration-fast); margin-bottom: var(--space-1); position: relative; }
        .contact-item:hover { background: var(--surface-hover); transform: translateX(2px); }
        .contact-item.active { background: rgba(16,185,129,0.08); border-left: 2px solid var(--emerald-500); }
        .contact-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--emerald-600), var(--violet-500)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; position: relative; }
        .online-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--emerald-500); border: 2px solid var(--surface-card-solid); position: absolute; bottom: 2px; right: 2px; }
        .offline-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--text-faint); border: 2px solid var(--surface-card-solid); position: absolute; bottom: 2px; right: 2px; }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: var(--space-2); flex-wrap: wrap; }
        .contact-role { font-size: 0.6rem; padding: 2px 6px; border-radius: var(--radius-full); background: rgba(16,185,129,0.12); color: var(--emerald-400); }
        .contact-last-message { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-time { font-size: 0.6rem; color: var(--text-faint); white-space: nowrap; }
        .unread-badge { background: var(--emerald-500); color: white; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
        .ai-badge { background: var(--violet-500); color: white; font-size: 0.55rem; padding: 2px 6px; border-radius: var(--radius-full); margin-left: var(--space-2); }
        
        .chat-main { display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: var(--space-4) var(--space-6); border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-3); }
        .chat-header-info { display: flex; align-items: center; gap: var(--space-3); }
        .chat-header-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--emerald-600), var(--violet-500)); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .chat-header-name { font-weight: 700; font-size: 1rem; }
        .chat-header-status { font-size: 0.65rem; color: var(--text-muted); }
        .chat-actions { display: flex; gap: var(--space-2); }
        .chat-action-btn { width: 36px; height: 36px; border-radius: 50%; background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); cursor: pointer; transition: all var(--duration-fast); }
        .chat-action-btn:hover { background: var(--surface-hover); color: var(--emerald-400); transform: scale(1.05); }
        
        .messages-area { flex: 1; overflow-y: auto; padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-3); }
        .message { display: flex; max-width: 70%; animation: messageIn 0.3s var(--ease-out-expo); }
        @keyframes messageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: var(--space-3) var(--space-4); border-radius: var(--radius-lg); font-size: 0.85rem; line-height: 1.4; position: relative; }
        .message.sent .message-bubble { background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); color: white; border-bottom-right-radius: var(--radius-sm); }
        .message.received .message-bubble { background: var(--surface-input); border: 1px solid var(--border-default); border-bottom-left-radius: var(--radius-sm); }
        .message-ai .message-bubble { background: rgba(139,92,246,0.15); border: 1px solid var(--violet-400); border-bottom-left-radius: var(--radius-sm); }
        .message-time { font-size: 0.55rem; color: var(--text-faint); margin-top: var(--space-1); text-align: right; }
        .message.sent .message-time { color: rgba(255,255,255,0.6); }
        
        .typing-indicator { padding: var(--space-2) var(--space-4); font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: var(--space-2); }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
        
        .chat-input-area { padding: var(--space-4) var(--space-6); border-top: 1px solid var(--border-subtle); display: flex; gap: var(--space-3); align-items: flex-end; }
        .input-wrapper { flex: 1; position: relative; }
        .chat-input { width: 100%; padding: var(--space-3) var(--space-4); background: var(--surface-input); border: 1.5px solid var(--border-default); border-radius: var(--radius-lg); color: var(--text-primary); font-size: 0.9rem; font-family: inherit; resize: none; outline: none; transition: all var(--duration-fast); }
        .chat-input:focus { border-color: var(--border-accent); box-shadow: 0 0 0 3px rgba(16,185,129,0.08); }
        .input-actions { display: flex; gap: var(--space-2); }
        .input-btn { width: 44px; height: 44px; border-radius: 50%; background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); cursor: pointer; transition: all var(--duration-fast); display: flex; align-items: center; justify-content: center; }
        .input-btn:hover { background: var(--surface-hover); color: var(--emerald-400); transform: scale(1.05); }
        .send-btn { background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); border: none; color: white; }
        .send-btn:hover { transform: scale(1.05); }
        
        .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text-muted); gap: var(--space-4); padding: var(--space-6); }
        .empty-chat-icon { font-size: 4rem; opacity: 0.5; }
        
        .toast-container { position: fixed; bottom: var(--space-5); right: var(--space-5); z-index: 200; display: flex; flex-direction: column; gap: var(--space-3); }
        .toast { background: var(--surface-card-solid); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: var(--space-4) var(--space-5); display: flex; align-items: center; gap: var(--space-3); min-width: 280px; transform: translateX(120%); opacity: 0; transition: all 0.5s var(--ease-out-expo); }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--emerald-500); }
        .toast.error { border-left: 3px solid var(--rose-500); }
        .toast.info { border-left: 3px solid var(--violet-400); }
        .toast.success .toast-icon { color: var(--emerald-400); }
        .toast.error .toast-icon { color: var(--rose-500); }
        .toast.info .toast-icon { color: var(--violet-400); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; padding-top: 76px; }
            .chat-layout { grid-template-columns: 1fr; height: calc(100vh - 100px); }
            .chat-sidebar { display: none; }
            .chat-sidebar.mobile-visible { display: flex; position: absolute; inset: 0; z-index: 10; background: var(--surface-card-solid); }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration" aria-hidden="true"><div class="bg-gradient-1"></div></div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    
    <header class="mobile-header">
        <button class="menu-btn" onclick="openSidebar()"><i class="fa-solid fa-bars"></i></button>
        <span class="mobile-logo">Salam <span>Market</span></span>
        <button class="menu-btn" onclick="toggleMobileChatSidebar()">
            <i class="fa-solid fa-users"></i>
            <span id="mobileUnreadBadge" style="position:absolute; top:8px; right:16px; background:var(--emerald-500); border-radius:50%; width:18px; height:18px; font-size:10px; display:none;"></span>
        </button>
    </header>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo"><i class="fa-solid fa-store"></i></div><div class="sidebar-brand"><h2>Salam Market</h2><p>PRO v5.0</p></div></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-chart-line"></i> Tableau de Bord</a>
            <a href="products.html" class="nav-item"><i class="fa-solid fa-basket-shopping"></i> Catalogue</a>
            <a href="cart.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i> Panier</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-box"></i> Commandes</a>
            <a href="tracking.html" class="nav-item"><i class="fa-solid fa-map-location-dot"></i> Suivi Live</a>
            <a href="chat.html" class="nav-item active"><i class="fa-solid fa-comments"></i> Chat</a>
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Profil</a>
        </nav>
        <div class="sidebar-footer"><button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button></div>
    </aside>
    
    <main class="main-content">
        <div class="chat-container">
            <div class="chat-layout" id="chatLayout">
                <div class="chat-sidebar" id="chatSidebar">
                    <div class="chat-sidebar-header">
                        <h3><i class="fa-regular fa-message"></i> Messages</h3>
                        <div class="search-chat"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchContact" placeholder="Rechercher un contact..." oninput="filterContacts()"></div>
                    </div>
                    <div class="contacts-list" id="contactsList"></div>
                </div>
                
                <div class="chat-main" id="chatMain">
                    <div class="empty-chat" id="emptyChat">
                        <div class="empty-chat-icon">💬</div>
                        <h3>Messagerie Salam Market</h3>
                        <p>Sélectionnez une conversation pour commencer à discuter</p>
                        <p style="font-size: 0.8rem;">Contactez le support, vos fournisseurs ou l'équipe Salam</p>
                    </div>
                    
                    <div id="activeChat" style="display: none; flex-direction: column; height: 100%;">
                        <div class="chat-header" id="chatHeader"></div>
                        <div class="messages-area" id="messagesArea"></div>
                        <div class="typing-indicator" id="typingIndicator" style="display: none;">
                            <div class="typing-dots"><span></span><span></span><span></span></div>
                            <span id="typingName">Quelqu'un</span> est en train d'écrire...
                        </div>
                        <div class="chat-input-area">
                            <div class="input-wrapper"><textarea class="chat-input" id="chatInput" placeholder="Votre message..." rows="1" onkeypress="handleKeyPress(event)"></textarea></div>
                            <div class="input-actions">
                                <button class="input-btn" onclick="attachFile()" title="Joindre un fichier"><i class="fa-solid fa-paperclip"></i></button>
                                <button class="input-btn" onclick="openEmojiPicker()" title="Emojis"><i class="fa-regular fa-face-smile"></i></button>
                                <button class="input-btn send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div id="emojiPicker" style="display: none; position: fixed; bottom: 80px; right: 20px; background: var(--surface-card-solid); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: var(--space-3); z-index: 150; display: grid; grid-template-columns: repeat(8, 1fr); gap: var(--space-2);"></div>
    <div class="toast-container" id="toastContainer"></div>
    
    <script>
        (() => {
            'use strict';
            
            const session = JSON.parse(localStorage.getItem('salam_session') || 'null');
            if (!session) { window.location.href = '../index.html'; return; }
            
            const currentUser = session.user;
            const currentUserId = currentUser.id;
            const currentUserName = currentUser.name;
            const currentUserRole = currentUser.role;
            
            // Numéro réel pour les notifications (WhatsApp, SMS, Email)
            const REAL_PHONE_NUMBER = '+237688282662';
            const REAL_EMAIL = 'contact@salamarket.cm';
            
            let conversations = [];
            let currentChatId = null;
            let currentChatUser = null;
            let typingTimeout = null;
            let messageInterval = null;
            
            // IA Responses intelligentes
            const AI_RESPONSES = {
                greeting: [
                    "Bonjour ! Je suis l'assistant Salam Market. Comment puis-je vous aider aujourd'hui ?",
                    "Bienvenue sur Salam Market ! Un conseiller vous répondra dans les plus brefs délais. En attendant, je suis là pour vous aider !",
                    "Salut ! 👋 Je suis l'assistant virtuel de Salam Market. Que puis-je faire pour vous ?"
                ],
                product: [
                    "Pour les informations sur nos produits, je vous invite à consulter notre catalogue. Un fournisseur vous répondra bientôt !",
                    "Nos produits sont de qualité premium. Vous pouvez les découvrir dans l'onglet Catalogue.",
                    "Je vous recommande de parcourir notre catalogue pour trouver ce que vous cherchez !"
                ],
                delivery: [
                    "La livraison est généralement effectuée dans l'heure suivant la confirmation de commande. Vous pouvez suivre votre commande en temps réel.",
                    "Notre service de livraison est rapide et fiable. Suivez votre colis en direct dans l'onglet Suivi Live !",
                    "Un livreur sera assigné à votre commande sous peu. Merci de votre patience !"
                ],
                payment: [
                    "Nous acceptons Orange Money, MTN Mobile Money et les cartes bancaires. Tout est sécurisé !",
                    "Le paiement est 100% sécurisé. Vous pouvez payer par Mobile Money ou carte bancaire.",
                    "Pour toute question sur le paiement, notre service client est à votre disposition."
                ],
                default: [
                    "Merci pour votre message ! Un conseiller Salam Market vous répondra très bientôt. En attendant, puis-je faire autre chose pour vous ?",
                    "Je prends note de votre demande. Notre équipe vous contactera dans les plus brefs délais. Merci de votre patience ! 🙏",
                    "Votre message a bien été transmis à notre équipe. Nous vous répondons dans la journée. Bonne journée sur Salam Market ! 🌟"
                ]
            };
            
            function getAIResponse(message) {
                const msg = message.toLowerCase();
                if (msg.includes('bonjour') || msg.includes('salut') || msg.includes('coucou') || msg.includes('hello')) {
                    return AI_RESPONSES.greeting[Math.floor(Math.random() * AI_RESPONSES.greeting.length)];
                } else if (msg.includes('produit') || msg.includes('article') || msg.includes('catalogue') || msg.includes('commander')) {
                    return AI_RESPONSES.product[Math.floor(Math.random() * AI_RESPONSES.product.length)];
                } else if (msg.includes('livraison') || msg.includes('livreur') || msg.includes('delivery') || msg.includes('colis')) {
                    return AI_RESPONSES.delivery[Math.floor(Math.random() * AI_RESPONSES.delivery.length)];
                } else if (msg.includes('paiement') || msg.includes('payer') || msg.includes('carte') || msg.includes('orange') || msg.includes('mtn')) {
                    return AI_RESPONSES.payment[Math.floor(Math.random() * AI_RESPONSES.payment.length)];
                } else {
                    return AI_RESPONSES.default[Math.floor(Math.random() * AI_RESPONSES.default.length)];
                }
            }
            
            // Envoi de notification WhatsApp (simulation - API réelle à configurer)
            function sendWhatsAppNotification(phoneNumber, message, recipientName) {
                // Simulation d'envoi WhatsApp (dans la vraie vie, utiliser Twilio ou WhatsApp Business API)
                console.log(`📱 [WHATSAPP] À ${phoneNumber} : ${message}`);
                
                // Stocker dans l'historique des notifications
                const notifications = JSON.parse(localStorage.getItem('salam_notifications') || '[]');
                notifications.push({
                    id: Date.now(),
                    type: 'whatsapp',
                    to: phoneNumber,
                    toName: recipientName,
                    message: message,
                    date: new Date().toISOString(),
                    sent: true
                });
                localStorage.setItem('salam_notifications', JSON.stringify(notifications));
                return true;
            }
            
            // Envoi de notification SMS (simulation)
            function sendSMSNotification(phoneNumber, message, recipientName) {
                console.log(`💬 [SMS] À ${phoneNumber} : ${message}`);
                const notifications = JSON.parse(localStorage.getItem('salam_notifications') || '[]');
                notifications.push({
                    id: Date.now(),
                    type: 'sms',
                    to: phoneNumber,
                    toName: recipientName,
                    message: message,
                    date: new Date().toISOString(),
                    sent: true
                });
                localStorage.setItem('salam_notifications', JSON.stringify(notifications));
                return true;
            }
            
            // Envoi de notification Email (simulation)
            function sendEmailNotification(email, message, recipientName) {
                console.log(`📧 [EMAIL] À ${email} : ${message}`);
                const notifications = JSON.parse(localStorage.getItem('salam_notifications') || '[]');
                notifications.push({
                    id: Date.now(),
                    type: 'email',
                    to: email,
                    toName: recipientName,
                    message: message,
                    date: new Date().toISOString(),
                    sent: true
                });
                localStorage.setItem('salam_notifications', JSON.stringify(notifications));
                return true;
            }
            
            // Notifier un fournisseur via tous les canaux
            function notifySupplier(supplier, customerName, message) {
                const notificationText = `🛒 Nouveau message de ${customerName} (client Salam Market) :\n\n"${message.substring(0, 200)}"\n\nPour répondre, connectez-vous à votre espace fournisseur sur Salam Market PRO.`;
                
                // WhatsApp
                sendWhatsAppNotification(REAL_PHONE_NUMBER, notificationText, supplier.name);
                // SMS
                sendSMSNotification(REAL_PHONE_NUMBER, notificationText.substring(0, 160), supplier.name);
                // Email (si email disponible)
                if (supplier.email) {
                    sendEmailNotification(supplier.email, notificationText, supplier.name);
                }
                // Email de secours
                sendEmailNotification(REAL_EMAIL, notificationText, supplier.name);
            }
            
            // Vérifier si un fournisseur est disponible (online)
            function isSupplierOnline(supplierId) {
                const onlineStatus = JSON.parse(localStorage.getItem('salam_online_status') || '{}');
                const lastSeen = onlineStatus[supplierId];
                if (!lastSeen) return false;
                // Considéré en ligne si actif dans les 5 dernières minutes
                return (Date.now() - lastSeen) < 5 * 60 * 1000;
            }
            
            // Mettre à jour le statut en ligne
            function updateOnlineStatus() {
                if (currentUserRole === 'supplier') {
                    const onlineStatus = JSON.parse(localStorage.getItem('salam_online_status') || '{}');
                    onlineStatus[currentUserId] = Date.now();
                    localStorage.setItem('salam_online_status', JSON.stringify(onlineStatus));
                }
            }
            
            // Ping toutes les 30 secondes pour maintenir le statut
            setInterval(updateOnlineStatus, 30000);
            updateOnlineStatus();
            
            const getAvailableContacts = () => {
                const users = JSON.parse(localStorage.getItem('salam_users') || '[]');
                const suppliers = JSON.parse(localStorage.getItem('salam_suppliers') || '[]');
                const onlineStatus = JSON.parse(localStorage.getItem('salam_online_status') || '{}');
                let contacts = [];
                
                contacts.push({ id: 'support', name: 'Service Client Salam', role: 'support', avatar: '🎧', email: REAL_EMAIL, phone: REAL_PHONE_NUMBER, online: true });
                
                if (currentUserRole !== 'admin') {
                    const admin = users.find(u => u.role === 'admin');
                    if (admin) contacts.push({ id: admin.id, name: admin.name, role: 'admin', avatar: '👑', email: admin.email, phone: admin.phone, online: true });
                }
                
                if (currentUserRole === 'client') {
                    suppliers.forEach(s => {
                        if (s.status === 'actif') {
                            const isOnline = onlineStatus[s.id] && (Date.now() - onlineStatus[s.id]) < 5 * 60 * 1000;
                            contacts.push({ id: `supplier_${s.id}`, name: s.name, role: 'supplier', avatar: '🏪', email: s.email, phone: s.phone, category: s.category, online: isOnline, realId: s.id });
                        }
                    });
                    const supplierUsers = users.filter(u => u.role === 'supplier');
                    supplierUsers.forEach(s => {
                        if (!contacts.find(c => c.name === s.name)) {
                            const isOnline = onlineStatus[s.id] && (Date.now() - onlineStatus[s.id]) < 5 * 60 * 1000;
                            contacts.push({ id: s.id, name: s.name, role: 'supplier', avatar: '🏪', email: s.email, phone: s.phone, online: isOnline });
                        }
                    });
                }
                
                if (currentUserRole === 'supplier' || currentUserRole === 'admin') {
                    const clients = users.filter(u => u.role === 'client');
                    clients.forEach(c => contacts.push({ id: c.id, name: c.name, role: 'client', avatar: '🛒', email: c.email, phone: c.phone, online: false }));
                }
                
                const uniqueContacts = [];
                const seen = new Set();
                for (const contact of contacts) {
                    if (!seen.has(contact.id)) { seen.add(contact.id); uniqueContacts.push(contact); }
                }
                return uniqueContacts;
            };
            
            const loadConversations = () => {
                const saved = localStorage.getItem('salam_messages');
                const allMessages = saved ? JSON.parse(saved) : [];
                const contacts = getAvailableContacts();
                const conversationsMap = new Map();
                
                allMessages.forEach(msg => {
                    const otherId = msg.from === currentUserId ? msg.to : msg.from;
                    if (!conversationsMap.has(otherId)) {
                        const contact = contacts.find(c => c.id === otherId);
                        if (contact) conversationsMap.set(otherId, { contact, messages: [], lastMessage: null, unreadCount: 0 });
                    }
                    if (conversationsMap.has(otherId)) {
                        const conv = conversationsMap.get(otherId);
                        conv.messages.push(msg);
                        if (!conv.lastMessage || new Date(msg.timestamp) > new Date(conv.lastMessage.timestamp)) conv.lastMessage = msg;
                        if (!msg.read && msg.to === currentUserId) conv.unreadCount++;
                    }
                });
                
                contacts.forEach(contact => {
                    if (!conversationsMap.has(contact.id)) conversationsMap.set(contact.id, { contact, messages: [], lastMessage: null, unreadCount: 0 });
                });
                
                conversations = Array.from(conversationsMap.values());
                conversations.sort((a, b) => {
                    const dateA = a.lastMessage ? new Date(a.lastMessage.timestamp) : new Date(0);
                    const dateB = b.lastMessage ? new Date(b.lastMessage.timestamp) : new Date(0);
                    return dateB - dateA;
                });
                
                renderContactsList();
                updateUnreadBadge();
                
                if (currentChatId) {
                    const conv = conversations.find(c => c.contact.id === currentChatId);
                    if (conv) { currentChatUser = conv.contact; renderChatHeader(); renderMessages(conv.messages); markMessagesAsRead(currentChatId); }
                }
            };
            
            const renderContactsList = () => {
                const container = document.getElementById('contactsList');
                const searchTerm = document.getElementById('searchContact')?.value.toLowerCase() || '';
                let filtered = [...conversations];
                if (searchTerm) filtered = filtered.filter(c => c.contact.name.toLowerCase().includes(searchTerm) || (c.contact.role && c.contact.role.toLowerCase().includes(searchTerm)));
                
                container.innerHTML = filtered.map(conv => {
                    const lastMsg = conv.lastMessage;
                    const lastMsgPreview = lastMsg ? (lastMsg.text.length > 40 ? lastMsg.text.substring(0, 40) + '...' : lastMsg.text) : 'Nouveau contact';
                    const lastMsgTime = lastMsg ? formatTime(lastMsg.timestamp) : '';
                    const isActive = currentChatId === conv.contact.id;
                    const isOnline = conv.contact.online === true;
                    
                    return `<div class="contact-item ${isActive ? 'active' : ''}" onclick="selectChat('${conv.contact.id}')">
                        <div class="contact-avatar" style="position: relative;">${conv.contact.avatar}${isOnline ? '<span class="online-dot"></span>' : '<span class="offline-dot"></span>'}</div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(conv.contact.name)}<span class="contact-role">${getRoleLabel(conv.contact.role)}</span></div>
                            <div class="contact-last-message">${escapeHtml(lastMsgPreview)}</div>
                        </div>
                        <div style="text-align: right;"><div class="contact-time">${lastMsgTime}</div>${conv.unreadCount > 0 ? `<div class="unread-badge">${conv.unreadCount}</div>` : ''}</div>
                    </div>`;
                }).join('');
                if (filtered.length === 0) container.innerHTML = '<div style="text-align:center;padding:var(--space-8);color:var(--text-muted);">Aucun contact trouvé</div>';
            };
            
            const renderChatHeader = () => {
                if (!currentChatUser) return;
                const isOnline = currentChatUser.online === true;
                const header = document.getElementById('chatHeader');
                header.innerHTML = `<div class="chat-header-info"><div class="chat-header-avatar">${currentChatUser.avatar}</div><div><div class="chat-header-name">${escapeHtml(currentChatUser.name)}</div><div class="chat-header-status">${isOnline ? '🟢 En ligne' : '⚫ Hors ligne'} ${currentChatUser.role === 'supplier' && currentChatUser.category ? ` · ${currentChatUser.category}` : ''}</div></div></div>
                    <div class="chat-actions"><button class="chat-action-btn" onclick="viewContactInfo()" title="Informations"><i class="fa-solid fa-circle-info"></i></button><button class="chat-action-btn" onclick="clearChat()" title="Effacer la conversation"><i class="fa-solid fa-trash"></i></button></div>`;
            };
            
            const renderMessages = (messages) => {
                const container = document.getElementById('messagesArea');
                if (!container) return;
                const sortedMessages = [...messages].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                container.innerHTML = sortedMessages.map(msg => {
                    const isSent = msg.from === currentUserId;
                    const isAI = msg.isAI === true;
                    let messageClass = isSent ? 'sent' : (isAI ? 'message-ai' : 'received');
                    if (!isSent && isAI) messageClass = 'message-ai';
                    else if (!isSent) messageClass = 'received';
                    else messageClass = 'sent';
                    return `<div class="message ${messageClass}"><div><div class="message-bubble">${escapeHtml(msg.text)}${msg.isAI ? '<span class="ai-badge"><i class="fa-solid fa-robot"></i> IA</span>' : ''}</div><div class="message-time">${formatTime(msg.timestamp)}</div></div></div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            };
            
            const sendMessage = async () => {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text || !currentChatId) return;
                
                const message = { id: Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6), from: currentUserId, fromName: currentUserName, to: currentChatId, text: text, timestamp: new Date().toISOString(), read: false };
                const saved = localStorage.getItem('salam_messages');
                const allMessages = saved ? JSON.parse(saved) : [];
                allMessages.push(message);
                localStorage.setItem('salam_messages', JSON.stringify(allMessages));
                input.value = ''; input.style.height = 'auto';
                loadConversations();
                showToast('Message envoyé', text.substring(0, 50), 'success');
                stopTyping();
                
                // Gestion des réponses intelligentes
                const receiver = getReceiverInfo(currentChatId);
                const isSupplierOrAdmin = receiver && (receiver.role === 'supplier' || receiver.role === 'admin');
                const isOnline = receiver ? receiver.online === true : false;
                
                if (isSupplierOrAdmin && !isOnline) {
                    // Fournisseur hors ligne → réponse IA + notifications
                    setTimeout(async () => {
                        const aiResponse = getAIResponse(text);
                        const aiMessage = { id: Date.now().toString() + '_ai', from: currentChatId, fromName: receiver.name, to: currentUserId, text: aiResponse, timestamp: new Date().toISOString(), read: false, isAI: true };
                        const msgs = JSON.parse(localStorage.getItem('salam_messages') || '[]');
                        msgs.push(aiMessage);
                        localStorage.setItem('salam_messages', JSON.stringify(msgs));
                        loadConversations();
                        showToast('Réponse automatique', 'Un assistant IA vous a répondu', 'info');
                        
                        // Notifier le fournisseur par WhatsApp/SMS/Email
                        if (receiver.phone || receiver.email) {
                            notifySupplier(receiver, currentUserName, text);
                            showToast('Notification envoyée', `Le fournisseur a été notifié sur WhatsApp/SMS/Email`, 'success');
                        }
                    }, 1000);
                } else if (isSupplierOrAdmin && isOnline) {
                    // Fournisseur en ligne → pas d'IA, message normal
                    showToast('Message envoyé', 'Le fournisseur est en ligne, il vous répondra bientôt', 'info');
                } else if (receiver && receiver.role === 'support') {
                    // Support → réponse IA si besoin
                    setTimeout(() => {
                        const aiResponse = "Merci pour votre message ! L'équipe Salam Market vous répond dans les minutes à venir. En attendant, je reste à votre disposition. 🙏";
                        const aiMessage = { id: Date.now().toString() + '_ai_support', from: 'support', fromName: 'Service Client Salam', to: currentUserId, text: aiResponse, timestamp: new Date().toISOString(), read: false, isAI: true };
                        const msgs = JSON.parse(localStorage.getItem('salam_messages') || '[]');
                        msgs.push(aiMessage);
                        localStorage.setItem('salam_messages', JSON.stringify(msgs));
                        loadConversations();
                    }, 1500);
                }
            };
            
            const getReceiverInfo = (contactId) => {
                const contacts = getAvailableContacts();
                return contacts.find(c => c.id === contactId);
            };
            
            const markMessagesAsRead = (contactId) => {
                const saved = localStorage.getItem('salam_messages');
                if (!saved) return;
                let allMessages = JSON.parse(saved);
                let updated = false;
                allMessages = allMessages.map(msg => {
                    if (msg.from === contactId && msg.to === currentUserId && !msg.read) { updated = true; return { ...msg, read: true }; }
                    return msg;
                });
                if (updated) { localStorage.setItem('salam_messages', JSON.stringify(allMessages)); loadConversations(); }
            };
            
            const selectChat = (contactId) => {
                currentChatId = contactId;
                const conv = conversations.find(c => c.contact.id === contactId);
                if (conv) currentChatUser = conv.contact;
                document.getElementById('emptyChat').style.display = 'none';
                document.getElementById('activeChat').style.display = 'flex';
                renderChatHeader();
                renderMessages(conv ? conv.messages : []);
                markMessagesAsRead(contactId);
                if (window.innerWidth <= 768) document.getElementById('chatSidebar').classList.remove('mobile-visible');
                document.getElementById('chatInput').focus();
            };
            
            const handleKeyPress = (event) => { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); } else if (event.key !== 'Enter') startTyping(); };
            const startTyping = () => { if (typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => stopTyping(), 1500); };
            const stopTyping = () => { if (typingTimeout) clearTimeout(typingTimeout); };
            
            const formatTime = (isoString) => {
                const date = new Date(isoString), now = new Date(), diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
                if (diffDays === 0) return date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                else if (diffDays === 1) return 'Hier';
                else if (diffDays < 7) return date.toLocaleDateString('fr-FR', { weekday: 'short' });
                else return date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
            };
            
            const getRoleLabel = (role) => { const roles = { admin: 'Admin', supplier: 'Fournisseur', client: 'Client', support: 'Support' }; return roles[role] || role; };
            
            const updateUnreadBadge = () => {
                const totalUnread = conversations.reduce((sum, c) => sum + c.unreadCount, 0);
                const badge = document.getElementById('mobileUnreadBadge');
                if (totalUnread > 0) { if (badge) { badge.textContent = totalUnread > 9 ? '9+' : totalUnread; badge.style.display = ''; } }
                else { if (badge) badge.style.display = 'none'; }
            };
            
            const filterContacts = () => renderContactsList();
            const attachFile = () => showToast('Fichier', 'Fonctionnalité disponible prochainement', 'info');
            
            const openEmojiPicker = () => {
                const picker = document.getElementById('emojiPicker');
                const emojis = ['😀', '😊', '😂', '🥰', '😍', '👍', '🙏', '❤️', '🎉', '🔥', '⭐', '✅', '👋', '🤝', '🍕', '🛒', '🚚', '📦'];
                if (picker.style.display === 'grid') picker.style.display = 'none';
                else {
                    picker.innerHTML = emojis.map(emoji => `<button style="background:none;border:none;font-size:1.5rem;cursor:pointer;padding:var(--space-1);" onclick="insertEmoji('${emoji}')">${emoji}</button>`).join('');
                    picker.style.display = 'grid';
                    setTimeout(() => { document.addEventListener('click', function closePicker(e) { if (!picker.contains(e.target) && !e.target.closest('.input-btn')) { picker.style.display = 'none'; document.removeEventListener('click', closePicker); } }); }, 100);
                }
            };
            
            const insertEmoji = (emoji) => { const input = document.getElementById('chatInput'); input.value += emoji; input.focus(); document.getElementById('emojiPicker').style.display = 'none'; };
            
            const clearChat = () => {
                if (!confirm('Voulez-vous vraiment effacer toute cette conversation ?')) return;
                const saved = localStorage.getItem('salam_messages');
                if (!saved) return;
                let allMessages = JSON.parse(saved);
                allMessages = allMessages.filter(msg => !(msg.from === currentUserId && msg.to === currentChatId) && !(msg.from === currentChatId && msg.to === currentUserId));
                localStorage.setItem('salam_messages', JSON.stringify(allMessages));
                loadConversations();
                selectChat(currentChatId);
                showToast('Conversation effacée', '', 'success');
            };
            
            const viewContactInfo = () => { if (currentChatUser) showToast('Contact', `${currentChatUser.name} - ${getRoleLabel(currentChatUser.role)}`, 'info'); };
            const toggleMobileChatSidebar = () => document.getElementById('chatSidebar').classList.toggle('mobile-visible');
            
            const startAutoRefresh = () => { if (messageInterval) clearInterval(messageInterval); messageInterval = setInterval(() => loadConversations(), 5000); };
            const stopAutoRefresh = () => { if (messageInterval) clearInterval(messageInterval); };
            
            const init = () => {
                const saved = localStorage.getItem('salam_messages');
                if (!saved) {
                    const welcomeMessages = [{ id: 'welcome_1', from: 'support', fromName: 'Service Client Salam', to: currentUserId, text: '👋 Bonjour ! Bienvenue sur Salam Market PRO. Je suis votre assistant IA. Comment puis-je vous aider aujourd\'hui ?', timestamp: new Date().toISOString(), read: false, isAI: true }];
                    localStorage.setItem('salam_messages', JSON.stringify(welcomeMessages));
                }
                loadConversations();
                startAutoRefresh();
                const textarea = document.getElementById('chatInput');
                if (textarea) textarea.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
            };
            
            const showToast = (title, message, type = 'success', duration = 3000) => {
                const container = document.getElementById('toastContainer');
                if (!container) return;
                const icons = { success: 'fa-circle-check', error: 'fa-circle-exclamation', info: 'fa-circle-info' };
                const toast = document.createElement('div'); toast.className = `toast ${type}`;
                toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.success} toast-icon"></i><div class="toast-content"><div class="toast-title">${escapeHtml(title)}</div><div class="toast-message">${escapeHtml(message)}</div></div><button class="toast-close" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>`;
                container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, duration);
            };
            
            const escapeHtml = (str) => { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };
            const openSidebar = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); };
            const closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };
            const logout = () => { stopAutoRefresh(); localStorage.removeItem('salam_session'); localStorage.removeItem('salam_cart'); window.location.href = '../index.html'; };
            
            window.selectChat = selectChat; window.sendMessage = sendMessage; window.handleKeyPress = handleKeyPress; window.attachFile = attachFile;
            window.openEmojiPicker = openEmojiPicker; window.insertEmoji = insertEmoji; window.clearChat = clearChat; window.viewContactInfo = viewContactInfo;
            window.filterContacts = filterContacts; window.toggleMobileChatSidebar = toggleMobileChatSidebar; window.openSidebar = openSidebar;
            window.closeSidebar = closeSidebar; window.logout = logout;
            
            init();
        })();
    </script>
</body>
</html>
