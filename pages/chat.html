<!-- pages/chat.html - Messagerie Client temps réel -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0A0A14">
    <meta name="description" content="Messagerie — Salam Market PRO">
    <title>Salam Market PRO · Messagerie</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --emerald-400: #34D399; --emerald-500: #10B981; --emerald-600: #059669;
            --violet-400: #A78BFA; --violet-500: #8B5CF6;
            --amber-400: #FBBF24; --amber-500: #F59E0B;
            --blue-400: #60A5FA; --blue-500: #3B82F6;
            --rose-400: #FB7185; --rose-500: #F43F5E;
            
            --surface-primary: #0A0A14;
            --surface-card: rgba(15, 15, 30, 0.85);
            --surface-card-solid: #0F0F1E;
            --surface-input: rgba(10, 10, 20, 0.7);
            --surface-hover: rgba(255, 255, 255, 0.03);
            
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-default: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(16, 185, 129, 0.25);
            
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-muted: #94A3B8;
            --text-faint: #64748B;
            
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --radius-sm: 10px; --radius-md: 14px; --radius-lg: 18px; --radius-xl: 24px;
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px; --space-6: 24px;
        }
        
        body { font-family: var(--font-body); background: var(--surface-primary); color: var(--text-primary); min-height: 100vh; }
        .bg-decoration { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-gradient-1 { position: absolute; width: 150%; height: 100%; background: radial-gradient(ellipse 80% 60% at 10% -20%, rgba(16,185,129,0.06) 0%, transparent 50%); }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border-default);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            transition: transform 0.4s var(--ease-out-expo);
        }
        .sidebar-header { display: flex; align-items: center; gap: 12px; padding-bottom: 24px; margin-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
        .sidebar-logo { width: 44px; height: 44px; background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .sidebar-brand h2 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
        .sidebar-brand p { font-size: 0.65rem; color: var(--emerald-400); }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 14px;
            color: var(--text-muted); font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
            cursor: pointer; border: none; background: none; width: 100%; text-align: left;
            text-decoration: none;
        }
        .nav-item:hover { background: var(--surface-hover); color: var(--text-secondary); transform: translateX(4px); }
        .nav-item.active { background: rgba(16,185,129,0.08); color: var(--emerald-400); border-left: 2px solid var(--emerald-500); }
        .nav-item i { width: 22px; }
        .nav-badge { margin-left: auto; background: var(--rose-500); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; font-weight: 700; }
        .sidebar-footer { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border-subtle); }
        .btn-logout {
            display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px;
            border-radius: 14px; background: transparent; border: 1px solid var(--border-default);
            color: var(--text-muted); cursor: pointer;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: var(--rose-500); }
        
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(10,10,20,0.95); backdrop-filter: blur(40px); border-bottom: 1px solid var(--border-default); z-index: 99; align-items: center; justify-content: space-between; padding: 0 16px; }
        .menu-btn { width: 40px; height: 40px; border-radius: 10px; background: transparent; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; }
        .mobile-logo { font-family: var(--font-display); font-weight: 700; }
        .mobile-logo span { color: var(--emerald-400); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 98; }
        .overlay.show { display: block; }
        
        .main-content { flex: 1; margin-left: 280px; padding: 24px; position: relative; z-index: 1; }
        .chat-container { max-width: 1400px; margin: 0 auto; }
        
        /* Chat Layout */
        .chat-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            background: var(--surface-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-default);
            border-radius: 24px;
            overflow: hidden;
            height: calc(100vh - 80px);
            min-height: 500px;
        }
        
        /* Contacts sidebar */
        .chat-sidebar {
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-subtle); }
        .chat-sidebar-header h3 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .search-chat { position: relative; }
        .search-chat i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.8rem; }
        .search-chat input { width: 100%; padding: 8px 12px 8px 36px; background: var(--surface-input); border: 1px solid var(--border-default); border-radius: 12px; color: var(--text-primary); font-size: 0.85rem; }
        .contacts-list { flex: 1; overflow-y: auto; padding: 8px; }
        
        .contact-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 14px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px;
        }
        .contact-item:hover { background: var(--surface-hover); }
        .contact-item.active { background: rgba(16,185,129,0.08); border-left: 2px solid var(--emerald-500); }
        .contact-avatar {
            width: 48px; height: 48px; background: linear-gradient(135deg, var(--emerald-600), var(--violet-500));
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; position: relative;
        }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--emerald-500); border: 2px solid var(--surface-card-solid); position: absolute; bottom: 2px; right: 2px; }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .contact-role { font-size: 0.6rem; padding: 2px 6px; border-radius: 20px; background: rgba(16,185,129,0.12); color: var(--emerald-400); }
        .contact-last-message { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-time { font-size: 0.6rem; color: var(--text-faint); white-space: nowrap; }
        .unread-badge { background: var(--emerald-500); color: white; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
        
        /* Chat main area */
        .chat-main { display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .chat-header-info { display: flex; align-items: center; gap: 12px; }
        .chat-header-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, var(--emerald-600), var(--violet-500)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .chat-header-name { font-weight: 700; font-size: 1rem; }
        .chat-header-status { font-size: 0.65rem; color: var(--text-muted); }
        .chat-actions { display: flex; gap: 8px; }
        .chat-action-btn { width: 36px; height: 36px; border-radius: 50%; background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); cursor: pointer; }
        .chat-action-btn:hover { background: var(--surface-hover); color: var(--emerald-400); }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; max-width: 70%; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.85rem; line-height: 1.4; }
        .message.sent .message-bubble { background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); color: white; border-bottom-right-radius: 4px; }
        .message.received .message-bubble { background: var(--surface-input); border: 1px solid var(--border-default); border-bottom-left-radius: 4px; }
        .message-time { font-size: 0.55rem; color: var(--text-faint); margin-top: 4px; text-align: right; }
        .message.sent .message-time { color: rgba(255,255,255,0.6); }
        
        .typing-indicator { padding: 8px 16px; font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: typing 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }
        
        .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border-subtle); display: flex; gap: 12px; align-items: flex-end; }
        .input-wrapper { flex: 1; }
        .chat-input { width: 100%; padding: 12px 16px; background: var(--surface-input); border: 1px solid var(--border-default); border-radius: 24px; color: var(--text-primary); font-size: 0.9rem; resize: none; outline: none; min-height: 44px; max-height: 120px; }
        .chat-input:focus { border-color: var(--border-accent); }
        .input-actions { display: flex; gap: 8px; }
        .input-btn { width: 44px; height: 44px; border-radius: 50%; background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .input-btn:hover { background: var(--surface-hover); color: var(--emerald-400); }
        .send-btn { background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); border: none; color: white; }
        .send-btn:hover { transform: scale(1.05); }
        
        .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text-muted); gap: 16px; padding: 40px; }
        .empty-chat-icon { font-size: 4rem; opacity: 0.5; }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--surface-card-solid); border: 1px solid var(--border-default); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; min-width: 280px; transform: translateX(120%); opacity: 0; transition: all 0.4s var(--ease-out-expo); }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 3px solid var(--emerald-500); }
        .toast.error { border-left: 3px solid var(--rose-500); }
        .toast.info { border-left: 3px solid var(--violet-400); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; padding-top: 76px; }
            .chat-layout { grid-template-columns: 1fr; height: calc(100vh - 100px); }
            .chat-sidebar { display: none; }
            .chat-sidebar.mobile-visible { display: flex; position: absolute; inset: 0; z-index: 10; background: var(--surface-card-solid); }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"><div class="bg-gradient-1"></div></div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    
    <header class="mobile-header">
        <button class="menu-btn" onclick="openSidebar()"><i class="fa-solid fa-bars"></i></button>
        <span class="mobile-logo">Salam <span>Market</span></span>
        <button class="menu-btn" onclick="toggleMobileChatSidebar()"><i class="fa-solid fa-users"></i></button>
    </header>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><i class="fa-solid fa-store"></i></div>
            <div class="sidebar-brand"><h2>Salam Market</h2><p>Messagerie</p></div>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-item"><i class="fa-solid fa-home"></i> Accueil</a>
            <a href="products.html" class="nav-item"><i class="fa-solid fa-basket-shopping"></i> Catalogue</a>
            <a href="cart.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i> Mon Panier</a>
            <a href="orders.html" class="nav-item"><i class="fa-solid fa-box"></i> Mes Commandes</a>
            <a href="chat.html" class="nav-item active"><i class="fa-solid fa-comments"></i> Messagerie <span class="nav-badge" id="sidebarChatBadge">0</span></a>
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i> Mon Profil</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
        </div>
    </aside>
    
    <main class="main-content">
        <div class="chat-container">
            <div class="chat-layout">
                <!-- Contacts sidebar -->
                <div class="chat-sidebar" id="chatSidebar">
                    <div class="chat-sidebar-header">
                        <h3><i class="fa-regular fa-message"></i> Messages</h3>
                        <div class="search-chat">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="searchContact" placeholder="Rechercher un contact..." oninput="filterContacts()">
                        </div>
                    </div>
                    <div class="contacts-list" id="contactsList"></div>
                </div>
                
                <!-- Chat main area -->
                <div class="chat-main" id="chatMain">
                    <div class="empty-chat" id="emptyChat">
                        <div class="empty-chat-icon">💬</div>
                        <h3>Messagerie Salam Market</h3>
                        <p>Sélectionnez une conversation pour commencer à discuter</p>
                        <p style="font-size:0.8rem;">Contactez le support, vos fournisseurs ou l'équipe Salam</p>
                    </div>
                    
                    <div id="activeChat" style="display: none; flex-direction: column; height: 100%;">
                        <div class="chat-header" id="chatHeader"></div>
                        <div class="messages-area" id="messagesArea"></div>
                        <div class="typing-indicator" id="typingIndicator" style="display: none;">
                            <div class="typing-dots"><span></span><span></span><span></span></div>
                            <span id="typingName">Quelqu'un</span> est en train d'écrire...
                        </div>
                        <div class="chat-input-area">
                            <div class="input-wrapper">
                                <textarea class="chat-input" id="chatInput" placeholder="Votre message..." rows="1" onkeypress="handleKeyPress(event)"></textarea>
                            </div>
                            <div class="input-actions">
                                <button class="input-btn" onclick="attachFile()"><i class="fa-solid fa-paperclip"></i></button>
                                <button class="input-btn" onclick="openEmojiPicker()"><i class="fa-regular fa-face-smile"></i></button>
                                <button class="input-btn send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div id="emojiPicker" style="display: none; position: fixed; bottom: 80px; right: 20px; background: var(--surface-card-solid); border: 1px solid var(--border-default); border-radius: 16px; padding: 12px; z-index: 150; display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px;"></div>
    <div class="toast-container" id="toastContainer"></div>
    
    <script>
        (function() {
            'use strict';
            
            const session = JSON.parse(localStorage.getItem('salam_session') || 'null');
            if (!session) { window.location.href = '../index.html'; return; }
            
            const currentUser = session.user;
            const currentUserId = currentUser.id;
            const currentUserName = currentUser.name;
            const currentUserRole = currentUser.role;
            
            let conversations = [];
            let currentChatId = null;
            let currentChatUser = null;
            let typingTimeout = null;
            let messageInterval = null;
            
            const Storage = {
                get: (k, d) => { try { return JSON.parse(localStorage.getItem('salam_'+k)||'null')||d; } catch { return d; } },
                set: (k, v) => localStorage.setItem('salam_'+k, JSON.stringify(v))
            };
            
            function initDefaultData() {
                let users = Storage.get('users', []);
                if (users.length === 0) {
                    users = [
                        { id: 'ADM-001', name: 'Service Client', email: 'support@salam.cm', role: 'admin', avatar: '🎧', status: 'active', createdAt: new Date().toISOString() },
                        { id: 'SUP-001', name: 'Mega Distribution', email: 'contact@megadist.com', role: 'supplier', avatar: '🏪', status: 'active', createdAt: new Date().toISOString() },
                        { id: currentUserId, name: currentUserName, email: currentUser.email, role: currentUserRole, avatar: '🛒', status: 'active', createdAt: new Date().toISOString() }
                    ];
                    Storage.set('users', users);
                }
                let messages = Storage.get('messages', []);
                if (messages.length === 0) {
                    messages = [
                        { id: 'welcome_1', from: 'ADM-001', fromName: 'Service Client', to: currentUserId, text: '👋 Bonjour ! Bienvenue sur Salam Market. Comment puis-je vous aider ?', timestamp: new Date().toISOString(), read: false }
                    ];
                    Storage.set('messages', messages);
                }
            }
            initDefaultData();
            
            function getAvailableContacts() {
                const users = Storage.get('users', []);
                return users.filter(u => u.id !== currentUserId && (u.role === 'admin' || u.role === 'supplier'));
            }
            
            function loadConversations() {
                const messages = Storage.get('messages', []);
                const contacts = getAvailableContacts();
                const convMap = new Map();
                
                contacts.forEach(contact => {
                    const contactMessages = messages.filter(m => (m.from === contact.id && m.to === currentUserId) || (m.from === currentUserId && m.to === contact.id));
                    const lastMsg = contactMessages.slice().sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
                    const unread = contactMessages.filter(m => m.from === contact.id && m.to === currentUserId && !m.read).length;
                    convMap.set(contact.id, { contact, messages: contactMessages.sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)), lastMessage: lastMsg, unreadCount: unread });
                });
                
                conversations = Array.from(convMap.values()).sort((a,b) => { const da = a.lastMessage ? new Date(a.lastMessage.timestamp) : 0; const db = b.lastMessage ? new Date(b.lastMessage.timestamp) : 0; return db - da; });
                renderContactsList();
                updateBadges();
                
                if (currentChatId) {
                    const conv = conversations.find(c => c.contact.id === currentChatId);
                    if (conv) { currentChatUser = conv.contact; renderChatHeader(); renderMessages(conv.messages); markMessagesAsRead(currentChatId); }
                }
            }
            
            function renderContactsList() {
                const container = document.getElementById('contactsList');
                const searchTerm = document.getElementById('searchContact')?.value.toLowerCase() || '';
                let filtered = conversations.filter(c => c.contact.name.toLowerCase().includes(searchTerm));
                
                if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Aucun contact</div>'; return; }
                
                container.innerHTML = filtered.map(conv => `
                    <div class="contact-item ${currentChatId === conv.contact.id ? 'active' : ''}" onclick="selectChat('${conv.contact.id}')">
                        <div class="contact-avatar">${conv.contact.avatar || (conv.contact.role === 'supplier' ? '🏪' : '🎧')}${conv.contact.online ? '<span class="online-dot"></span>' : ''}</div>
                        <div class="contact-info">
                            <div class="contact-name">${escapeHtml(conv.contact.name)}<span class="contact-role">${conv.contact.role === 'admin' ? 'Support' : 'Fournisseur'}</span></div>
                            <div class="contact-last-message">${conv.lastMessage ? escapeHtml(conv.lastMessage.text.substring(0,40)) : 'Nouveau contact'}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="contact-time">${conv.lastMessage ? formatTime(conv.lastMessage.timestamp) : ''}</div>
                            ${conv.unreadCount > 0 ? `<div class="unread-badge">${conv.unreadCount}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            }
            
            function renderChatHeader() {
                if (!currentChatUser) return;
                const header = document.getElementById('chatHeader');
                header.innerHTML = `
                    <div class="chat-header-info">
                        <div class="chat-header-avatar">${currentChatUser.avatar || (currentChatUser.role === 'supplier' ? '🏪' : '🎧')}</div>
                        <div>
                            <div class="chat-header-name">${escapeHtml(currentChatUser.name)}</div>
                            <div class="chat-header-status">${currentChatUser.role === 'admin' ? 'Service Client' : 'Fournisseur'}</div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn" onclick="clearChat()"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
            }
            
            function renderMessages(messages) {
                const container = document.getElementById('messagesArea');
                if (!container) return;
                const sorted = [...messages].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                container.innerHTML = sorted.map(msg => `
                    <div class="message ${msg.from === currentUserId ? 'sent' : 'received'}">
                        <div>
                            <div class="message-bubble">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${formatTime(msg.timestamp)}</div>
                        </div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            }
            
            function selectChat(contactId) {
                currentChatId = contactId;
                const conv = conversations.find(c => c.contact.id === contactId);
                if (conv) currentChatUser = conv.contact;
                document.getElementById('emptyChat').style.display = 'none';
                document.getElementById('activeChat').style.display = 'flex';
                renderChatHeader();
                renderMessages(conv ? conv.messages : []);
                markMessagesAsRead(contactId);
                if (window.innerWidth <= 768) document.getElementById('chatSidebar').classList.remove('mobile-visible');
                document.getElementById('chatInput').focus();
            }
            
            function sendMessage() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text || !currentChatId) return;
                
                const message = {
                    id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    from: currentUserId,
                    fromName: currentUserName,
                    to: currentChatId,
                    text: text,
                    timestamp: new Date().toISOString(),
                    read: false
                };
                
                let messages = Storage.get('messages', []);
                messages.push(message);
                Storage.set('messages', messages);
                input.value = '';
                loadConversations();
                showToast('Message envoyé', text.substring(0, 50), 'success');
                localStorage.setItem('salam_msg_trigger', Date.now().toString());
            }
            
            function markMessagesAsRead(contactId) {
                let messages = Storage.get('messages', []);
                let updated = false;
                messages = messages.map(m => {
                    if (m.from === contactId && m.to === currentUserId && !m.read) {
                        updated = true;
                        return { ...m, read: true };
                    }
                    return m;
                });
                if (updated) { Storage.set('messages', messages); loadConversations(); }
            }
            
            function clearChat() {
                if (!confirm('Effacer cette conversation ?')) return;
                let messages = Storage.get('messages', []);
                messages = messages.filter(m => !(m.from === currentUserId && m.to === currentChatId) && !(m.from === currentChatId && m.to === currentUserId));
                Storage.set('messages', messages);
                loadConversations();
                selectChat(currentChatId);
                showToast('Conversation effacée', '', 'success');
            }
            
            function updateBadges() {
                const totalUnread = conversations.reduce((s,c) => s + c.unreadCount, 0);
                const badge = document.getElementById('sidebarChatBadge');
                if (badge) {
                    if (totalUnread > 0) { badge.textContent = totalUnread > 9 ? '9+' : totalUnread; badge.style.display = ''; }
                    else badge.style.display = 'none';
                }
            }
            
            function handleKeyPress(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } else startTyping(); }
            function startTyping() { if (typingTimeout) clearTimeout(typingTimeout); typingTimeout = setTimeout(() => stopTyping(), 1500); }
            function stopTyping() { if (typingTimeout) clearTimeout(typingTimeout); }
            
            function formatTime(iso) { const d = new Date(iso); const diff = Date.now() - d; if (diff < 86400000) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); return d.toLocaleDateString(); }
            function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
            
            function showToast(title, msg, type) { type=type||'success'; const c=document.getElementById('toastContainer'); if(!c) return; const icons={success:'fa-circle-check',error:'fa-circle-exclamation',info:'fa-circle-info'}; const t=document.createElement('div'); t.className='toast '+type; t.innerHTML='<i class="fa-solid '+(icons[type]||icons.success)+' toast-icon"></i><div><div>'+escapeHtml(title)+'</div><div>'+escapeHtml(msg)+'</div></div><button class="toast-close" onclick="this.parentElement.remove()"><i class="fa-solid fa-xmark"></i></button>'; c.appendChild(t); setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),500); },3000); }
            
            function attachFile() { showToast('Info', 'Fichier - bientôt disponible', 'info'); }
            function openEmojiPicker() { const picker=document.getElementById('emojiPicker'); const emojis=['😀','😊','😂','🥰','😍','👍','🙏','❤️','🎉','🔥','⭐','✅','👋','🤝','🍕','🛒','🚚','📦']; if(picker.style.display==='grid') picker.style.display='none'; else { picker.innerHTML=emojis.map(e=>`<button style="background:none;border:none;font-size:1.5rem;cursor:pointer;padding:4px;" onclick="insertEmoji('${e}')">${e}</button>`).join(''); picker.style.display='grid'; setTimeout(()=>{ document.addEventListener('click',function closePicker(e){ if(!picker.contains(e.target)&&!e.target.closest('.input-btn')){ picker.style.display='none'; document.removeEventListener('click',closePicker); } }); },100); } }
            function insertEmoji(emoji) { const input=document.getElementById('chatInput'); input.value+=emoji; input.focus(); document.getElementById('emojiPicker').style.display='none'; }
            function filterContacts() { renderContactsList(); }
            function toggleMobileChatSidebar() { document.getElementById('chatSidebar').classList.toggle('mobile-visible'); }
            
            function startAutoRefresh() { if(messageInterval) clearInterval(messageInterval); messageInterval=setInterval(()=>{ loadConversations(); },3000); }
            function stopAutoRefresh() { if(messageInterval) clearInterval(messageInterval); }
            
            function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
            function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
            function logout() { stopAutoRefresh(); localStorage.removeItem('salam_session'); localStorage.removeItem('salam_cart'); window.location.href='../index.html'; }
            
            window.selectChat = selectChat;
            window.sendMessage = sendMessage;
            window.handleKeyPress = handleKeyPress;
            window.attachFile = attachFile;
            window.openEmojiPicker = openEmojiPicker;
            window.insertEmoji = insertEmoji;
            window.clearChat = clearChat;
            window.filterContacts = filterContacts;
            window.toggleMobileChatSidebar = toggleMobileChatSidebar;
            window.openSidebar = openSidebar;
            window.closeSidebar = closeSidebar;
            window.logout = logout;
            
            const textarea = document.getElementById('chatInput');
            if(textarea) textarea.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
            
            loadConversations();
            startAutoRefresh();
            
            window.addEventListener('storage', (e) => {
                if (e.key === 'salam_msg_trigger' || e.key === 'salam_messages') {
                    loadConversations();
                    if (currentChatId && currentChatUser) selectChat(currentChatId);
                    updateBadges();
                }
            });
        })();
    </script>
</body>
</html>
