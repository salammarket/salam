<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salam Market - Accueil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0A0A14;
            color: #F1F5F9;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: #10B981; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #059669, #10B981); color: white; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 { font-size: 3rem; margin-bottom: 20px; }
        .hero p { color: #94A3B8; margin-bottom: 30px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .product-card { background: rgba(15,15,30,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 20px; transition: transform 0.2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); border-color: rgba(16,185,129,0.25); }
        .product-emoji { font-size: 3rem; margin-bottom: 10px; }
        .product-name { font-weight: 600; margin-bottom: 5px; }
        .product-price { color: #10B981; font-weight: bold; margin-top: 10px; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #F43F5E; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal { background: #0F0F1E; border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: flex-end; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94A3B8; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: rgba(10,10,20,0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { background: #0F0F1E; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 15px 20px; margin-top: 10px; transform: translateX(120%); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast.success { border-left: 3px solid #10B981; }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Salam <span>Market</span></div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="cart-icon" onclick="openCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <button class="btn-outline btn" id="authBtn" onclick="openAuthModal()">Connexion</button>
            </div>
        </header>
        
        <div class="hero">
            <h1>Bienvenue sur Salam Market</h1>
            <p>Votre marketplace de confiance au Cameroun</p>
            <button class="btn-primary btn" onclick="scrollToProducts()">Découvrir nos produits</button>
        </div>
        
        <h2 style="margin-bottom: 20px;">Nos produits</h2>
        <div class="products-grid" id="productsGrid"></div>
    </div>
    
    <!-- Modal Auth -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <div class="modal-header"><h3 id="authModalTitle">Connexion</h3><button class="modal-close" onclick="closeAuthModal()">&times;</button></div>
            <div class="modal-body">
                <form id="authForm">
                    <div class="form-group"><label>Email / Téléphone</label><input type="text" id="authLogin" required></div>
                    <div class="form-group"><label>Mot de passe</label><input type="password" id="authPassword" required></div>
                </form>
                <p style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="switchAuthMode()" style="color: #10B981;">Créer un compte</a>
                </p>
            </div>
            <div class="modal-footer"><button class="btn-outline btn" onclick="closeAuthModal()">Annuler</button><button class="btn-primary btn" onclick="submitAuth()">Se connecter</button></div>
        </div>
    </div>
    
    <!-- Modal Cart -->
    <div class="modal-overlay" id="cartModal">
        <div class="modal">
            <div class="modal-header"><h3>Mon panier</h3><button class="modal-close" onclick="closeCartModal()">&times;</button></div>
            <div class="modal-body"><div id="cartItems"></div></div>
            <div class="modal-footer"><button class="btn-outline btn" onclick="closeCartModal()">Fermer</button><button class="btn-primary btn" onclick="checkout()">Commander</button></div>
        </div>
    </div>
    
    <!-- Modal Messagerie Client -->
    <div class="modal-overlay" id="messageModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header"><h3>Messagerie</h3><button class="modal-close" onclick="closeMessageModal()">&times;</button></div>
            <div class="modal-body">
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div id="clientConversations" style="max-height: 400px; overflow-y: auto;"></div>
                    <div id="clientMessageInput" style="display: none;">
                        <div style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px;">
                            <textarea id="newMessage" rows="3" style="width:100%; padding:10px; background:rgba(10,10,20,0.7); border:1px solid rgba(255,255,255,0.08); border-radius:14px; color:white; margin-bottom:10px;" placeholder="Votre message..."></textarea>
                            <button class="btn-primary btn" onclick="sendClientMessage()">Envoyer</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toastContainer"></div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // Storage helpers
        const Storage = {
            get: (key, defaultVal = null) => {
                try { return JSON.parse(localStorage.getItem('salam_' + key) || 'null') || defaultVal; }
                catch { return defaultVal; }
            },
            set: (key, value) => localStorage.setItem('salam_' + key, JSON.stringify(value))
        };
        
        let currentUser = null;
        let currentConversationId = null;
        let currentRecipientId = null;
        
        // Données par défaut
        function initData() {
            let users = Storage.get('users', []);
            if (users.length === 0) {
                users = [
                    { id: 'admin1', name: 'Administrateur', email: 'admin@salam.com', phone: '+237600000001', role: 'admin', status: 'active', createdAt: new Date().toISOString() },
                    { id: 'supplier1', name: 'Mega Distribution', email: 'contact@megadist.com', phone: '+237633445566', role: 'supplier', status: 'active', createdAt: new Date().toISOString() },
                    { id: 'client1', name: 'Jean Dupont', email: 'jean@email.com', phone: '+237612345678', role: 'client', status: 'active', createdAt: new Date().toISOString() },
                    { id: 'client2', name: 'Marie Ndiaye', email: 'marie@email.com', phone: '+237687654321', role: 'client', status: 'active', createdAt: new Date().toISOString() }
                ];
                Storage.set('users', users);
            }
            
            let products = Storage.get('products', []);
            if (products.length === 0) {
                products = [
                    { id: 1, name: 'Riz Parfumé 5kg', category: 'Alimentation', price: 3500, stock: 50, supplier: 'Mega Distribution', supplierId: 'supplier1', image: '🍚' },
                    { id: 2, name: 'Huile d\'olive 1L', category: 'Alimentation', price: 2500, stock: 30, supplier: 'Mega Distribution', supplierId: 'supplier1', image: '🫒' },
                    { id: 3, name: 'Smartphone Samsung', category: 'Électronique', price: 125000, stock: 10, supplier: 'Tech Import', supplierId: 'supplier2', image: '📱' }
                ];
                Storage.set('products', products);
            }
            
            let messages = Storage.get('messages', []);
            if (messages.length === 0) {
                messages = [
                    { id: 'msg_1', conversationId: 'conv_client1_admin1', userId: 'admin1', userName: 'Administrateur', userRole: 'admin', message: 'Bienvenue sur Salam Market !', timestamp: new Date().toISOString(), read: true, isFromAdmin: true, targetUserId: 'client1', targetUserName: 'Jean Dupont' }
                ];
                Storage.set('messages', messages);
            }
        }
        initData();
        
        // Afficher les produits
        function loadProducts() {
            const products = Storage.get('products', []);
            const container = document.getElementById('productsGrid');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <div class="product-emoji">${p.image || '📦'}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">${p.price.toLocaleString()} FCFA</div>
                </div>
            `).join('');
        }
        
        // Panier
        let cart = [];
        function loadCart() { cart = Storage.get('cart', []); updateCartCount(); }
        function saveCart() { Storage.set('cart', cart); updateCartCount(); }
        function updateCartCount() { document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.quantity, 0); }
        function addToCart(productId) {
            const products = Storage.get('products', []);
            const product = products.find(p => p.id === productId);
            if (!product) return;
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.quantity++;
            else cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1 });
            saveCart();
            showToast('Ajouté au panier', `${product.name} ajouté`, 'success');
        }
        function openCart() {
            if (!currentUser) { showToast('Connexion requise', 'Veuillez vous connecter', 'error'); openAuthModal(); return; }
            const container = document.getElementById('cartItems');
            if (cart.length === 0) container.innerHTML = '<p style="text-align:center;">Panier vide</p>';
            else {
                container.innerHTML = cart.map(i => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.03); border-radius:10px;">
                        <div>${i.name} x ${i.quantity}</div>
                        <div>${(i.price * i.quantity).toLocaleString()} FCFA</div>
                    </div>
                `).join('');
                const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                container.innerHTML += `<div style="text-align:right; margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.08);"><strong>Total: ${total.toLocaleString()} FCFA</strong></div>`;
            }
            document.getElementById('cartModal').classList.add('show');
        }
        function closeCartModal() { document.getElementById('cartModal').classList.remove('show'); }
        function checkout() {
            if (!currentUser) { showToast('Erreur', 'Connectez-vous', 'error'); return; }
            if (cart.length === 0) { showToast('Erreur', 'Panier vide', 'error'); return; }
            const order = {
                id: 'CMD' + Date.now(),
                customerName: currentUser.name,
                customerId: currentUser.id,
                items: cart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity })),
                total: cart.reduce((s, i) => s + i.price * i.quantity, 0),
                status: 'confirmée',
                paymentStatus: 'pending',
                createdAt: new Date().toISOString()
            };
            let orders = Storage.get('orders', []);
            orders.push(order);
            Storage.set('orders', orders);
            cart = [];
            saveCart();
            closeCartModal();
            showToast('Commande passée', `#${order.id}`, 'success');
        }
        
        // Auth
        let isLoginMode = true;
        function openAuthModal() { document.getElementById('authModal').classList.add('show'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('show'); }
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authModalTitle').textContent = isLoginMode ? 'Connexion' : 'Inscription';
            document.querySelector('#authModal .modal-footer button:last-child').textContent = isLoginMode ? 'Se connecter' : 'S\'inscrire';
        }
        function submitAuth() {
            const login = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value;
            const users = Storage.get('users', []);
            
            if (isLoginMode) {
                const user = users.find(u => u.email === login || u.phone === login);
                if (!user) { showToast('Erreur', 'Utilisateur non trouvé', 'error'); return; }
                currentUser = user;
                localStorage.setItem('salam_session', JSON.stringify({ user: currentUser }));
                document.getElementById('authBtn').textContent = currentUser.name;
                showToast('Bienvenue', currentUser.name, 'success');
                closeAuthModal();
                updateUI();
            } else {
                if (users.find(u => u.email === login)) { showToast('Erreur', 'Email déjà utilisé', 'error'); return; }
                const newUser = {
                    id: 'USR_' + Date.now().toString(36).toUpperCase(),
                    name: login.split('@')[0],
                    email: login,
                    phone: login,
                    role: 'client',
                    status: 'active',
                    createdAt: new Date().toISOString()
                };
                users.push(newUser);
                Storage.set('users', users);
                currentUser = newUser;
                localStorage.setItem('salam_session', JSON.stringify({ user: currentUser }));
                document.getElementById('authBtn').textContent = currentUser.name;
                showToast('Bienvenue', currentUser.name, 'success');
                closeAuthModal();
                updateUI();
            }
        }
        
        // Messagerie Client
        function openMessaging() {
            if (!currentUser) { showToast('Erreur', 'Connectez-vous', 'error'); return; }
            loadClientMessages();
            document.getElementById('messageModal').classList.add('show');
        }
        
        function loadClientMessages() {
            const messages = Storage.get('messages', []);
            const users = Storage.get('users', []);
            
            // Trouver les conversations du client
            const convMap = new Map();
            const userMessages = messages.filter(m => m.userId === currentUser.id || m.targetUserId === currentUser.id);
            
            userMessages.forEach(msg => {
                const otherId = msg.userId === currentUser.id ? msg.targetUserId : msg.userId;
                const otherUser = users.find(u => u.id === otherId);
                if (!convMap.has(msg.conversationId)) {
                    convMap.set(msg.conversationId, {
                        id: msg.conversationId,
                        userId: otherId,
                        userName: otherUser ? otherUser.name : 'Support',
                        lastMessage: msg.message,
                        lastTimestamp: msg.timestamp,
                        unread: !msg.read && msg.targetUserId === currentUser.id
                    });
                }
            });
            
            const conversations = Array.from(convMap.values()).sort((a,b) => new Date(b.lastTimestamp) - new Date(a.lastTimestamp));
            const container = document.getElementById('clientConversations');
            
            if (conversations.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#94A3B8;">Aucune conversation</p>';
            } else {
                container.innerHTML = conversations.map(conv => `
                    <div onclick="openClientConversation('${conv.id}', '${conv.userId}', '${conv.userName}')" style="padding:12px; background:${conv.unread ? 'rgba(16,185,129,0.15)' : 'rgba(255,255,255,0.03)'}; border-radius:12px; margin-bottom:8px; cursor:pointer;">
                        <div style="font-weight:600;">${conv.userName}</div>
                        <div style="font-size:0.8rem; color:#94A3B8;">${conv.lastMessage.substring(0, 50)}</div>
                        <div style="font-size:0.7rem; color:#64748B;">${new Date(conv.lastTimestamp).toLocaleString()}</div>
                    </div>
                `).join('');
            }
        }
        
        function openClientConversation(convId, recipientId, recipientName) {
            currentConversationId = convId;
            currentRecipientId = recipientId;
            
            // Marquer comme lu
            let messages = Storage.get('messages', []);
            messages = messages.map(m => {
                if (m.conversationId === convId && m.targetUserId === currentUser.id && !m.read) {
                    return { ...m, read: true };
                }
                return m;
            });
            Storage.set('messages', messages);
            
            // Afficher l'historique
            const convMessages = messages.filter(m => m.conversationId === convId).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            const container = document.getElementById('clientConversations');
            container.innerHTML = `
                <div style="margin-bottom:15px;">
                    <button class="btn-outline btn" onclick="loadClientMessages()" style="margin-bottom:10px;">← Retour</button>
                    <div style="font-weight:600; margin-bottom:10px;">Conversation avec ${recipientName}</div>
                </div>
                <div style="max-height:300px; overflow-y:auto; margin-bottom:15px;">
                    ${convMessages.map(m => `
                        <div style="padding:8px 12px; margin-bottom:8px; background:${m.userId === currentUser.id ? 'rgba(16,185,129,0.2)' : 'rgba(255,255,255,0.05)'}; border-radius:12px; text-align:${m.userId === currentUser.id ? 'right' : 'left'};">
                            <div>${m.message}</div>
                            <div style="font-size:0.7rem; color:#64748B;">${new Date(m.timestamp).toLocaleString()}</div>
                        </div>
                    `).join('')}
                </div>
                <div>
                    <textarea id="newClientMessage" rows="3" style="width:100%; padding:10px; background:rgba(10,10,20,0.7); border:1px solid rgba(255,255,255,0.08); border-radius:14px; color:white; margin-bottom:10px;" placeholder="Votre message..."></textarea>
                    <button class="btn-primary btn" onclick="sendClientMessageTo('${recipientId}', '${recipientName}')">Envoyer</button>
                </div>
            `;
        }
        
        function sendClientMessageTo(recipientId, recipientName) {
            const message = document.getElementById('newClientMessage')?.value.trim();
            if (!message) { showToast('Erreur', 'Message vide', 'error'); return; }
            
            const newMessage = {
                id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                conversationId: `conv_${currentUser.id}_${recipientId}`,
                userId: currentUser.id,
                userName: currentUser.name,
                userRole: currentUser.role,
                message: message,
                timestamp: new Date().toISOString(),
                read: false,
                isFromAdmin: false,
                targetUserId: recipientId,
                targetUserName: recipientName
            };
            
            let messages = Storage.get('messages', []);
            messages.push(newMessage);
            Storage.set('messages', messages);
            
            document.getElementById('newClientMessage').value = '';
            openClientConversation(newMessage.conversationId, recipientId, recipientName);
            showToast('Message envoyé', `À ${recipientName}`, 'success');
            
            localStorage.setItem('salam_messages_trigger', Date.now().toString());
        }
        
        function sendClientMessage() {
            if (!currentRecipientId) return;
            sendClientMessageTo(currentRecipientId, document.getElementById('clientConversations').querySelector('div:first-child div:first-child')?.innerText || 'Support');
        }
        
        function closeMessageModal() { document.getElementById('messageModal').classList.remove('show'); currentConversationId = null; currentRecipientId = null; }
        
        function updateUI() {
            if (currentUser) {
                const btn = document.getElementById('authBtn');
                btn.textContent = currentUser.name;
                if (currentUser.role === 'admin') {
                    btn.onclick = () => window.location.href = 'pages/admin.html';
                } else if (currentUser.role === 'supplier') {
                    btn.onclick = () => window.location.href = 'pages/admin.html';
                } else {
                    btn.onclick = () => openMessaging();
                }
            }
        }
        
        function showToast(title, message, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<strong>${title}</strong><br>${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 3000);
        }
        
        function scrollToProducts() { document.querySelector('.products-grid').scrollIntoView({ behavior: 'smooth' }); }
        
        // Récupérer session existante
        const savedSession = JSON.parse(localStorage.getItem('salam_session') || 'null');
        if (savedSession) { currentUser = savedSession.user; updateUI(); }
        
        loadProducts();
        loadCart();
        
        window.addToCart = addToCart;
        window.openCart = openCart;
        window.closeCartModal = closeCartModal;
        window.checkout = checkout;
        window.openAuthModal = openAuthModal;
        window.closeAuthModal = closeAuthModal;
        window.switchAuthMode = switchAuthMode;
        window.submitAuth = submitAuth;
        window.scrollToProducts = scrollToProducts;
        window.openMessaging = openMessaging;
        window.closeMessageModal = closeMessageModal;
        window.loadClientMessages = loadClientMessages;
        window.openClientConversation = openClientConversation;
        window.sendClientMessage = sendClientMessage;
        window.sendClientMessageTo = sendClientMessageTo;
    </script>
</body>
</html>
