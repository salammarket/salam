<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Inscription — Salam Market PRO">
    <meta name="theme-color" content="#07070E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscription · Salam Market PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .register-container{max-width:480px;margin:0 auto;padding:20px;}
        .register-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;backdrop-filter:blur(40px);box-shadow:var(--shadow-lg);}
        .register-card h1{font-family:var(--font-display);text-align:center;margin-bottom:24px;}
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <header class="mobile-header"><button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button><span class="mobile-logo">Salam <span>Market</span></span></header>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo"><img src="../images/salam.png" alt="S"><i class="fa-solid fa-store" style="display:none;color:#fff;"></i></div><div><div class="sidebar-brand">Salam Market</div><div class="sidebar-tag">PRO v7.0</div></div></div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-item"><i class="fa-solid fa-right-to-bracket"></i> Connexion</a>
            <a href="register.html" class="nav-item active"><i class="fa-solid fa-user-plus"></i> Inscription</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="register-container">
            <div class="register-card">
                <h1>Créer un compte</h1>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group"><label>Nom complet *</label><input type="text" class="form-input" id="regName" required placeholder="Votre nom complet"></div>
                    <div class="form-group"><label>Email ou Téléphone *</label><input type="text" class="form-input" id="regIdentifier" required placeholder="email@exemple.com ou +237..."></div>
                    <div class="form-group"><label>Mot de passe *</label><div class="input-wrapper"><input type="password" class="form-input" id="regPassword" required placeholder="Minimum 6 caractères"><button type="button" class="toggle-password" onclick="toggleRegPassword()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-faint);cursor:pointer;background:none;border:none;"><i class="fa-regular fa-eye"></i></button></div></div>
                    <div class="form-group"><label>Type de compte *</label><select class="form-select" id="regRole"><option value="client">Client</option><option value="supplier">Fournisseur</option></select></div>
                    <div class="error-msg" id="regError" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fa-solid fa-user-plus"></i> Créer mon compte</button>
                </form>
                <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--text-muted);">Déjà un compte ? <a href="../index.html">Se connecter</a></p>
            </div>
        </div>
    </main>
    <div class="toast" id="toast"><i class="fa-solid fa-check-circle toast-icon"></i><div><strong class="toast-title"></strong><br><small class="toast-msg" style="color:#94A3B8;"></small></div></div>
    <script src="../js/app.js"></script>
    <script>
        function toggleRegPassword(){
            const input=document.getElementById('regPassword');
            const icon=event.target.querySelector('i');
            if(input.type==='password'){input.type='text';icon.className='fa-regular fa-eye-slash';}
            else{input.type='password';icon.className='fa-regular fa-eye';}
        }
        function handleRegister(e){
            e.preventDefault();
            const name=document.getElementById('regName').value.trim();
            const identifier=document.getElementById('regIdentifier').value.trim();
            const password=document.getElementById('regPassword').value;
            const role=document.getElementById('regRole').value;
            const errorEl=document.getElementById('regError');
            errorEl.style.display='none';
            if(!name||!identifier||!password){errorEl.textContent='Tous les champs sont requis';errorEl.style.display='block';return;}
            if(password.length<6){errorEl.textContent='Mot de passe : 6 caractères minimum';errorEl.style.display='block';return;}
            let users=JSON.parse(localStorage.getItem('salam_users')||'[]');
            if(users.find(u=>u.email===identifier||u.phone===identifier)){errorEl.textContent='Ce compte existe déjà';errorEl.style.display='block';return;}
            const newUser={id:'user_'+Date.now(),name,email:identifier.includes('@')?identifier:'',phone:!identifier.includes('@')?identifier:'',password:btoa(password),role,status:'active',avatar:role==='supplier'?'🏪':'🛒',address:'',loyaltyPoints:role==='client'?100:0,totalOrders:0,totalSpent:0,createdAt:new Date().toISOString()};
            users.push(newUser);localStorage.setItem('salam_users',JSON.stringify(users));
            const currentUser={id:newUser.id,name:newUser.name,email:newUser.email,phone:newUser.phone,role:newUser.role,avatar:newUser.avatar};
            localStorage.setItem('salam_session',JSON.stringify({user:currentUser,expires:Date.now()+30*24*60*60*1000}));
            showToast('Compte créé !','Bienvenue '+name,'success');
            setTimeout(()=>{if(role==='supplier')location.href='supplier.html';else location.href='dashboard.html';},1000);
        }
        function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}
    </script>
</body>
</html>
