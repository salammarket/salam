<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F8FAFC">
    <meta name="description" content="Salam Market - Catalogue de produits d'exception, qualité irréprochable et design élégant.">
    <title>Salam Market · Élégance & Authenticité</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-void: #F8FAFC;
            --bg-surface: #FFFFFF;
            --bg-elevated: #F1F5F9;
            --accent-emerald: #0F3B2C;
            --accent-gold: #B68B40;
            --accent-rose: #9E2A2B;
            --text-primary: #0F172A;
            --text-secondary: #334155;
            --text-tertiary: #64748B;
            --border-soft: #E2E8F0;
            --border-focus: #C0A06B;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            --font-display: 'Plus Jakarta Sans', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --radius-card: 28px;
            --radius-element: 20px;
            --transition-lux: cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.4;
        }

        /* Subtle grain texture */
        .grain-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar — luxe minimaliste */
        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-soft);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 120;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            transition: transform 0.45s var(--transition-lux);
            box-shadow: var(--shadow-sm);
        }

        .logo-couture {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1.5px solid var(--border-soft);
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            background: var(--accent-emerald);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            box-shadow: 0 8px 18px rgba(15, 59, 44, 0.12);
        }

        .logo-text h1 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--accent-emerald);
        }

        .logo-text p {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        .nav-luxe {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-item-luxe {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            border-radius: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item-luxe i { width: 26px; font-size: 1.1rem; }

        .nav-item-luxe:hover {
            background: var(--bg-elevated);
            color: var(--accent-emerald);
            transform: translateX(5px);
        }

        .nav-item-luxe.active {
            background: var(--bg-elevated);
            color: var(--accent-emerald);
            font-weight: 600;
            border-left: 3px solid var(--accent-gold);
        }

        .btn-logout-premium {
            background: transparent;
            border: 1px solid var(--border-soft);
            padding: 14px 20px;
            border-radius: 28px;
            display: flex;
            gap: 12px;
            align-items: center;
            font-weight: 500;
            color: var(--text-tertiary);
            transition: 0.2s;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-logout-premium:hover {
            background: rgba(158, 42, 43, 0.05);
            border-color: var(--accent-rose);
            color: var(--accent-rose);
        }

        /* Mobile header */
        .mobile-header-luxe {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-soft);
            z-index: 110;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .menu-icon {
            width: 44px;
            height: 44px;
            background: var(--bg-elevated);
            border-radius: 30px;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--accent-emerald);
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            z-index: 105;
        }

        .main-content-luxe {
            margin-left: 300px;
            padding: 36px 48px;
            position: relative;
            z-index: 2;
            max-width: 1600px;
        }

        /* Hero typography */
        .hero-catalog h1 {
            font-family: var(--font-display);
            font-size: 2.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--accent-emerald);
        }

        .hero-catalog p {
            color: var(--text-tertiary);
            font-size: 1rem;
            margin-top: 8px;
        }

        /* Search bar raffinée */
        .search-premium {
            background: var(--bg-surface);
            border-radius: var(--radius-element);
            padding: 10px 18px;
            margin: 28px 0 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-soft);
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-group {
            flex: 1;
            position: relative;
        }

        .search-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        .search-group input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--bg-void);
            border: 1px solid var(--border-soft);
            border-radius: 60px;
            font-size: 0.95rem;
            transition: 0.2s;
            color: var(--text-primary);
        }

        .search-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 4px rgba(182, 139, 64, 0.1);
        }

        .voice-luxe {
            width: 54px;
            height: 54px;
            border-radius: 54px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-soft);
            cursor: pointer;
            transition: 0.2s;
            color: var(--accent-emerald);
        }

        .voice-luxe.listening {
            background: var(--accent-rose);
            color: white;
            border-color: var(--accent-rose);
            animation: pulse-chic 1.4s infinite;
        }

        @keyframes pulse-chic {
            0% { box-shadow: 0 0 0 0 rgba(158, 42, 43, 0.3); }
            70% { box-shadow: 0 0 0 12px rgba(158, 42, 43, 0); }
        }

        /* Filters élégants */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
        }

        .chip-collection {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .chip-luxe {
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--bg-surface);
            border: 1px solid var(--border-soft);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip-luxe.active, .chip-luxe:hover {
            background: var(--accent-emerald);
            border-color: var(--accent-emerald);
            color: white;
            transform: translateY(-2px);
        }

        .select-luxe {
            background: var(--bg-surface);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-soft);
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
        }

        .view-switch {
            display: flex;
            gap: 8px;
            background: var(--bg-surface);
            padding: 6px;
            border-radius: 50px;
            border: 1px solid var(--border-soft);
        }

        .view-btn-luxe {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-tertiary);
        }

        .view-btn-luxe.active {
            background: var(--accent-emerald);
            color: white;
        }

        /* Grille produits — élégante, aérée */
        .product-grid-luxe {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
        }

        .product-card-luxe {
            background: var(--bg-surface);
            border-radius: var(--radius-card);
            overflow: hidden;
            transition: all 0.35s var(--transition-lux);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-sm);
        }

        .product-card-luxe:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-gold);
        }

        .img-container {
            height: 260px;
            background: linear-gradient(145deg, #F1F5F9, #FFFFFF);
            position: relative;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .product-card-luxe:hover .img-container img {
            transform: scale(1.06);
        }

        .badge-exclusive {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            background: var(--accent-emerald);
            color: white;
            letter-spacing: 0.5px;
            z-index: 3;
        }

        .badge-exclusive.premium {
            background: var(--accent-gold);
        }

        .badge-exclusive.hot {
            background: var(--accent-rose);
        }

        .product-details {
            padding: 22px 20px 24px;
        }

        .product-details h3 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .supplier-luxe {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .price-luxe {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-emerald);
            margin: 12px 0 18px;
            letter-spacing: -0.3px;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
        }

        .btn-cart-premium {
            flex: 1;
            background: transparent;
            border: 1.5px solid var(--border-soft);
            border-radius: 18px;
            padding: 12px;
            font-weight: 700;
            color: var(--accent-emerald);
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-cart-premium:hover {
            background: var(--accent-emerald);
            color: white;
            border-color: var(--accent-emerald);
        }

        .btn-compare-luxe {
            width: 48px;
            background: transparent;
            border: 1.5px solid var(--border-soft);
            border-radius: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-compare-luxe.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: white;
        }

        /* List view épurée */
        .product-list-luxe {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .list-row {
            display: flex;
            align-items: center;
            gap: 28px;
            background: var(--bg-surface);
            border-radius: 24px;
            padding: 18px 24px;
            border: 1px solid var(--border-soft);
            transition: 0.2s;
        }

        .list-row:hover {
            border-color: var(--accent-gold);
            transform: translateX(6px);
        }

        .list-img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            overflow: hidden;
            background: var(--bg-elevated);
        }

        .compare-bar-luxe {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(24px);
            border-top: 1px solid var(--border-soft);
            padding: 18px 32px;
            transform: translateY(100%);
            transition: transform 0.4s;
            z-index: 90;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
            box-shadow: var(--shadow-lg);
        }

        .compare-bar-luxe.show {
            transform: translateY(0);
        }

        .toast-stack {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast-luxe {
            background: var(--bg-surface);
            border-left: 4px solid var(--accent-emerald);
            padding: 14px 24px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            font-size: 0.85rem;
            transform: translateX(450px);
            transition: 0.3s;
        }

        .toast-luxe.show { transform: translateX(0); }

        @media (max-width: 900px) {
            .main-content-luxe { margin-left: 0; padding: 24px 20px; padding-top: 90px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header-luxe { display: flex; }
            .product-grid-luxe { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        @media (max-width: 600px) {
            .product-grid-luxe { grid-template-columns: 1fr; }
            .hero-catalog h1 { font-size: 1.8rem; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #E2E8F0; }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }
    </style>
</head>
<body>
<div class="grain-overlay"></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<header class="mobile-header-luxe">
    <button class="menu-icon" onclick="openSidebar()"><i class="fa-regular fa-rectangle-list"></i></button>
    <span style="font-weight:800;font-size:1.3rem; letter-spacing:-0.5px;">Salam <span style="color:#0F3B2C;">Market</span></span>
    <button class="menu-icon" onclick="location.href='cart.html'"><i class="fa-regular fa-bag-shopping"></i></button>
</header>
<aside class="sidebar" id="sidebar">
    <div class="logo-couture"><div class="logo-mark"><i class="fa-regular fa-gem"></i></div><div class="logo-text"><h1>Salam Market</h1><p>ÉLÉGANCE & SAVEURS</p></div></div>
    <nav class="nav-luxe"><div class="nav-item-luxe active"><i class="fa-regular fa-compass"></i> Catalogue</div><div class="nav-item-luxe"><i class="fa-regular fa-basket-shopping"></i> Panier</div><div class="nav-item-luxe"><i class="fa-regular fa-truck"></i> Commandes</div><div class="nav-item-luxe"><i class="fa-regular fa-user"></i> Profil</div></nav>
    <button class="btn-logout-premium" onclick="logout()"><i class="fa-regular fa-arrow-right-from-bracket"></i> Déconnexion</button>
</aside>
<main class="main-content-luxe">
    <div class="hero-catalog"><h1><i class="fa-regular fa-sparkles"></i> Élixir du quotidien</h1><p id="productCount">Une sélection d'exception</p></div>
    <div class="search-premium"><div class="search-group"><i class="fa-regular fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Recherchez un produit rare… (riz, savon artisanal, pâtes, dentifrice)"></div><button class="voice-luxe" id="voiceBtn" onclick="startVoiceSearch()"><i class="fa-regular fa-microphone"></i></button></div>
    <div class="filter-bar"><div class="chip-collection" id="categoryFilters"></div><div><select id="sortSelect" class="select-luxe"><option value="default">✨ Trier par</option><option value="price-asc">Prix croissant</option><option value="price-desc">Prix décroissant</option><option value="name-asc">Nom A → Z</option></select></div><div class="view-switch"><button class="view-btn-luxe active" data-view="grid" onclick="setView('grid')"><i class="fa-regular fa-grid-2"></i> Grille</button><button class="view-btn-luxe" data-view="list" onclick="setView('list')"><i class="fa-regular fa-list"></i> Liste</button></div></div>
    <div id="productsContainer" class="product-grid-luxe"></div>
</main>
<div class="compare-bar-luxe" id="compareBar"><div><i class="fa-regular fa-chart-scatter"></i> Comparateur (<span id="compareCount">0</span>/4)</div><div class="compare-items" id="compareItems"></div><button class="btn-cart-premium" onclick="compareSelected()" style="width:auto; padding:8px 28px;">Comparer</button></div>
<div class="toast-stack" id="toastContainer"></div>

g","Huile Major Grand Bidon":"huileMajorGrand.jpg","Huile Major (gamme)":"huileMajorTYPE.jpg","Huile Oléo 1L":"huileOleo.jpg","Macaroni La Pasta":"MacaroniPASTA.jpg","Penne La Pasta Gold 500g":"macaroni-pasta-gold-500g-penne.jpg","Nivea (gamme complète)":"NIVEATOUT.jpg","Nivea Perfect & Radiant":"NIVEA.jpg","Nivea Crème":"NIVEACREME.jpg","Nivea Body Milk Nourishing":"NIVEALAIT.jpg"

    let currentCat="all",search="",sort="default",view="grid",compareList=JSON.parse(localStorage.getItem("salam_compare")||"[]");
    let cats=["all",...new Set(PRODUCTS.map(p=>p.category))];
    function renderChips(){document.getElementById("categoryFilters").innerHTML=cats.map(c=>`<div class="chip-luxe ${currentCat===c?'active':''}" onclick="filterByCat('${c}')">${c==='all'?'🏷️ Tous':c}</div>`).join("");}
    function filterByCat(c){currentCat=c;renderChips();render();}
    function setView(v){view=v;document.querySelectorAll(".view-btn-luxe").forEach(btn=>btn.classList.remove("active"));document.querySelector(`.view-btn-luxe[data-view="${v}"]`).classList.add("active");render();}
    function getFiltered(){let f=PRODUCTS.filter(p=>(currentCat==='all'||p.category===currentCat)&&(search===''||p.name.toLowerCase().includes(search)||p.supplier.toLowerCase().includes(search)));if(sort==='price-asc')f.sort((a,b)=>a.price-b.price);else if(sort==='price-desc')f.sort((a,b)=>b.price-a.price);else if(sort==='name-asc')f.sort((a,b)=>a.name.localeCompare(b.name));return f;}
    function badgeClass(b){if(b==='best')return "hot";if(b==='premium')return "premium";if(b==='hot')return "hot";if(b==='fresh')return "hot";return "";}
    function badgeLabel(b){if(b==='best')return "⭐ EXCELLENCE";if(b==='premium')return "✨ PREMIUM";if(b==='hot')return "🔥 TREND";if(b==='fresh')return "🌿 FRAIS";return "";}
    function render(){let items=getFiltered();document.getElementById("productCount").innerHTML=`${items.length} merveilles sélectionnées`;let cont=document.getElementById("productsContainer");if(view==="grid"){cont.className="product-grid-luxe";cont.innerHTML=items.map(p=>`<div class="product-card-luxe"><div class="img-container">${p.badge?`<span class="badge-exclusive ${badgeClass(p.badge)}">${badgeLabel(p.badge)}</span>`:''}<img src="${getImage(p.name)}" onerror="this.src='../images/SpaghettiBarilla500g.jpg'"></div><div class="product-details"><h3>${escape(p.name)}</h3><div class="supplier-luxe"><i class="fa-regular fa-store"></i> ${escape(p.supplier)}</div><div class="price-luxe">${p.price.toLocaleString()} FCFA <span style="font-size:0.8rem;">/${p.unit}</span></div><div class="action-buttons"><button class="btn-cart-premium" onclick="addToCart(${p.id},'${escape(p.name)}',${p.price})"><i class="fa-regular fa-plus"></i> Ajouter</button><button class="btn-compare-luxe ${compareList.includes(p.id)?'active':''}" onclick="toggleCompare(${p.id})"><i class="fa-regular fa-chart-line"></i></button></div></div></div>`).join("");}else{cont.className="product-list-luxe";cont.innerHTML=items.map(p=>`<div class="list-row"><div class="list-img"><img src="${getImage(p.name)}" style="width:100%;height:100%;object-fit:cover;"></div><div style="flex:1;"><h3>${escape(p.name)}</h3><div style="font-size:0.75rem;color:#64748B;">${p.supplier} · ${p.unit}</div><div class="price-luxe" style="margin:6px 0 0;">${p.price.toLocaleString()} FCFA</div></div><div style="display:flex;gap:12px;"><button class="btn-cart-premium" style="padding:8px 22px;" onclick="addToCart(${p.id},'${escape(p.name)}',${p.price})">Ajouter</button><button class="btn-compare-luxe ${compareList.includes(p.id)?'active':''}" onclick="toggleCompare(${p.id})"><i class="fa-regular fa-chart-line"></i></button></div></div>`).join("");}}
    function addToCart(id,name,price){let cart=JSON.parse(localStorage.getItem("salam_cart")||"[]");let ex=cart.find(i=>i.id===id);ex?ex.quantity+=1:cart.push({id,name,price,quantity:1,image:getImage(name),supplier:PRODUCTS.find(p=>p.id===id)?.supplier});localStorage.setItem("salam_cart",JSON.stringify(cart));showToast("Panier","+1 ${name}");}
    function toggleCompare(id){if(compareList.includes(id))compareList=compareList.filter(i=>i!==id);else{if(compareList.length>=4){showToast("Limite","Maximum 4 produits","error");return}compareList.push(id)}localStorage.setItem("salam_compare",JSON.stringify(compareList));render();updateCompareBar();}
    function updateCompareBar(){let bar=document.getElementById("compareBar");let cont=document.getElementById("compareItems");let cnt=compareList.length;document.getElementById("compareCount").innerText=cnt;if(cnt===0){bar.classList.remove("show");return}bar.classList.add("show");let prods=PRODUCTS.filter(p=>compareList.includes(p.id));cont.innerHTML=prods.map(p=>`<div style="background:#F1F5F9; border-radius:40px; padding:5px 14px; display:flex; gap:10px; align-items:center;"><img src="${getImage(p.name)}" style="width:28px;height:28px;border-radius:12px;"> <span style="font-size:0.75rem;">${p.name.slice(0,16)}</span><button onclick="toggleCompare(${p.id})" style="background:none; border:none; cursor:pointer; color:#9E2A2B;"><i class="fa-regular fa-circle-xmark"></i></button></div>`).join("");}
    function compareSelected(){if(compareList.length<2){showToast("Comparaison","Choisissez 2 produits minimum","warning");return}let prods=PRODUCTS.filter(p=>compareList.includes(p.id));let modal=document.createElement("div");modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(14px);z-index:1000;display:flex;align-items:center;justify-content:center;";let inner=document.createElement("div");inner.style.cssText="background:white;border-radius:32px;max-width:1100px;width:90%;padding:28px;max-height:80vh;overflow:auto;";inner.innerHTML=`<div style="display:flex;justify-content:space-between;"><h2 style="font-family:Plus Jakarta Sans;"><i class="fa-regular fa-chart-scatter"></i> Comparaison raffinée</h2><button onclick="this.closest('div').parentElement.parentElement.remove()" style="background:none;border:none;font-size:1.8rem;">&times;</button></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;margin-top:24px;">${prods.map(p=>`<div style="background:#F8FAFC;border-radius:24px;padding:20px;text-align:center;"><img src="${getImage(p.name)}" style="width:100%;height:140px;object-fit:cover;border-radius:20px;"><h3 style="margin:12px 0;">${p.name}</h3><div style="color:#0F3B2C;font-weight:800;font-size:1.2rem;">${p.price.toLocaleString()} FCFA</div><div>${p.supplier}</div><button class="btn-cart-premium" style="margin-top:16px;" onclick="addToCart(${p.id},'${p.name}',${p.price})">Ajouter</button></div>`).join("")}</div>`;modal.appendChild(inner);document.body.appendChild(modal);modal.onclick=e=>e.target===modal&&modal.remove();}
    let recognition;function startVoiceSearch(){const btn=document.getElementById("voiceBtn");if(!('webkitSpeechRecognition' in window)){showToast("Voice","Non supporté","error");return}const SpeechRecognition=window.webkitSpeechRecognition;recognition=new SpeechRecognition();recognition.lang="fr-FR";recognition.onstart=()=>{btn.classList.add("listening");btn.innerHTML='<i class="fa-regular fa-microphone-slash"></i>';};recognition.onresult=e=>{let txt=e.results[0][0].transcript;document.getElementById("searchInput").value=txt;search=txt.toLowerCase();render();showToast("🔊 Recherche","\""+txt+"\"");};recognition.onend=()=>{btn.classList.remove("listening");btn.innerHTML='<i class="fa-regular fa-microphone"></i>';};recognition.start();}
    function showToast(title,msg){let cont=document.getElementById("toastContainer");let t=document.createElement("div");t.className="toast-luxe";t.innerHTML=`<i class="fa-regular fa-circle-check" style="color:#0F3B2C;"></i> <div><strong>${title}</strong><br><small>${msg}</small></div>`;cont.appendChild(t);setTimeout(()=>t.classList.add("show"),10);setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},3000);}
    function escape(s){return String(s).replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
