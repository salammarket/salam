<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#0A0A14">
    <meta name="description" content="Catalogue ultra complet Salam Market - Des milliers de produits authentiques">
    <title>Salam Market · Catalogue PRO Ultra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --emerald-400: #34D399;
            --emerald-500: #10B981;
            --emerald-600: #059669;
            --violet-400: #A78BFA;
            --violet-500: #8B5CF6;
            --rose-500: #F43F5E;
            --amber-500: #F59E0B;
            --blue-500: #3B82F6;
            --surface-primary: #0A0A14;
            --surface-card: rgba(18, 18, 32, 0.9);
            --surface-card-solid: #121220;
            --surface-input: rgba(10, 10, 20, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-default: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-muted: #94A3B8;
            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 60px rgba(16,185,129,0.08);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: var(--font-body);
            background: var(--surface-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Background animé */
        .bg-ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle at 20% 30%, rgba(16,185,129,0.12), transparent 60%);
            filter: blur(80px);
        }
        .bg-glow-2 {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle at 80% 70%, rgba(139,92,246,0.1), transparent 60%);
            filter: blur(100px);
        }

        /* Layout */
        .app { display: flex; min-height: 100vh; position: relative; z-index: 2; }
        
        /* Sidebar flottante moderne */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(32px);
            border-right: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 28px 20px;
            transition: all 0.3s var(--ease-spring);
            z-index: 50;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 28px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--emerald-500), var(--emerald-600));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 20px rgba(16,185,129,0.2);
        }
        .logo-text h1 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; }
        .logo-text p { font-size: 0.65rem; color: var(--emerald-400); font-weight: 500; }
        
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }
        .nav-item i { width: 24px; font-size: 1.1rem; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: white; transform: translateX(4px); }
        .nav-item.active { background: rgba(16,185,129,0.1); color: var(--emerald-400); border-left: 2px solid var(--emerald-500); }
        
        .logout-btn {
            margin-top: auto;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: transparent;
            border: 1px solid var(--border-default);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover { background: rgba(244,63,94,0.1); border-color: var(--rose-500); color: var(--rose-500); }

        /* Mobile */
        .mobile-header {
            display: none;
            position: sticky;
            top: 0;
            background: rgba(10,10,20,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            justify-content: space-between;
            align-items: center;
            z-index: 40;
            border-bottom: 1px solid var(--border-subtle);
        }
        .menu-toggle { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; width: 44px; height: 44px; }
        .overlay-mobile {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 45;
        }
        
        /* Main content */
        .main {
            flex: 1;
            padding: 28px 32px;
            max-width: calc(100% - 280px);
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* Header section */
        .page-header { margin-bottom: 32px; }
        .page-header h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, #fff, var(--emerald-400)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stats-badge { background: var(--surface-card); border-radius: 40px; padding: 6px 16px; font-size: 0.8rem; color: var(--text-muted); display: inline-block; margin-top: 8px; }
        
        /* Barre recherche avancée */
        .search-panel {
            background: var(--surface-card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 20px 28px;
            margin-bottom: 32px;
            transition: all 0.3s;
        }
        .search-wrapper {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-field {
            flex: 2;
            position: relative;
        }
        .search-field input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--surface-input);
            border: 1.5px solid var(--border-default);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .search-field input:focus { border-color: var(--emerald-400); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .search-field i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        .voice-search {
            width: 56px;
            height: 56px;
            border-radius: 60px;
            background: rgba(16,185,129,0.1);
            border: 1px solid var(--border-accent);
            color: var(--emerald-400);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .voice-search.listening { background: var(--rose-500); color: white; animation: pulseMic 1.2s infinite; }
        @keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(244,63,94,0.4); } 100% { box-shadow: 0 0 0 12px rgba(244,63,94,0); } }
        
        /* Filtres */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }
        .categories {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .cat-chip {
            padding: 8px 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-default);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-chip.active, .cat-chip:hover { background: var(--emerald-500); border-color: var(--emerald-500); color: black; }
        
        .controls { display: flex; gap: 12px; align-items: center; }
        .sort-select {
            background: var(--surface-input);
            border: 1px solid var(--border-default);
            padding: 10px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .view-toggle {
            display: flex;
            background: var(--surface-input);
            border-radius: 40px;
            padding: 4px;
        }
        .view-btn {
            padding: 8px 14px;
            border-radius: 32px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        .view-btn.active { background: var(--emerald-500); color: white; }
        
        /* Grille produits ultra responsive */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 26px;
        }
        .product-card {
            background: var(--surface-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all 0.35s var(--ease-spring);
        }
        .product-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: var(--emerald-400);
            box-shadow: var(--shadow-glow);
        }
        .card-img {
            height: 220px;
            background: linear-gradient(145deg, #111118, #0a0a10);
            position: relative;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .product-card:hover .card-img img { transform: scale(1.08); }
        .badge {
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 700;
            background: var(--emerald-500);
            color: black;
            z-index: 2;
        }
        .badge.hot { background: var(--rose-500); color: white; }
        .badge.promo { background: var(--amber-500); color: black; }
        .card-body { padding: 20px; }
        .product-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .supplier { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 10px; display: flex; gap: 6px; align-items: center; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--emerald-400); margin-bottom: 16px; }
        .actions { display: flex; gap: 12px; }
        .btn-cart {
            flex: 1;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 40px;
            padding: 12px;
            font-weight: 600;
            color: var(--emerald-400);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cart:hover { background: var(--emerald-500); color: black; }
        .btn-compare {
            width: 48px;
            border-radius: 40px;
            background: transparent;
            border: 1px solid var(--border-default);
            cursor: pointer;
        }
        .btn-compare.active { background: var(--violet-500); border-color: var(--violet-500); color: white; }
        
        /* Liste view */
        .list-view {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--surface-card);
            border-radius: var(--radius-lg);
            padding: 16px;
            transition: 0.2s;
        }
        .list-item:hover { background: rgba(255,255,255,0.03); transform: translateX(6px); }
        .list-img { width: 80px; height: 80px; border-radius: 16px; overflow: hidden; flex-shrink: 0; }
        .list-img img { width: 100%; height: 100%; object-fit: cover; }
        .list-info { flex: 1; }
        .list-price { font-weight: 800; color: var(--emerald-400); }
        
        /* Compare bar */
        .compare-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,20,0.98);
            backdrop-filter: blur(32px);
            border-top: 1px solid var(--border-default);
            padding: 16px 28px;
            transform: translateY(100%);
            transition: transform 0.4s;
            z-index: 60;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .compare-drawer.open { transform: translateY(0); }
        .compare-items-list { display: flex; gap: 12px; flex-wrap: wrap; }
        .compare-chip {
            background: rgba(16,185,129,0.15);
            padding: 6px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
        }
        
        /* Toast */
        .toast-stack {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background: #1a1a2a;
            border-left: 3px solid var(--emerald-500);
            padding: 14px 22px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            transform: translateX(120%);
            transition: 0.3s;
        }
        
        @media (max-width: 1024px) {
            .main { padding: 20px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; top: 0; height: 100vh; z-index: 100; background: rgba(5,5,12,0.98); }
            .sidebar.open { left: 0; }
            .main { max-width: 100%; padding: 16px; }
            .mobile-header { display: flex; }
            .overlay-mobile.show { display: block; }
            .search-wrapper { flex-direction: column; }
            .voice-search { width: 100%; height: 52px; }
        }
        @media (max-width: 480px) {
            .products-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="bg-ambient"><div class="bg-glow"></div><div class="bg-glow-2"></div></div>
<div class="overlay-mobile" id="mobileOverlay" onclick="closeSidebar()"></div>
<header class="mobile-header">
    <button class="menu-toggle" onclick="openSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
    <div style="font-weight:700;">Salam <span style="color:#10B981;">Market</span></div>
    <button class="menu-toggle" onclick="location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i></button>
</header>
<aside class="sidebar" id="sidebar">
    <div class="logo-area"><div class="logo-icon"><i class="fa-solid fa-crown"></i></div><div class="logo-text"><h1>Salam Market</h1><p>ULTRA PRO</p></div></div>
    <div class="nav-menu">
        <div class="nav-item active"><i class="fa-solid fa-grid-2"></i> Catalogue</div>
        <div class="nav-item"><i class="fa-solid fa-cart-shopping"></i> Panier</div>
        <div class="nav-item"><i class="fa-solid fa-truck-fast"></i> Commandes</div>
        <div class="nav-item"><i class="fa-solid fa-heart"></i> Favoris</div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</button>
</aside>
<main class="main">
    <div class="container">
        <div class="page-header"><h1>🛒 Explorateur de produits</h1><div class="stats-badge" id="productCounter">Chargement...</div></div>
        <div class="search-panel"><div class="search-wrapper"><div class="search-field"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Rechercher riz, pâtes, savon, huile, dentifrice..."></div><button class="voice-search" id="voiceBtn"><i class="fa-solid fa-microphone"></i></button></div></div>
        <div class="filter-bar"><div class="categories" id="categoryList"></div><div class="controls"><select id="sortSelect" class="sort-select"><option value="default">Trier par défaut</option><option value="price-asc">Prix croissant</option><option value="price-desc">Prix décroissant</option><option value="name">Nom A-Z</option></select><div class="view-toggle"><button class="view-btn active" data-view="grid" onclick="setView('grid')"><i class="fa-solid fa-table-cells-large"></i></button><button class="view-btn" data-view="list" onclick="setView('list')"><i class="fa-solid fa-list-ul"></i></button></div></div></div>
        <div id="productsContainer" class="products-grid"></div>
    </div>
</main>
<div class="compare-drawer" id="compareDrawer"><div style="font-weight:600;"><i class="fa-solid fa-chart-line"></i> Comparaison (<span id="compareCount">0</span>/4)</div><div class="compare-items-list" id="compareListUI"></div><button class="btn-cart" style="width:auto; padding:8px 24px;" onclick="openCompareModal()">Comparer</button></div>
<div class="toast-stack" id="toastRoot"></div>
<script>
    // ========== GÉNÉRATION DYNAMIQUE DE PRODUITS AVEC IMAGES EN LIGNE HAUTE QUALITÉ ==========
    const CATEGORIES_LIST = ["Tous","Riz","Pâtes","Dentifrices","Savons","Huiles","Conserves","Ménage","Hygiène","Épicerie","Viandes","Fruits"];
    const SUPPLIERS = ["Salam Premium","Golden Mart","Fresh Direct","Authentic Africa","Mega Store","Chez Nous","Bio Nature"];
    
    // Fonction pour générer des images réalistes via placeholder + unsplash style
    const getProductImage = (cat, idx) => {
        const seeds = {
            "Riz": "rice-grain", "Pâtes": "pasta-spaghetti", "Dentifrices": "toothpaste-tube", "Savons": "soap-bar", 
            "Huiles": "olive-oil", "Conserves": "canned-fish", "Ménage": "detergent", "Hygiène": "toiletries",
            "Épicerie": "sugar-bag", "Viandes": "chicken-raw", "Fruits": "mango-fresh"
        };
        const term = seeds[cat] || "grocery";
        return `https://images.pexels.com/photos/${800000 + (idx * 123) % 50000}/pexels-photo-${800000 + (idx * 123) % 50000}.jpeg?auto=compress&cs=tinysrgb&w=400&h=300&fit=crop`;
    };
    // Fallback image 
    const FALLBACK_IMG = "https://images.unsplash.com/photo-1542838132-92c53300491e?w=400&h=300&fit=crop";
    
    // Générer 72 produits ultra variés et réalistes
    const generateProducts = () => {
        let products = [];
        const baseNames = {
            "Riz": ["Riz Basmati Extra", "Riz Thaï Parfumé", "Riz Long Grain", "Riz Étuvé", "Riz Complet Bio", "Riz Jasmine"],
            "Pâtes": ["Spaghetti Barilla", "Macaroni Coquille", "Fusilli Tricolore", "Penne Rigate", "Tagliatelle Fraîches", "Lasagnes"],
            "Dentifrices": ["Colgate Whitening", "Sensodyne Pro", "Parodontax Active", "Signal Integral", "Elmex Sensitive", "Oral-B Complete"],
            "Savons": ["Savon à l'Aloès", "Savon Charbon Actif", "Savon Shea Butter", "Dettol Fraîcheur", "Nivea Crème", "Savon Africain Noir"],
            "Huiles": ["Huile d'Olive Vierge", "Huile de Tournesol", "Huile de Coco Bio", "Huile d'Argan Culinaire", "Mayonnaise Fine", "Huile de Palme Rouge"],
            "Conserves": ["Sardines à l'huile", "Thon Albacore", "Macaroni en sauce", "Petits Pois Carottes", "Haricots Verts", "Tomates Pelées"],
            "Ménage": ["Lessive Concentrée", "Nettoyant Multi-usage", "Liquide Vaisselle", "Détachant Puissant", "Assouplissant Douceur", "Crème à Récurer"],
            "Hygiène": ["Papier toilette x12", "Serviettes hygiéniques", "Cotons démaquillants", "Lingettes bébé", "Gel Douche Exotique", "Shampoing Solide"],
            "Épicerie": ["Sucre Blanc", "Sel Fin", "Farine de Blé", "Miel Pur", "Confiture Fruits Rouges", "Café Moulu"],
            "Viandes": ["Filet de Poulet", "Viande Hachée", "Côtelettes d'Agneau", "Escalopes de Dinde", "Bœuf Bourguignon", "Saucisses Fumées"],
            "Fruits": ["Mangues Juteuses", "Bananes Plantain", "Oranges Navel", "Pommes Golden", "Ananas Victoria", "Pastèque Sucrée"]
        };
        let id = 1;
        for (let cat of CATEGORIES_LIST.filter(c => c !== "Tous")) {
            let items = baseNames[cat] || [`Produit ${cat} Premium`, `${cat} Authentique`, `${cat} Qualité`];
            for (let i = 0; i < items.length; i++) {
                let name = items[i % items.length];
                let price = Math.floor(Math.random() * (cat === "Viandes" ? 5500 : cat === "Huiles" ? 2800 : cat === "Riz" ? 1800 : 1200) + 400);
                let unit = cat === "Riz" ? "kg" : (cat === "Huiles" ? "L" : (cat === "Viandes" ? "kg" : "unité"));
                let sales = Math.floor(Math.random() * 2000) + 100;
                let badge = sales > 1400 ? "hot" : (price > 3000 ? "premium" : "");
                products.push({
                    id: id++, name: `${name} ${Math.floor(Math.random()*100)+1}g?`.slice(0,32), category: cat, price: price,
                    unit: unit, supplier: SUPPLIERS[Math.floor(Math.random()*SUPPLIERS.length)], sales, badge,
                    imgUrl: `https://source.unsplash.com/featured/400x300/?${cat.toLowerCase().replace(/[éè]/g,'e')},food`
                });
            }
        }
        // Ajouter les produits spécifiques des fichiers (pour les images locales si besoin mais priorité online)
        // On mélange un peu
        return products.sort(() => Math.random() - 0.5);
    };
    
    let PRODUCTS = generateProducts();
    let currentCategory = "Tous";
    let searchQuery = "";
    let currentSort = "default";
    let currentView = "grid";
    let compareList = [];
    
    function getFiltered() {
        let filtered = PRODUCTS.filter(p => (currentCategory === "Tous" || p.category === currentCategory) &&
            (searchQuery === "" || p.name.toLowerCase().includes(searchQuery) || p.category.toLowerCase().includes(searchQuery) || p.supplier.toLowerCase().includes(searchQuery)));
        if(currentSort === "price-asc") filtered.sort((a,b)=>a.price-b.price);
        else if(currentSort === "price-desc") filtered.sort((a,b)=>b.price-a.price);
        else if(currentSort === "name") filtered.sort((a,b)=>a.name.localeCompare(b.name));
        return filtered;
    }
    
    function render() {
        let items = getFiltered();
        document.getElementById("productCounter").innerHTML = `<i class="fa-regular fa-cube"></i> ${items.length} produits disponibles`;
        const container = document.getElementById("productsContainer");
        if(currentView === "grid") {
            container.className = "products-grid";
            container.innerHTML = items.map(p => `
                <div class="product-card">
                    <div class="card-img">${p.badge ? `<span class="badge ${p.badge === 'hot' ? 'hot' : (p.badge === 'premium' ? 'promo' : '')}">${p.badge === 'hot' ? '🔥 Top Vente' : '⭐ Premium'}</span>` : ''}<img src="${p.imgUrl}" alt="${p.name}" onerror="this.src='${FALLBACK_IMG}'"></div>
                    <div class="card-body"><div class="product-title">${escapeHtml(p.name)}</div><div class="supplier"><i class="fa-regular fa-building"></i> ${escapeHtml(p.supplier)}</div><div class="price">${p.price.toLocaleString()} FCFA <span style="font-size:0.7rem;">/${p.unit}</span></div><div class="actions"><button class="btn-cart" onclick="addToCart(${p.id})"><i class="fa-solid fa-bag-shopping"></i> Ajouter</button><button class="btn-compare ${compareList.includes(p.id) ? 'active' : ''}" onclick="toggleCompare(${p.id})"><i class="fa-solid fa-chart-simple"></i></button></div></div>
                </div>`).join("");
        } else {
            container.className = "list-view";
            container.innerHTML = items.map(p => `
                <div class="list-item"><div class="list-img"><img src="${p.imgUrl}" onerror="this.src='${FALLBACK_IMG}'"></div><div class="list-info"><strong>${escapeHtml(p.name)}</strong><div style="font-size:0.7rem; color:#94A3B8;">${p.supplier}</div><div class="list-price">${p.price.toLocaleString()} FCFA / ${p.unit}</div></div><div style="display:flex; gap:12px;"><button class="btn-cart" style="padding:8px 18px;" onclick="addToCart(${p.id})">Ajouter</button><button class="btn-compare ${compareList.includes(p.id) ? 'active' : ''}" onclick="toggleCompare(${p.id})"><i class="fa-solid fa-chart-simple"></i></button></div></div>`).join("");
        }
        updateCompareUI();
    }
    
    function addToCart(id) {
        let p = PRODUCTS.find(x => x.id === id);
        let cart = JSON.parse(localStorage.getItem("salam_cart") || "[]");
        let exist = cart.find(i => i.id === id);
        if(exist) exist.quantity++;
        else cart.push({ id: p.id, name: p.name, price: p.price, quantity: 1, image: p.imgUrl, supplier: p.supplier });
        localStorage.setItem("salam_cart", JSON.stringify(cart));
        showToast("✅ Ajouté", `${p.name} au panier`);
    }
    
    function toggleCompare(id) {
        if(compareList.includes(id)) compareList = compareList.filter(i => i !== id);
        else { if(compareList.length >= 4) { showToast("⚠️ Limite", "Maximum 4 produits comparables", "error"); return; } compareList.push(id); }
        render();
    }
    function updateCompareUI() {
        let drawer = document.getElementById("compareDrawer");
        let countSpan = document.getElementById("compareCount");
        let container = document.getElementById("compareListUI");
        if(compareList.length === 0) { drawer.classList.remove("open"); return; }
        drawer.classList.add("open");
        countSpan.innerText = compareList.length;
        let prods = PRODUCTS.filter(p => compareList.includes(p.id));
        container.innerHTML = prods.map(p => `<div class="compare-chip"><img src="${p.imgUrl}" style="width:28px;height:28px;border-radius:8px;object-fit:cover;"> ${p.name.slice(0,15)} <button onclick="toggleCompare(${p.id})" style="background:none;border:none;color:#94A3B8;"><i class="fa-solid fa-xmark"></i></button></div>`).join("");
    }
    function openCompareModal() {
        if(compareList.length < 2) { showToast("Comparaison", "Ajoutez au moins 2 produits", "error"); return; }
        let prods = PRODUCTS.filter(p => compareList.includes(p.id));
        let modalHtml = `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;"><div style="background:#0F0F1E;border-radius:32px;max-width:1200px;width:100%;max-height:80vh;overflow:auto;padding:24px;"><div style="display:flex;justify-content:space-between;"><h3 style="font-family:Space Grotesk;">📊 Comparaison détaillée</h3><button onclick="this.closest('div').parentElement.remove()" style="background:none;border:none;color:white;font-size:28px;">&times;</button></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:24px;">` + prods.map(p => `<div style="background:#1a1a2a;border-radius:24px;padding:20px;text-align:center;"><img src="${p.imgUrl}" style="width:100%;height:160px;object-fit:cover;border-radius:20px;margin-bottom:12px;"><h4>${p.name}</h4><div style="color:#34D399;font-size:1.4rem;font-weight:800;">${p.price.toLocaleString()} FCFA</div><div>${p.supplier}</div><button class="btn-cart" style="margin-top:16px;" onclick="addToCart(${p.id}); this.closest('div').parentElement.parentElement.parentElement.remove();">Ajouter au panier</button></div>`).join("") + `</div></div></div>`;
        let modalDiv = document.createElement("div"); modalDiv.innerHTML = modalHtml; document.body.appendChild(modalDiv.firstChild);
    }
    
    let recognition = null;
    function startVoice() {
        const btn = document.getElementById("voiceBtn");
        if(!('webkitSpeechRecognition' in window)) { showToast("Non supporté", "Recherche vocale indispo", "error"); return; }
        const SpeechRecognition = window.webkitSpeechRecognition;
        recognition = new SpeechRecognition(); recognition.lang = "fr-FR";
        recognition.onstart = () => { btn.classList.add("listening"); btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>'; };
        recognition.onresult = (e) => { let t = e.results[0][0].transcript; document.getElementById("searchInput").value = t; searchQuery = t.toLowerCase(); render(); showToast("🎤 Recherche", `"${t}"`); };
        recognition.onend = () => { btn.classList.remove("listening"); btn.innerHTML = '<i class="fa-solid fa-microphone"></i>'; };
        recognition.start();
    }
    
    function renderCategories() {
        const catsDiv = document.getElementById("categoryList");
        catsDiv.innerHTML = CATEGORIES_LIST.map(cat => `<div class="cat-chip ${currentCategory === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</div>`).join("");
    }
    function filterByCategory(cat) { currentCategory = cat; renderCategories(); render(); }
    function setView(view) { currentView = view; document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active')); document.querySelector(`.view-btn[data-view="${view}"]`).classList.add('active'); render(); }
    function showToast(title, msg, type="success") { const toastDiv = document.createElement("div"); toastDiv.className = "toast"; toastDiv.innerHTML = `<i class="fa-regular fa-bell"></i> <div><strong>${title}</strong><br><small>${msg}</small></div>`; document.getElementById("toastRoot").appendChild(toastDiv); setTimeout(() => toastDiv.style.transform = "translateX(0)", 10); setTimeout(() => { toastDiv.style.transform = "translateX(120%)"; setTimeout(() => toastDiv.remove(), 300); }, 2800); }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function openSidebar() { document.getElementById("sidebar").classList.add("open"); document.getElementById("mobileOverlay").classList.add("show"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("mobileOverlay").classList.remove("show"); }
    function logout() { localStorage.clear(); window.location.href = "../index.html"; }
    
    document.getElementById("searchInput").addEventListener("input", (e) => { searchQuery = e.target.value.toLowerCase(); render(); });
    document.getElementById("sortSelect").addEventListener("change", (e) => { currentSort = e.target.value; render(); });
    window.filterByCategory = filterByCategory; window.toggleCompare = toggleCompare; window.addToCart = addToCart; window.setView = setView; window.startVoice = startVoice; window.openSidebar = openSidebar; window.closeSidebar = closeSidebar; window.logout = logout; window.openCompareModal = openCompareModal;
    renderCategories(); render();
</script>
</body>
</html>
