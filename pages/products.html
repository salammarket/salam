<html lang="fr">
<head>

        :root {
            --emerald-400: #34D399;
            --emerald-500: #10B981;
            --emerald-600: #059669;
            --violet-500: #8B5CF6;
            --rose-500: #F43F5E;
            --surface-primary: #0A0A14;
            --surface-card: rgba(15, 15, 30, 0.85);
            --surface-card-solid: #0F0F1E;
            --surface-input: rgba(10, 10, 20, 0.7);
            --border-default: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(16, 185, 129, 0.25);
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-muted: #94A3B8;
            --font-display: 'Space Grotesk', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: var(--font-body);
            background: var(--surface-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .bg-decoration { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .bg-gradient-1 { position: absolute; width: 150%; height: 100%; background: radial-gradient(ellipse 80% 60% at 10% -20%, rgba(16, 185, 129, 0.06) 0%, transparent 50%); }

        .app-layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }
        
        .sidebar {

            background: rgba(10, 10, 20, 0.96);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border-default);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);

        .sidebar-logo { width: 44px; height: 44px; background: linear-gradient(135deg, var(--emerald-600), var(--emerald-500)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .sidebar-brand h2 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
        .sidebar-brand p { font-size: 0.65rem; color: var(--emerald-400); }
        .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 14px; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; text-decoration: none; transition: all 0.2s; cursor: pointer; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-secondary); transform: translateX(4px); }
        .nav-item.active { background: rgba(16,185,129,0.08); color: var(--emerald-400); border-left: 2px solid var(--emerald-500); }
        .btn-logout { width: 100%; padding: 12px 16px; background: transparent; border: 1px solid var(--border-default); border-radius: 14px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .btn-logout:hover { background: rgba(239,68,68,0.1); border-color: var(--rose-500); color: var(--rose-500); }
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(10,10,20,0.95); backdrop-filter: blur(40px); border-bottom: 1px solid var(--border-default); z-index: 99; align-items: center; padding: 0 16px; }
        .menu-btn { width: 40px; height: 40px; background: transparent; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 98; }
        .main-content { flex: 1; margin-left: 280px; padding: 28px; position: relative; z-index: 1; }
        .catalog-container { max-width: 1400px; margin: 0 auto; }
        .catalog-header h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 6px; }
        .catalog-header p { color: var(--text-muted); }

        .search-section { background: var(--surface-card); backdrop-filter: blur(20px); border: 1px solid var(--border-default); border-radius: var(--radius-xl); padding: 20px 24px; margin: 24px 0; }
        .search-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .search-input-wrapper { flex: 1; position: relative; }
        .search-input { width: 100%; padding: 16px 16px 16px 48px; background: var(--surface-input); border: 1.5px solid var(--border-default); border-radius: 20px; color: white; font-size: 0.95rem; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: var(--border-accent); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .voice-btn { width: 54px; height: 54px; border-radius: 20px; background: rgba(16,185,129,0.1); border: 1px solid var(--border-accent); color: var(--emerald-400); cursor: pointer; transition: 0.2s; }
        .voice-btn:hover { background: var(--emerald-500); color: white; }
        .voice-btn.listening { background: var(--rose-500); border-color: var(--rose-500); color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244,63,94,0.4); } 50% { box-shadow: 0 0 0 8px rgba(244,63,94,0); } }
        
        .filters-section { display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between; margin-bottom: 28px; }
        .category-filters { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-chip { padding: 8px 18px; border-radius: 40px; font-size: 0.75rem; font-weight: 600; background: transparent; border: 1px solid var(--border-default); color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .filter-chip.active, .filter-chip:hover { background: rgba(16,185,129,0.12); border-color: var(--emerald-400); color: var(--emerald-400); }
        .sort-select { padding: 8px 16px; background: var(--surface-input); border: 1px solid var(--border-default); border-radius: 30px; color: white; cursor: pointer; }
        .view-toggle { display: flex; gap: 6px; background: var(--surface-input); padding: 5px; border-radius: 40px; }
        .view-btn { padding: 8px 14px; border-radius: 30px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .view-btn.active { background: var(--emerald-500); color: white; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .product-card { background: var(--surface-card); backdrop-filter: blur(20px); border: 1px solid var(--border-default); border-radius: var(--radius-xl); overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-6px); border-color: var(--border-accent); box-shadow: var(--shadow-md); }
        .product-img { height: 200px; background: linear-gradient(145deg, #1a1a2a, #0a0a14); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

        .product-card:hover .product-img img { transform: scale(1.05); }
        .product-badge { position: absolute; top: 12px; left: 12px; padding: 4px 12px; border-radius: 30px; font-size: 0.65rem; font-weight: 700; background: var(--emerald-500); color: black; z-index: 2; }
        .product-badge.hot { background: var(--rose-500); color: white; }
        .product-badge.premium { background: var(--violet-500); color: white; }
        .product-info { padding: 20px; }

        .product-supplier { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .product-price { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--emerald-400); margin-bottom: 16px; }
        .product-actions { display: flex; gap: 12px; }
        .btn-add { flex: 1; padding: 12px; background: rgba(16,185,129,0.1); border: 1px solid var(--border-accent); border-radius: 14px; color: var(--emerald-400); font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { background: var(--emerald-500); color: white; }
        .btn-compare { width: 44px; background: transparent; border: 1px solid var(--border-default); border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .btn-compare:hover { border-color: var(--violet-500); }
        .btn-compare.active { background: var(--violet-500); border-color: var(--violet-500); color: white; }
        
        .products-list { display: flex; flex-direction: column; gap: 14px; }
        .product-list-item { display: flex; align-items: center; gap: 20px; background: var(--surface-card); border: 1px solid var(--border-default); border-radius: 20px; padding: 16px; transition: 0.2s; }
        .product-list-item:hover { border-color: var(--border-accent); transform: translateX(4px); }
        .product-list-img { width: 70px; height: 70px; background: #12121f; border-radius: 16px; overflow: hidden; flex-shrink: 0; }
        .product-list-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-list-info { flex: 1; }
        .product-list-info h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .product-list-info .price { color: var(--emerald-400); font-weight: 700; }

        .compare-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0F0F1E; border-top: 1px solid var(--border-default); padding: 16px 28px; transform: translateY(100%); transition: transform 0.4s; z-index: 50; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; align-items: center; }
        .compare-bar.show { transform: translateY(0); }
        .compare-items { display: flex; gap: 12px; flex-wrap: wrap; }
        .compare-item { background: rgba(16,185,129,0.1); padding: 6px 14px; border-radius: 40px; display: flex; gap: 8px; align-items: center; font-size: 0.8rem; }
        .compare-item img { width: 28px; height: 28px; object-fit: cover; border-radius: 8px; }
        .compare-item button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: #1e1e2e; border-left: 3px solid var(--emerald-500); padding: 12px 20px; border-radius: 16px; transform: translateX(120%); transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: var(--emerald-500); }
        .toast.error { border-left-color: var(--rose-500); }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; padding-top: 80px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
            .product-info h3 { white-space: normal; font-size: 0.85rem; }
        }
        @media (max-width: 500px) { .products-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<div class="bg-decoration"><div class="bg-gradient-1"></div></div>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

</header>

        <div class="filters-section"><div class="category-filters" id="categoryFilters"></div><select id="sortSelect" class="sort-select"><option value="default">Trier par</option><option value="price-asc">Prix croissant</option><option value="price-desc">Prix décroissant</option><option value="name-asc">Nom A-Z</option></select><div class="view-toggle"><button class="view-btn active" data-view="grid" onclick="setView('grid')"><i class="fa-solid fa-grid-2"></i></button><button class="view-btn" data-view="list" onclick="setView('list')"><i class="fa-solid fa-list"></i></button></div></div>
        <div id="productsContainer" class="products-grid"></div>
    </div>
</main>

        { id: 31, name: "Détergent Hoka High Foam", category: "Ménage", price: 1750, unit: "kg", supplier: "Hoka", sales: 680, badge: "" },
        { id: 32, name: "Détergent Ozil Ultra Power", category: "Ménage", price: 2300, unit: "6 pièces", supplier: "Ozil", sales: 890, badge: "hot" },
        { id: 33, name: "Serviettes Siempre Extra", category: "Hygiène", price: 1200, unit: "12x", supplier: "Siempre", sales: 950, badge: "" },
        { id: 34, name: "Huile Mayer", category: "Huiles", price: 1350, unit: "1L", supplier: "Mayer", sales: 1430, badge: "best" },
        { id: 35, name: "Huile Rouge 500g", category: "Huiles", price: 1100, unit: "500g", supplier: "Huilerie", sales: 540, badge: "" },
        { id: 36, name: "Poulet fermier", category: "Viandes", price: 3200, unit: "kg", supplier: "Ferme Bini", sales: 680, badge: "fresh" },
        { id: 37, name: "Tomates fraîches", category: "Fruits", price: 450, unit: "kg", supplier: "Maraîcher", sales: 1120, badge: "" },
        { id: 38, name: "Mangues fraîches", category: "Fruits", price: 600, unit: "kg", supplier: "Ferme Moderne", sales: 890, badge: "" }
    ];

    let currentCategory = "all";
    let currentSearch = "";
    let currentSort = "default";
    let currentView = "grid";
    let compareList = JSON.parse(localStorage.getItem("salam_compare") || "[]");
    let categories = ["all", ...new Set(FULL_PRODUCTS.map(p => p.category))];

    function renderCategoryFilters() {
        const container = document.getElementById("categoryFilters");
        container.innerHTML = categories.map(cat => `<button class="filter-chip ${currentCategory === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat === "all" ? "Tous" : cat}</button>`).join("");
    }
    function filterByCategory(cat) { currentCategory = cat; renderCategoryFilters(); renderProducts(); }
    function setView(view) { currentView = view; document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active')); document.querySelector(`.view-btn[data-view="${view}"]`).classList.add('active'); renderProducts(); }
    
    function getFilteredSorted() {
        let filtered = FULL_PRODUCTS.filter(p => (currentCategory === "all" || p.category === currentCategory) && 
            (currentSearch === "" || p.name.toLowerCase().includes(currentSearch) || p.category.toLowerCase().includes(currentSearch) || p.supplier.toLowerCase().includes(currentSearch)));
        if (currentSort === "price-asc") filtered.sort((a,b)=>a.price-b.price);
        else if (currentSort === "price-desc") filtered.sort((a,b)=>b.price-a.price);
        else if (currentSort === "name-asc") filtered.sort((a,b)=>a.name.localeCompare(b.name));
        return filtered;
    }

    function renderProducts() {
        let products = getFilteredSorted();
        document.getElementById("productCount").innerHTML = `${products.length} produits disponibles`;
        const container = document.getElementById("productsContainer");
        if (currentView === "grid") {
            container.className = "products-grid";
            container.innerHTML = products.map(p => {
                const badgeClass = p.badge === "best" ? "hot" : (p.badge === "premium" ? "premium" : (p.badge === "hot" ? "hot" : ""));
                const badgeText = p.badge === "best" ? "🔥 Top" : (p.badge === "premium" ? "⭐ Premium" : (p.badge === "hot" ? "📈 Populaire" : (p.badge === "fresh" ? "🌿 Frais" : "")));
                return `<div class="product-card"><div class="product-img">${badgeText ? `<span class="product-badge ${badgeClass}">${badgeText}</span>` : ''}<img src="${getProductImage(p.name)}" alt="${p.name}" onerror="this.src='images/SpaghettiBarilla500g.jpg'"></div><div class="product-info"><h3>${escapeHtml(p.name)}</h3><div class="product-supplier"><i class="fa-solid fa-store"></i> ${escapeHtml(p.supplier)}</div><div class="product-price">${p.price.toLocaleString()} FCFA <small>/${p.unit}</small></div><div class="product-actions"><button class="btn-add" onclick="addToCart(${p.id}, '${escapeHtml(p.name)}', ${p.price})"><i class="fa-solid fa-plus"></i> Ajouter</button><button class="btn-compare ${compareList.includes(p.id) ? 'active' : ''}" onclick="toggleCompare(${p.id})"><i class="fa-solid fa-chart-simple"></i></button></div></div></div>`;
            }).join("");
        } else {
            container.className = "products-list";
            container.innerHTML = products.map(p => `<div class="product-list-item"><div class="product-list-img"><img src="${getProductImage(p.name)}" alt="${p.name}" onerror="this.src='images/SpaghettiBarilla500g.jpg'"></div><div class="product-list-info"><h3>${escapeHtml(p.name)}</h3><div style="font-size:0.7rem; color:#94A3B8;">${escapeHtml(p.supplier)}</div><div class="price">${p.price.toLocaleString()} FCFA / ${p.unit}</div></div><div style="display:flex; gap:8px;"><button class="btn-add" style="padding:8px 16px;" onclick="addToCart(${p.id}, '${escapeHtml(p.name)}', ${p.price})">Ajouter</button><button class="btn-compare ${compareList.includes(p.id) ? 'active' : ''}" onclick="toggleCompare(${p.id})"><i class="fa-solid fa-chart-simple"></i></button></div></div>`).join("");
        }
    }

    function addToCart(id, name, price) {
        let cart = JSON.parse(localStorage.getItem("salam_cart") || "[]");
        let existing = cart.find(i => i.id === id);
        if(existing) existing.quantity += 1;
        else cart.push({ id, name, price, quantity: 1, image: getProductImage(name), supplier: FULL_PRODUCTS.find(p=>p.id===id)?.supplier });
        localStorage.setItem("salam_cart", JSON.stringify(cart));
        showToast("Ajouté au panier", `${name} ajouté ✅`, "success");
    }

    function toggleCompare(id) {
        if(compareList.includes(id)) compareList = compareList.filter(i => i !== id);
        else { if(compareList.length >= 4) { showToast("Limite atteinte", "Maximum 4 produits", "error"); return; } compareList.push(id); }
        localStorage.setItem("salam_compare", JSON.stringify(compareList));
        renderProducts();
        updateCompareBar();
    }
    function updateCompareBar() {
        const bar = document.getElementById("compareBar");
        const container = document.getElementById("compareItems");
        document.getElementById("compareCount").innerText = compareList.length;
        if(compareList.length === 0) { bar.classList.remove("show"); return; }
        bar.classList.add("show");
        let compareProds = FULL_PRODUCTS.filter(p => compareList.includes(p.id));
        container.innerHTML = compareProds.map(p => `<div class="compare-item"><img src="${getProductImage(p.name)}" onerror="this.src='images/SpaghettiBarilla500g.jpg'"> ${p.name.length > 20 ? p.name.slice(0,18)+'...' : p.name} <button onclick="toggleCompare(${p.id})"><i class="fa-solid fa-xmark"></i></button></div>`).join("");
    }
    function compareSelected() {
        if(compareList.length < 2) { showToast("Comparaison", "Sélectionnez au moins 2 produits", "warning"); return; }
        let prods = FULL_PRODUCTS.filter(p => compareList.includes(p.id));
        let html = `<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;">` + prods.map(p => `<div style="background:#111; border-radius:24px; padding:20px; text-align:center;"><img src="${getProductImage(p.name)}" style="width:100%; height:140px; object-fit:cover; border-radius:16px; margin-bottom:12px;" onerror="this.src='images/SpaghettiBarilla500g.jpg'"><h4>${p.name}</h4><div style="color:#34D399; font-weight:bold;">${p.price} FCFA</div><div style="font-size:0.7rem;">${p.supplier}</div><button class="btn-add" style="margin-top:12px;" onclick="addToCart(${p.id},'${p.name}',${p.price})">Ajouter</button></div>`).join("") + `</div>`;
        let modal = document.createElement("div"); modal.style.position="fixed"; modal.style.inset=0; modal.style.background="rgba(0,0,0,0.85)"; modal.style.backdropFilter="blur(12px)"; modal.style.zIndex=1000; modal.style.display="flex"; modal.style.alignItems="center"; modal.style.justifyContent="center";
        let content = document.createElement("div"); content.style.background="#0F0F1E"; content.style.borderRadius="28px"; content.style.maxWidth="1000px"; content.style.width="90%"; content.style.padding="24px"; content.style.maxHeight="80vh"; content.style.overflow="auto";
        content.innerHTML = `<div style="display:flex; justify-content:space-between;"><h3>🔍 Comparaison produits</h3><button onclick="this.closest('div').parentElement.parentElement.remove()" style="background:none; border:none; color:white; font-size:1.8rem;">&times;</button></div>${html}`;
        modal.appendChild(content); document.body.appendChild(modal); modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    let recognition = null;
    function startVoiceSearch() {
        const btn = document.getElementById("voiceBtn");
        if(!('webkitSpeechRecognition' in window)) { showToast("Non supporté", "Recherche vocale indisponible", "error"); return; }
        const SpeechRecognition = window.webkitSpeechRecognition;
        recognition = new SpeechRecognition(); recognition.lang = "fr-FR"; recognition.interimResults = false;
        recognition.onstart = () => { btn.classList.add("listening"); btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>'; };
        recognition.onresult = (event) => { let text = event.results[0][0].transcript; document.getElementById("searchInput").value = text; currentSearch = text.toLowerCase(); renderProducts(); showToast("Recherche vocale", `"${text}"`, "success"); };
        recognition.onerror = () => showToast("Erreur", "Réessayez", "error");
        recognition.onend = () => { btn.classList.remove("listening"); btn.innerHTML = '<i class="fa-solid fa-microphone"></i>'; };
        recognition.start();
    }

    function showToast(title, msg, type="success") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div"); toast.className = `toast ${type}`; toast.innerHTML = `<i class="fa-solid fa-${type === 'success' ? 'circle-check' : 'circle-exclamation'}"></i> <div><strong>${title}</strong><br><small>${msg}</small></div>`;
        container.appendChild(toast); setTimeout(() => toast.classList.add("show"), 10);
        setTimeout(() => { toast.classList.remove("show"); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function openSidebar() { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    document.getElementById("searchInput").addEventListener("input", (e) => { currentSearch = e.target.value.toLowerCase(); renderProducts(); });
    document.getElementById("sortSelect").addEventListener("change", (e) => { currentSort = e.target.value; renderProducts(); });
    renderCategoryFilters(); renderProducts(); updateCompareBar();
    window.filterByCategory = filterByCategory; window.toggleCompare = toggleCompare; window.addToCart = addToCart; window.compareSelected = compareSelected; window.startVoiceSearch = startVoiceSearch; window.setView = setView; window.openSidebar = openSidebar; window.closeSidebar = closeSidebar; window.logout = logout;
</script>
</body>
</html>
