<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Salam Market — Catalogue Smaragdine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-deep: #020617;
            --bg-surface: rgba(15, 23, 42, 0.65);
            --bg-card: rgba(30, 41, 59, 0.55);
            --bg-solid: #0f172a;
            --border-glow: rgba(16, 185, 129, 0.25);
            --border-dim: rgba(255, 255, 255, 0.06);
            --emerald: #10b981;
            --emerald-bright: #34d399;
            --violet: #8b5cf6;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --font-display: 'Syne', system-ui, sans-serif;
            --font-body: 'Inter', system-ui, sans-serif;
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius-2xl: 28px;
            --radius-xl: 20px;
            --transition-smooth: cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* glassmorphic orbs */
        .bg-orb {
            position: fixed;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { background: #10b981; top: -20vh; right: -20vw; }
        .orb-2 { background: #8b5cf6; bottom: -30vh; left: -10vw; }
        .orb-3 { background: #f59e0b; top: 60vh; left: 30vw; width: 40vw; height: 40vw; filter: blur(100px); opacity: 0.12; }

        /* Sidebar ultra */
        .sidebar {
            width: 290px;
            background: rgba(2, 6, 23, 0.92);
            backdrop-filter: blur(32px);
            border-right: 1px solid var(--border-dim);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 110;
            display: flex;
            flex-direction: column;
            padding: 28px 20px;
            transition: transform 0.4s var(--transition-smooth);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-bottom: 32px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--emerald), #059669);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 8px 20px rgba(16,185,129,0.2);
        }
        .logo-text h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .logo-text p {
            font-size: 0.7rem;
            color: var(--emerald-bright);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 6px;
        }
        .nav-item i { width: 24px; font-size: 1.1rem; }
        .nav-item:hover {
            background: rgba(16,185,129,0.08);
            color: var(--emerald-bright);
            transform: translateX(6px);
        }
        .nav-item.active {
            background: rgba(16,185,129,0.12);
            color: var(--emerald);
            border-left: 3px solid var(--emerald);
        }
        .logout-btn {
            margin-top: auto;
            background: transparent;
            border: 1px solid var(--border-dim);
            padding: 14px 18px;
            border-radius: 18px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            gap: 12px;
            align-items: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: rgba(244,63,94,0.12);
            border-color: var(--rose);
            color: var(--rose);
        }
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(2,6,23,0.85);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-dim);
            z-index: 105;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .menu-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 104;
        }
        .main-content {
            margin-left: 290px;
            padding: 32px 36px;
            position: relative;
            z-index: 2;
        }
        .catalog-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--emerald-bright));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        .search-card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-2xl);
            padding: 20px 28px;
            margin: 28px 0 32px;
        }
        .search-wrapper {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-group {
            flex: 1;
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(0,0,0,0.45);
            border: 1.5px solid var(--border-dim);
            border-radius: 28px;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: var(--emerald);
            outline: none;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
        }
        .voice-pulse {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(16,185,129,0.1);
            border: 1px solid var(--border-glow);
            color: var(--emerald-bright);
            cursor: pointer;
            transition: 0.2s;
        }
        .voice-pulse.listening {
            background: var(--rose);
            border-color: var(--rose);
            color: white;
            animation: micro-pulse 1.2s infinite;
        }
        @keyframes micro-pulse {
            0% { box-shadow: 0 0 0 0 rgba(244,63,94,0.5); }
            70% { box-shadow: 0 0 0 12px rgba(244,63,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(244,63,94,0); }
        }
        .filter-strip {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
        }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .chip {
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip.active, .chip:hover {
            background: rgba(16,185,129,0.2);
            border-color: var(--emerald);
            color: var(--emerald-bright);
            transform: scale(0.97);
        }
        .select-sort {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-dim);
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .view-group {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 50px;
        }
        .view-icon {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }
        .view-icon.active {
            background: var(--emerald);
            color: #020617;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 28px;
        }
        .product-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            transition: all 0.35s var(--transition-smooth);
        }
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(16,185,129,0.5);
            box-shadow: var(--shadow-2xl);
        }
        .card-img {
            height: 230px;
            background: linear-gradient(145deg, #0f172a, #020617);
            position: relative;
            overflow: hidden;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover .card-img img {
            transform: scale(1.08);
        }
        .badge-pro {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 5px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 800;
            background: var(--emerald);
            color: #020617;
            z-index: 3;
        }
        .badge-pro.hot { background: var(--rose); color: white; }
        .badge-pro.premium { background: var(--violet); color: white; }
        .badge-pro.fresh { background: var(--amber); color: black; }
        .product-info {
            padding: 20px 18px 22px;
        }
        .product-info h3 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            margin-bottom: 8px;
        }
        .supplier {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .price-em {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--emerald-bright);
            margin: 12px 0 16px;
        }
        .action-row {
            display: flex;
            gap: 12px;
        }
        .btn-cart {
            flex: 1;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.4);
            border-radius: 18px;
            padding: 12px;
            font-weight: 700;
            color: var(--emerald);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cart:hover {
            background: var(--emerald);
            color: #020617;
            transform: scale(0.98);
        }
        .btn-compare {
            width: 48px;
            background: transparent;
            border: 1px solid var(--border-dim);
            border-radius: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-compare.active {
            background: var(--violet);
            border-color: var(--violet);
            color: white;
        }
        .products-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid var(--border-dim);
            transition: 0.2s;
        }
        .list-item:hover {
            border-color: var(--border-glow);
            transform: translateX(8px);
        }
        .list-img {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            overflow: hidden;
            background: #0f172a;
        }
        .list-img img { width: 100%; height: 100%; object-fit: cover; }
        .compare-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(2,6,23,0.96);
            backdrop-filter: blur(36px);
            border-top: 1px solid var(--border-glow);
            padding: 18px 32px;
            transform: translateY(100%);
            transition: transform 0.35s;
            z-index: 90;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
            gap: 18px;
        }
        .compare-bar.show {
            transform: translateY(0);
        }
        .toast-stack {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            background: #1e293b;
            border-left: 4px solid var(--emerald);
            padding: 12px 22px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            font-size: 0.85rem;
            transform: translateX(400px);
            transition: 0.3s;
        }
        .toast.show { transform: translateX(0); }
        @media (max-width: 860px) {
            .main-content { margin-left: 0; padding: 24px 20px; padding-top: 90px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
        @media (max-width: 560px) {
            .products-grid { grid-template-columns: 1fr; }
            .filter-strip { flex-direction: column; align-items: stretch; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: var(--emerald); border-radius: 10px; }
    </style>
</head>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<header class="mobile-header">
    <button class="menu-btn" onclick="openSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
    <span style="font-weight:800; font-size:1.3rem;">Salam <span style="color:#10b981;">Market</span></span>
    <button class="menu-btn" onclick="location.href='cart.html'"><i class="fa-solid fa-bag-shopping"></i></button>
</header>
<aside class="sidebar" id="sidebar">

    <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Se retirer</button>
</aside>
<main class="main-content">

    <div class="search-card"><div class="search-wrapper"><div class="input-group"><i class="fa-solid fa-search"></i><input type="text" id="searchInput" placeholder="Rechercher riz, spaghetti, savon, dentifrice..."></div><button class="voice-pulse" id="voiceBtn" onclick="startVoiceSearch()"><i class="fa-solid fa-microphone-lines"></i></button></div></div>
    <div class="filter-strip"><div class="chips" id="categoryFilters"></div><div><select id="sortSelect" class="select-sort"><option value="default">✨ Trier par</option><option value="price-asc">💰 Prix croissant</option><option value="price-desc">💰 Prix décroissant</option><option value="name-asc">📗 Nom A-Z</option></select></div><div class="view-group"><button class="view-icon active" data-view="grid" onclick="setView('grid')"><i class="fa-solid fa-table-cells-large"></i></button><button class="view-icon" data-view="list" onclick="setView('list')"><i class="fa-solid fa-list-ul"></i></button></div></div>
    <div id="productsContainer" class="products-grid"></div>
</main>
<div class="compare-bar" id="compareBar"><div><i class="fa-regular fa-copy"></i> Comparer (<span id="compareCount">0</span>/4)</div><div class="compare-items" id="compareItems"></div><button class="btn-cart" onclick="compareSelected()" style="width:auto; padding:8px 24px;">🔍 Comparer</button></div>
<div class="toast-stack" id="toastContainer"></div>

    let currentCategory="all", currentSearch="", currentSort="default", currentView="grid", compareList=JSON.parse(localStorage.getItem("salam_compare")||"[]");
    let categories=["all",...new Set(PRODUCTS.map(p=>p.category))];
    function renderChips(){document.getElementById("categoryFilters").innerHTML=categories.map(c=>`<div class="chip ${currentCategory===c?'active':''}" onclick="filterByCategory('${c}')">${c==='all'?'🌿 Tous':c}</div>`).join("");}
    function filterByCategory(c){currentCategory=c;renderChips();renderProducts();}
    function setView(v){currentView=v;document.querySelectorAll('.view-icon').forEach(btn=>btn.classList.remove('active'));document.querySelector(`.view-icon[data-view="${v}"]`).classList.add('active');renderProducts();}
    function getFiltered(){
        let f=PRODUCTS.filter(p=>(currentCategory==='all'||p.category===currentCategory)&&(currentSearch===''||p.name.toLowerCase().includes(currentSearch)||p.supplier.toLowerCase().includes(currentSearch)));
        if(currentSort==='price-asc')f.sort((a,b)=>a.price-b.price);
        else if(currentSort==='price-desc')f.sort((a,b)=>b.price-a.price);
        else if(currentSort==='name-asc')f.sort((a,b)=>a.name.localeCompare(b.name));
        return f;
    }
    function badgeType(b){if(b==='best')return 'hot';if(b==='premium')return 'premium';if(b==='hot')return 'hot';if(b==='fresh')return 'fresh';return '';}
    function badgeLabel(b){if(b==='best')return '🔥 BEST';if(b==='premium')return '✨ PREMIUM';if(b==='hot')return '📈 POPULAR';if(b==='fresh')return '🌿 FRAIS';return '';}
    function renderProducts(){
        let items=getFiltered();
        document.getElementById("productCount").innerHTML=`${items.length} trésors disponibles ✨`;
        const container=document.getElementById("productsContainer");
        if(currentView==='grid'){
            container.className="products-grid";
            container.innerHTML=items.map(p=>{let bClass=badgeType(p.badge),bText=badgeLabel(p.badge);return `<div class="product-card"><div class="card-img">${bText?`<span class="badge-pro ${bClass}">${bText}</span>`:''}<img src="${getImage(p.name)}" alt="${p.name}" onerror="this.src='../images/SpaghettiBarilla500g.jpg'"></div><div class="product-info"><h3>${escapeHtml(p.name)}</h3><div class="supplier"><i class="fa-regular fa-building"></i> ${escapeHtml(p.supplier)}</div><div class="price-em">${p.price.toLocaleString()} FCFA <span style="font-size:0.8rem;">/${p.unit}</span></div><div class="action-row"><button class="btn-cart" onclick="addToCart(${p.id},'${escapeHtml(p.name)}',${p.price})"><i class="fa-solid fa-cart-plus"></i> Ajouter</button><button class="btn-compare ${compareList.includes(p.id)?'active':''}" onclick="toggleCompare(${p.id})"><i class="fa-solid fa-chart-line"></i></button></div></div></div>`}).join("");
        } else {
            container.className="products-list";
            container.innerHTML=items.map(p=>`<div class="list-item"><div class="list-img"><img src="${getImage(p.name)}" onerror="this.src='../images/SpaghettiBarilla500g.jpg'"></div><div style="flex:1;"><h3>${escapeHtml(p.name)}</h3><div style="font-size:0.7rem; color:#94a3b8;">${p.supplier}</div><div style="color:#34d399; font-weight:700;">${p.price.toLocaleString()} FCFA / ${p.unit}</div></div><div style="display:flex;gap:10px;"><button class="btn-cart" style="padding:8px 18px;" onclick="addToCart(${p.id},'${escapeHtml(p.name)}',${p.price})">Ajouter</button><button class="btn-compare ${compareList.includes(p.id)?'active':''}" onclick="toggleCompare(${p.id})"><i class="fa-solid fa-chart-line"></i></button></div></div>`).join("");
        }
    }
    function addToCart(id,name,price){let cart=JSON.parse(localStorage.getItem("salam_cart")||"[]");let ex=cart.find(i=>i.id===id);if(ex)ex.quantity+=1;else cart.push({id,name,price,quantity:1,image:getImage(name),supplier:PRODUCTS.find(p=>p.id===id)?.supplier});localStorage.setItem("salam_cart",JSON.stringify(cart));showToast("Panier","✅ "+name+" ajouté");}
    function toggleCompare(id){if(compareList.includes(id))compareList=compareList.filter(i=>i!==id);else{if(compareList.length>=4){showToast("Limite","Maximum 4 produits","error");return}compareList.push(id)}localStorage.setItem("salam_compare",JSON.stringify(compareList));renderProducts();updateCompareBar();}
    function updateCompareBar(){let bar=document.getElementById("compareBar");let container=document.getElementById("compareItems");let count=compareList.length;document.getElementById("compareCount").innerText=count;if(count===0){bar.classList.remove("show");return}bar.classList.add("show");let comps=PRODUCTS.filter(p=>compareList.includes(p.id));container.innerHTML=comps.map(p=>`<div style="background:#1e293b; border-radius:40px; padding:5px 12px; display:flex; gap:10px; align-items:center;"><img src="${getImage(p.name)}" style="width:28px;height:28px;border-radius:12px;"> <span style="font-size:0.75rem;">${p.name.slice(0,18)}</span><button onclick="toggleCompare(${p.id})" style="background:none; border:none; color:#f43f5e; cursor:pointer;"><i class="fa-regular fa-circle-xmark"></i></button></div>`).join("");}
    function compareSelected(){if(compareList.length<2){showToast("Comparaison","Sélectionne au moins 2 produits","warning");return}let prods=PRODUCTS.filter(p=>compareList.includes(p.id));let modalDiv=document.createElement("div");modalDiv.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);z-index:1000;display:flex;align-items:center;justify-content:center;";let inner=document.createElement("div");inner.style.cssText="background:#0f172a;border-radius:36px;max-width:1100px;width:90%;padding:24px;max-height:80vh;overflow:auto;";inner.innerHTML=`<div style="display:flex;justify-content:space-between;"><h2 style="font-family:Syne;"><i class="fa-regular fa-clipboard"></i> Comparaison</h2><button onclick="this.closest('div').parentElement.parentElement.remove()" style="background:none;border:none;color:white;font-size:2rem;">&times;</button></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-top:20px;">${prods.map(p=>`<div style="background:#1e293b;border-radius:28px;padding:20px;text-align:center;"><img src="${getImage(p.name)}" style="width:100%;height:150px;object-fit:cover;border-radius:24px;"><h3 style="margin:12px 0;">${p.name}</h3><div style="color:#34d399;font-weight:800;">${p.price.toLocaleString()} FCFA</div><div>${p.supplier}</div><button class="btn-cart" style="margin-top:16px;" onclick="addToCart(${p.id},'${p.name}',${p.price})">Ajouter au panier</button></div>`).join("")}</div>`;modalDiv.appendChild(inner);document.body.appendChild(modalDiv);modalDiv.onclick=(e)=>e.target===modalDiv&&modalDiv.remove();}
    function showToast(title,msg,type="success"){let cont=document.getElementById("toastContainer");let toast=document.createElement("div");toast.className=`toast`;toast.innerHTML=`<i class="fa-solid ${type==='success'?'fa-circle-check':'fa-triangle-exclamation'}"></i> <div><strong>${title}</strong><br><small>${msg}</small></div>`;cont.appendChild(toast);setTimeout(()=>toast.classList.add("show"),10);setTimeout(()=>{toast.classList.remove("show");setTimeout(()=>toast.remove(),300);},3200);}
    function escapeHtml(s){return String(s).replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
    let recognition=null;function startVoiceSearch(){const btn=document.getElementById("voiceBtn");if(!('webkitSpeechRecognition' in window)){showToast("Voice","Non supporté","error");return}const SpeechRecognition=window.webkitSpeechRecognition;recognition=new SpeechRecognition();recognition.lang="fr-FR";recognition.onstart=()=>{btn.classList.add("listening");btn.innerHTML='<i class="fa-solid fa-microphone-slash"></i>';};recognition.onresult=(e)=>{let txt=e.results[0][0].transcript;document.getElementById("searchInput").value=txt;currentSearch=txt.toLowerCase();renderProducts();showToast("🔊 Recherche",`"${txt}"`);};recognition.onend=()=>{btn.classList.remove("listening");btn.innerHTML='<i class="fa-solid fa-microphone-lines"></i>';};recognition.start();}
    function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").style.display="block";}
    function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").style.display="none";}

    document.getElementById("sortSelect").addEventListener("change",(e)=>{currentSort=e.target.value;renderProducts();});
    renderChips();renderProducts();updateCompareBar();
    window.filterByCategory=filterByCategory;window.toggleCompare=toggleCompare;window.addToCart=addToCart;window.compareSelected=compareSelected;window.startVoiceSearch=startVoiceSearch;window.setView=setView;window.openSidebar=openSidebar;window.closeSidebar=closeSidebar;window.logout=logout;
