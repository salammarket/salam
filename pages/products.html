<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0A0C10">
    <meta name="description" content="Salam Market — L'excellence des produits du quotidien, design minimaliste et expérience immersive">
    <title>Salam Market · Catalogue d'Exception</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-deep: #0A0C10;
            --bg-surface: #11151C;
            --bg-elevated: #1A1F2A;
            --bg-card: rgba(26, 31, 42, 0.75);
            --accent-primary: #C4A35A;
            --accent-secondary: #8B7A4B;
            --accent-emerald: #2D6A4F;
            --accent-rose: #9D4E4E;
            --text-primary: #F5F5F7;
            --text-secondary: #B8C0C8;
            --text-muted: #7E8493;
            --border-dim: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(196, 163, 90, 0.25);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(196, 163, 90, 0.2);
            --radius-sm: 16px;
            --radius-md: 24px;
            --radius-lg: 32px;
            --transition-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* animated noise + orbs */
        .bg-aura {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
        }
        .orb-1 { width: 60vw; height: 60vw; background: #C4A35A; top: -20vh; right: -20vw; opacity: 0.12; }
        .orb-2 { width: 50vw; height: 50vw; background: #2D6A4F; bottom: -10vh; left: -15vw; opacity: 0.1; }
        .noise-texture {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* sidebar — élégance absolue */
        .sidebar {
            width: 300px;
            background: rgba(17, 21, 28, 0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-dim);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 120;
            display: flex;
            flex-direction: column;
            padding: 36px 24px;
            transition: transform 0.45s var(--transition-smooth);
        }

        .brand-master {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(196, 163, 90, 0.2);
        }
        .brand-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: var(--shadow-glow);
        }
        .brand-title h2 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .brand-title p {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--accent-primary);
            text-transform: uppercase;
        }
        .nav-lux {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nav-item-lux {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 18px;
            border-radius: 18px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.25s;
            cursor: pointer;
        }
        .nav-item-lux i { width: 26px; font-size: 1.1rem; }
        .nav-item-lux:hover {
            background: rgba(196, 163, 90, 0.08);
            color: var(--accent-primary);
            transform: translateX(6px);
        }
        .nav-item-lux.active {
            background: rgba(196, 163, 90, 0.12);
            color: var(--accent-primary);
            border-left: 2px solid var(--accent-primary);
        }
        .logout-elegant {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-dim);
            padding: 14px 20px;
            border-radius: 28px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            align-items: center;
            transition: 0.25s;
            cursor: pointer;
            margin-top: 20px;
        }
        .logout-elegant:hover {
            background: rgba(157, 78, 78, 0.1);
            border-color: var(--accent-rose);
            color: var(--accent-rose);
        }

        /* mobile */
        .mobile-bar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-dim);
            z-index: 110;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .mobile-menu-btn {
            width: 46px;
            height: 46px;
            background: var(--bg-elevated);
            border-radius: 30px;
            border: none;
            color: var(--accent-primary);
            font-size: 1.2rem;
            cursor: pointer;
        }
        .overlay-glass {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 105;
        }

        /* main content */
        .main-aura {
            margin-left: 300px;
            padding: 44px 56px;
            position: relative;
            z-index: 2;
        }
        .hero-section h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, var(--accent-primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        .hero-section p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* barre recherche premium */
        .search-luxury {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 12px 24px;
            margin: 32px 0 36px;
            border: 1px solid var(--border-dim);
            backdrop-filter: blur(10px);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .search-wrapper-lux {
            flex: 1;
            position: relative;
        }
        .search-wrapper-lux i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-primary);
        }
        .search-wrapper-lux input {
            width: 100%;
            padding: 16px 20px 16px 54px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-dim);
            border-radius: 60px;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .search-wrapper-lux input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.2);
        }
        .voice-ritual {
            width: 56px;
            height: 56px;
            border-radius: 56px;
            background: rgba(196, 163, 90, 0.1);
            border: 1px solid var(--border-glow);
            color: var(--accent-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-ritual.listening {
            background: var(--accent-rose);
            border-color: var(--accent-rose);
            color: white;
            animation: voicePulse 1.2s infinite;
        }
        @keyframes voicePulse {
            0% { box-shadow: 0 0 0 0 rgba(157, 78, 78, 0.5); }
            70% { box-shadow: 0 0 0 12px rgba(157, 78, 78, 0); }
        }

        /* filtres sophistiqués */
        .filter-curator {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            margin-bottom: 40px;
        }
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .chip-noble {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            background: transparent;
            border: 1px solid var(--border-dim);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .chip-noble.active, .chip-noble:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #0A0C10;
            transform: translateY(-2px);
        }
        .select-couture {
            background: var(--bg-surface);
            padding: 10px 24px;
            border-radius: 60px;
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
        }
        .view-dual {
            display: flex;
            gap: 12px;
            background: var(--bg-surface);
            padding: 6px;
            border-radius: 60px;
            border: 1px solid var(--border-dim);
        }
        .view-option {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
        }
        .view-option.active {
            background: var(--accent-primary);
            color: #0A0C10;
        }

        /* grille produits — sublime */
        .product-grid-celestial {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 32px;
        }
        .product-card-master {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-dim);
            overflow: hidden;
            transition: all 0.4s var(--transition-smooth);
        }
        .product-card-master:hover {
            transform: translateY(-12px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-xl);
        }
        .img-masterpiece {
            height: 260px;
            background: linear-gradient(145deg, #0F131A, #06080C);
            position: relative;
            overflow: hidden;
        }
        .img-masterpiece img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card-master:hover .img-masterpiece img {
            transform: scale(1.08);
        }
        .master-badge {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 800;
            background: var(--accent-primary);
            color: #0A0C10;
            z-index: 3;
            letter-spacing: 0.3px;
        }
        .master-badge.hot { background: var(--accent-rose); color: white; }
        .master-badge.premium { background: var(--accent-emerald); color: white; }
        .info-master {
            padding: 22px 22px 26px;
        }
        .info-master h3 {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }
        .supplier-line {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .price-gold {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.55rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin: 14px 0 20px;
        }
        .action-twins {
            display: flex;
            gap: 16px;
        }
        .btn-cart-gold {
            flex: 1;
            background: transparent;
            border: 1.5px solid rgba(196, 163, 90, 0.5);
            border-radius: 20px;
            padding: 12px;
            font-weight: 700;
            color: var(--accent-primary);
            transition: 0.25s;
            cursor: pointer;
        }
        .btn-cart-gold:hover {
            background: var(--accent-primary);
            color: #0A0C10;
            border-color: var(--accent-primary);
        }
        .btn-compare-gold {
            width: 52px;
            background: transparent;
            border: 1.5px solid var(--border-dim);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-compare-gold.active {
            background: var(--accent-emerald);
            border-color: var(--accent-emerald);
            color: white;
        }

        /* liste verticale */
        .product-list-celestial {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .list-item-lux {
            display: flex;
            align-items: center;
            gap: 28px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px 28px;
            border: 1px solid var(--border-dim);
        }
        .list-item-lux:hover {
            border-color: var(--border-glow);
            transform: translateX(8px);
        }

        /* compare bar */
        .compare-bar-elegance {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17, 21, 28, 0.96);
            backdrop-filter: blur(28px);
            border-top: 1px solid var(--border-glow);
            padding: 18px 36px;
            transform: translateY(100%);
            transition: transform 0.4s;
            z-index: 95;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }
        .compare-bar-elegance.show {
            transform: translateY(0);
        }

        .toast-royal {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast-message {
            background: #1E242C;
            border-left: 4px solid var(--accent-primary);
            padding: 14px 24px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            transform: translateX(450px);
            transition: 0.3s;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: var(--shadow-xl);
        }
        .toast-message.show { transform: translateX(0); }

        @media (max-width: 900px) {
            .main-aura { margin-left: 0; padding: 24px 20px; padding-top: 90px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-bar { display: flex; }
            .product-grid-celestial { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .hero-section h1 { font-size: 2rem; }
        }
        @media (max-width: 560px) {
            .product-grid-celestial { grid-template-columns: 1fr; }
            .filter-curator { flex-direction: column; align-items: stretch; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #11151C; }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 10px; }
    </style>
</head>
<body>
<div class="bg-aura"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="noise-texture"></div>
<div class="overlay-glass" id="overlay" onclick="closeSidebar()"></div>
<div class="mobile-bar">
    <button class="mobile-menu-btn" onclick="openSidebar()"><i class="fa-regular fa-bars"></i></button>
    <span style="font-weight:700; font-size:1.2rem; letter-spacing:-0.3px;">Salam <span style="color:#C4A35A;">Market</span></span>
    <button class="mobile-menu-btn" onclick="location.href='cart.html'"><i class="fa-regular fa-bag-shopping"></i></button>
</div>
<aside class="sidebar" id="sidebar">
    <div class="brand-master"><div class="brand-icon"><i class="fa-regular fa-crown"></i></div><div class="brand-title"><h2>Salam Market</h2><p>ÉDITION LIMITÉE</p></div></div>
    <div class="nav-lux">
        <div class="nav-item-lux active"><i class="fa-regular fa-compass"></i> Catalogue</div>
        <div class="nav-item-lux"><i class="fa-regular fa-basket-shopping"></i> Panier</div>
        <div class="nav-item-lux"><i class="fa-regular fa-truck-fast"></i> Commandes</div>
        <div class="nav-item-lux"><i class="fa-regular fa-user"></i> Profil</div>
    </div>
    <button class="logout-elegant" onclick="logout()"><i class="fa-regular fa-right-from-bracket"></i> Quitter l'atelier</button>
</aside>
<main class="main-aura">
    <div class="hero-section"><h1><i class="fa-regular fa-sparkles"></i> L'Art de la table & bien-être</h1><p id="productCount">Une curation d'exception</p></div>
    <div class="search-luxury"><div class="search-wrapper-lux"><i class="fa-regular fa-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Cherchez un produit rare... (riz basmati, savon précieux, pâtes artisanales)"></div><button class="voice-ritual" id="voiceBtn"><i class="fa-regular fa-microphone"></i></button></div>
    <div class="filter-curator"><div class="filter-chips" id="categoryFilters"></div><div><select id="sortSelect" class="select-couture"><option value="default">⚡ Ordonner</option><option value="price-asc">Prix croissant</option><option value="price-desc">Prix décroissant</option><option value="name-asc">Nom A→Z</option></select></div><div class="view-dual"><button class="view-option active" data-view="grid" onclick="setView('grid')"><i class="fa-regular fa-grid-2"></i> Grille</button><button class="view-option" data-view="list" onclick="setView('list')"><i class="fa-regular fa-list"></i> Liste</button></div></div>
    <div id="productsContainer" class="product-grid-celestial"></div>
</main>
<div class="compare-bar-elegance" id="compareBar"><div><i class="fa-regular fa-chart-scatter"></i> Comparaison (<span id="compareCount">0</span>/4)</div><div class="compare-items" id="compareItems"></div><button class="btn-cart-gold" onclick="compareSelected()" style="width:auto; padding:8px 32px;">Analyser</button></div>
<div class="toast-royal" id="toastContainer"></div>

<script>
    const IMG_BASE = "../images/";
    const mapping = {
        "Spaghetti Barilla n°5":"SpaghettiBarilla500g.jpg","Spaghetti Pâte d'Or":"SpaghettiPATEDOR.jpg","Spaghetti Broli":"SpaghettiBROLI.jpg","Spaghetti Panzani":"SpaghettiPANZANI.jpg","Macaroni Kayna Petit plomb":"MacaroniKayna500g.jpg","Macaroni Helper Cheeseburger":"MacaroniHELPER.jpg","Macaroni Kayna Coquillette":"MacaroniKAYNA.jpg","Riz Tanti":"RizTanti.jpg","Riz Parfumé Mama Gold":"RizParfuméMamaGold.jpg","Riz Long Grain 5kg":"RizParfuméMamaGold.jpg","Colgate MaxWhite":"Dentifrice.ColgateMaxWhite.jpg","Colgate MaxFresh":"Dentifrice.ColgateMaxFresh.jpg","Colgate Herbal":"Dentifrice.Colgate.Herbal.jpg","Parodontax":"Dentifrice.Parodontax.jpg","Sensodyne Répare & Protège":"Dentifrice.SensodyneRepare&Protege.jpg","Sensodyne Soin Complet":"Dentifrice.Sensodyne.jpg","Colgate Black Fresh":"Dentifrice.Colgat.jpg","Signal Blancheur":"Dentifrice.Signal.jpg","Sardines Jolly":"SardineJoly.jpg","Sardines Famrite":"Sardine.Famrite.jpg","Savon Maera Herbal":"SAVON.Maera.jpg","Savon Protex Pharmapur Aloe":"Protex.jpg","Savon Protex Pharmapur Charbon":"protex_-_pharmapur_-_charbon_2_.jpg","Savon Pharmapur Classique":"Savon-PHARMAPUR-150g-1.webp","Dettol Original Antibactérien":"Dettol.Original.jpg","Dettol Skincare":"Dettol.Skincare.jpg","Savon Nivea Crème Soft":"SAVON.NIVEA.jpg","Savon Artisanal":"SAVON.jpg","Sucre Blanc":"SucreBlanc.jpg","Détergent Madar":"detergentMadar.jpg","Détergent Hoka High Foam":"detergeantHoka.jpg","Détergent Ozil Ultra Power":"detergentOzil.jpg","Serviettes Siempre Extra":"cotonhygeniquesiempre.jpg","Huile Mayer":"HuileMajo1r.jpg","Huile Rouge 500g":"huileRouge.jpg","Poulet fermier":"SpaghettiBarilla500g.jpg","Tomates fraîches":"SpaghettiBarilla500g.jpg","Mangues fraîches":"manguesfraiche.jpg","Brosse à dents colorée":"Brosse_a_dents.jpg","Brosse à dents électrique":"brosse_a_dents_electrique.jpg","Brosse à dents Signal":"Brosse_a_dents_Signal.jpg","Papier hygiénique":"COTONHYGENIQUE.jpg","Bouteille de gaz":"gaz.jpg","Huile Major 1L":"huileMajor.jpg","Huile Major Grand Bidon":"huileMajorGrand.jpg","Huile Major (gamme)":"huileMajorTYPE.jpg","Huile Oléo 1L":"huileOleo.jpg","Macaroni La Pasta":"MacaroniPASTA.jpg","Penne La Pasta Gold 500g":"macaroni-pasta-gold-500g-penne.jpg","Nivea (gamme complète)":"NIVEATOUT.jpg","Nivea Perfect & Radiant":"NIVEA.jpg","Nivea Crème":"NIVEACREME.jpg","Nivea Body Milk Nourishing":"NIVEALAIT.jpg"
    };

    const PRODUCTS = [

    let currentCat="all",searchStr="",currentSort="default",view="grid",compareList=JSON.parse(localStorage.getItem("salam_compare")||"[]");
    let allCats=["all",...new Set(PRODUCTS.map(p=>p.category))];
    function renderFilters(){document.getElementById("categoryFilters").innerHTML=allCats.map(c=>`<div class="chip-noble ${currentCat===c?'active':''}" onclick="filterCat('${c}')">${c==='all'?'✨ Intégralité':c}</div>`).join("");}
    function filterCat(c){currentCat=c;renderFilters();renderProducts();}
    function setView(v){view=v;document.querySelectorAll('.view-option').forEach(btn=>btn.classList.remove('active'));document.querySelector(`.view-option[data-view="${v}"]`).classList.add('active');renderProducts();}
    function getSortedFiltered(){let f=PRODUCTS.filter(p=>(currentCat==='all'||p.category===currentCat)&&(searchStr===''||p.name.toLowerCase().includes(searchStr)||p.supplier.toLowerCase().includes(searchStr)));if(currentSort==='price-asc')f.sort((a,b)=>a.price-b.price);else if(currentSort==='price-desc')f.sort((a,b)=>b.price-a.price);else if(currentSort==='name-asc')f.sort((a,b)=>a.name.localeCompare(b.name));return f;}
    function badgeType(b){if(b==='best')return "hot";if(b==='premium')return "premium";if(b==='hot')return "hot";if(b==='fresh')return "hot";return "";}
    function badgeLabel(b){if(b==='best')return "🌟 ICONIC";if(b==='premium')return "💎 EXCLUSIF";if(b==='hot')return "🔥 VIRAL";if(b==='fresh')return "🌿 FRAIS";return "";}
    function renderProducts(){let items=getSortedFiltered();document.getElementById("productCount").innerHTML=`${items.length} pièces d'exception`;let container=document.getElementById("productsContainer");if(view==="grid"){container.className="product-grid-celestial";container.innerHTML=items.map(p=>`<div class="product-card-master"><div class="img-masterpiece">${p.badge?`<div class="master-badge ${badgeType(p.badge)}">${badgeLabel(p.badge)}</div>`:''}<img src="${getImage(p.name)}" onerror="this.src='../images/SpaghettiBarilla500g.jpg'"></div><div class="info-master"><h3>${escapeHtml(p.name)}</h3><div class="supplier-line"><i class="fa-regular fa-store"></i> ${escapeHtml(p.supplier)}</div><div class="price-gold">${p.price.toLocaleString()} FCFA <span style="font-size:0.8rem;">/${p.unit}</span></div><div class="action-twins"><button class="btn-cart-gold" onclick="addToCart(${p.id},'${escapeHtml(p.name)}',${p.price})"><i class="fa-regular fa-plus"></i> Ajouter</button><button class="btn-compare-gold ${compareList.includes(p.id)?'active':''}" onclick="toggleCompare(${p.id})"><i class="fa-regular fa-chart-line"></i></button></div></div></div>`).join("");}else{container.className="product-list-celestial";container.innerHTML=items.map(p=>`<div class="list-item-lux"><div style="width:80px;height:80px;border-radius:20px;overflow:hidden;"><img src="${getImage(p.name)}" style="width:100%;height:100%;object-fit:cover;"></div><div style="flex:1;"><h3>${escapeHtml(p.name)}</h3><div style="font-size:0.7rem;color:#7E8493;">${p.supplier} · ${p.unit}</div><div class="price-gold" style="margin-top:6px;">${p.price.toLocaleString()} FCFA</div></div><div style="display:flex;gap:14px;"><button class="btn-cart-gold" style="padding:8px 24px;" onclick="addToCart(${p.id},'${escapeHtml(p.name)}',${p.price})">Ajouter</button><button class="btn-compare-gold ${compareList.includes(p.id)?'active':''}" onclick="toggleCompare(${p.id})"><i class="fa-regular fa-chart-line"></i></button></div></div>`     function addToCart(id,name,price){let cart=JSON.parse(localStorage.getItem("salam_cart")||"[]");let exist=cart.find(i=>i.id===id);exist?exist.quantity+=1:cart.push({id,name,price,quantity:1,image:getImage(name),supplier:PRODUCTS.find(p=>p.id===id)?.supplier});localStorage.setItem("salam_cart",JSON.stringify(cart));toastSuccess("Ajouté","${name} rejoint votre panier");}
    function toggleCompare(id){if(compareList.includes(id))compareList=compareList.filter(i=>i!==id);else{if(compareList.length>=4){toastSuccess("Limite","4 produits maximum","warning");return}compareList.push(id)}localStorage.setItem("salam_compare",JSON.stringify(compareList));renderProducts();updateCompare();}
    function updateCompare(){let bar=document.getElementById("compareBar");let cont=document.getElementById("compareItems");let len=compareList.length;document.getElementById("compareCount").innerText=len;if(len===0){bar.classList.remove("show");return}bar.classList.add("show");let prods=PRODUCTS.filter(p=>compareList.includes(p.id));cont.innerHTML=prods.map(p=>`<div style="background:#1A1F2A; border-radius:40px; padding:5px 14px; display:flex; gap:10px; align-items:center;"><img src="${getImage(p.name)}" style="width:28px;height:28px;border-radius:12px;"><span style="font-size:0.75rem;">${p.name.slice(0,16)}</span><button onclick="toggleCompare(${p.id})" style="background:none;border:none;color:#9D4E4E;cursor:pointer;">✕</button></div>`).join("");}
    function compareSelected(){if(compareList.length<2){toastSuccess("Comparaison","Sélectionnez au moins 2 produits","warning");return}let prods=PRODUCTS.filter(p=>compareList.includes(p.id));let modal=document.createElement("div");modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(24px);z-index:1000;display:flex;align-items:center;justify-content:center;";let content=document.createElement("div");content.style.cssText="background:#11151C;border-radius:40px;max-width:1100px;width:90%;padding:32px;max-height:80vh;overflow:auto;border:1px solid rgba(196,163,90,0.3);";content.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:24px;"><h2 style="font-family:Quicksand;"><i class="fa-regular fa-chart-scatter"></i> Comparaison</h2><button onclick="this.closest('div').parentElement.parentElement.remove()" style="background:none;border:none;color:white;font-size:2rem;">&times;</button></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;">${prods.map(p=>`<div style="background:#1A1F2A;border-radius:28px;padding:24px;text-align:center;"><img src="${getImage(p.name)}" style="width:100%;height:150px;object-fit:cover;border-radius:24px;"><h3 style="margin:14px 0;">${p.name}</h3><div style="color:#C4A35A;font-weight:800;font-size:1.3rem;">${p.price} FCFA</div><div>${p.supplier}</div><button class="btn-cart-gold" style="margin-top:16px;" onclick="addToCart(${p.id},'${p.name}',${p.price})">Ajouter</button></div>`).join("")}</div>`;modal.appendChild(content);document.body.appendChild(modal);modal.onclick=e=>e.target===modal&&modal.remove();}
    let recognition;function startVoiceSearch(){const btn=document.getElementById("voiceBtn");if(!('webkitSpeechRecognition' in window)){toastSuccess("Voice","Non supporté","error");return}const SpeechRecognition=window.webkitSpeechRecognition;recognition=new SpeechRecognition();recognition.lang="fr-FR";recognition.onstart=()=>{btn.classList.add("listening");btn.innerHTML='<i class="fa-regular fa-microphone-slash"></i>';};recognition.onresult=e=>{let txt=e.results[0][0].transcript;document.getElementById("searchInput").value=txt;searchStr=txt.toLowerCase();renderProducts();toastSuccess("Recherche vocale","\""+txt+"\"");};recognition.onend=()=>{btn.classList.remove("listening");btn.innerHTML='<i class="fa-regular fa-microphone"></i>';};recognition.start();}
    function toastSuccess(title,msg){let cont=document.getElementById("toastContainer");let t=document.createElement("div");t.className="toast-message";t.innerHTML=`<i class="fa-regular fa-circle-check" style="color:#C4A35A;"></i> <div><strong>${title}</strong><br><small>${msg}</small></div>`;cont.appendChild(t);setTimeout(()=>t.classList.add("show"),10);setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},3000);}
    function escapeHtml(s){return String(s).replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
